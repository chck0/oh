services:
  db:
    image: postgis/postgis:16-3.4
    container_name: lifestyle_db
    environment:
      POSTGRES_USER: lifestyle
      POSTGRES_PASSWORD: lifestyle1234
      POSTGRES_DB: lifestyle_score
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lifestyle_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
