<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VerifyHome — 내가 살 집, 제대로 확인하세요</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:  #0F1B35;
    --navy2: #1A2E52;
    --blue:  #1E5EFF;
    --blue-light: #EEF3FF;
    --text-primary: #0F1B35;
    --text-secondary: #5A6476;
    --text-muted: #9AA2B4;
    --border: #E4E8F2;
    --radius-lg: 20px;
    --shadow-md: 0 4px 20px rgba(15,27,53,0.09);
    --shadow-lg: 0 8px 40px rgba(15,27,53,0.13);
  }

  html {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #FFFFFF;
    color: var(--navy);
    font-size: 15px;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ── Center Stage ── */
  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    width: 100%;
    max-width: 640px;
    padding: 0 24px;
    /* 살짝 위로 올려서 구글처럼 시각적 중심 맞춤 */
    margin-top: -60px;
  }

  /* ── Wordmark ── */
  .wordmark {
    font-size: 52px;
    font-weight: 900;
    letter-spacing: -1.5px;
    line-height: 1;
    user-select: none;
  }
  .wordmark-verify { color: var(--blue); }
  .wordmark-home   { color: var(--navy); }

  /* ── Tagline ── */
  .tagline {
    font-size: 22px;
    color: var(--text-primary);
    font-weight: 700;
    text-align: center;
    line-height: 1.5;
    letter-spacing: -0.3px;
  }
  .tagline-sub {
    display: block;
    font-size: 14px;
    font-weight: 400;
    color: var(--text-secondary);
    margin-top: 8px;
    line-height: 1.6;
  }

  /* ── Search Bar ── */
  .search-wrap {
    width: 100%;
    position: relative;
  }

  .search-input {
    width: 100%;
    height: 58px;
    padding: 0 60px 0 24px;
    border: 1.5px solid var(--border);
    border-radius: 30px;
    font-family: inherit;
    font-size: 16px;
    color: var(--navy);
    background: #fff;
    outline: none;
    box-shadow: var(--shadow-md);
    transition: border-color 0.18s, box-shadow 0.18s;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(30,94,255,0.12), var(--shadow-md);
  }

  .search-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 42px;
    height: 42px;
    background: var(--blue);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
  }
  .search-btn:hover  { background: #1650e0; }
  .search-btn:active { transform: translateY(-50%) scale(0.94); }
  .search-btn svg { fill: #fff; width: 18px; height: 18px; }

  /* ── Autocomplete Dropdown ── */
  .dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0; right: 0;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    z-index: 100;
  }
  .dropdown-item {
    padding: 12px 20px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
  }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover,
  .dropdown-item.focused { background: var(--blue-light); }
  .dropdown-bdnm {
    font-size: 14px; font-weight: 700; color: var(--navy);
    margin-bottom: 2px;
  }
  .dropdown-addr {
    font-size: 12px; color: var(--text-muted);
  }

  /* ── Size Chips ── */
  .size-panel {
    display: none;
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }
  .size-label {
    font-size: 13px; color: var(--text-secondary); font-weight: 600;
  }
  .size-chips {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .size-chip {
    padding: 7px 18px;
    border-radius: 30px;
    border: 1.5px solid var(--border);
    font-size: 14px; font-weight: 500;
    cursor: pointer; color: var(--text-secondary);
    background: #fff;
    transition: all 0.15s;
  }
  .size-chip:hover { border-color: var(--blue); color: var(--blue); }
  .size-chip.active {
    background: var(--blue); border-color: var(--blue);
    color: #fff; font-weight: 600;
  }

  /* ── Hint ── */
  .hint {
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
  }
  .hint-error {
    font-size: 13px;
    color: #e05050;
    text-align: center;
  }

  /* ── Footer ── */
  footer {
    position: fixed;
    bottom: 28px;
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    width: 100%;
  }
</style>
</head>
<body>

<main class="stage">

  <!-- Wordmark -->
  <div class="wordmark">
    <span class="wordmark-verify">Verify</span><span class="wordmark-home">Home</span>
  </div>

  <!-- Tagline -->
  <p class="tagline">이 집 시세, 비교해봤어요?<br><span class="tagline-sub">주소 하나로 근처 동네 같은 평형 실거래가 비교 + AI와 가격 차이 이유를 상담해보세요</span></p>

  <!-- Search -->
  <div class="search-wrap">
    <input
      class="search-input"
      type="text"
      placeholder="예: 논현동 신동아아파트 101동"
      id="addressInput"
      autocomplete="off"
    />
    <div class="dropdown" id="dropdown"></div>
    <button class="search-btn" onclick="goVerify()" aria-label="검증 시작">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 2a8 8 0 105.293 14.121l4.293 4.293 1.414-1.414-4.293-4.293A8 8 0 0010 2zm0 2a6 6 0 110 12A6 6 0 0110 4z"/>
      </svg>
    </button>
  </div>

  <!-- Size Chips -->
  <div class="size-panel" id="sizePanel">
    <div class="size-label">몇 평형을 보시겠어요?</div>
    <div class="size-chips" id="sizeChips"></div>
  </div>

  <!-- Hint -->
  <p class="hint">단지명 또는 동 주소를 입력하면 평형을 선택할 수 있어요</p>

</main>

<footer>© 2026 VerifyHome · 데이터 기반 부동산 검증 서비스</footer>

<script>
  let debounceTimer = null;
  let selectedJuso = null;
  let aptMatch = null;   // apartment.db 매칭 결과 { lat, lng, apt_nm, umd_nm, apt_seq }
  let selectedSize = null;
  let focusedIdx = -1;

  const input = document.getElementById('addressInput');
  const dropdown = document.getElementById('dropdown');

  input.addEventListener('keydown', e => {
    const items = dropdown.querySelectorAll('.dropdown-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      focusedIdx = Math.min(focusedIdx + 1, items.length - 1);
      updateFocus(items);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      focusedIdx = Math.max(focusedIdx - 1, 0);
      updateFocus(items);
    } else if (e.key === 'Enter') {
      if (focusedIdx >= 0 && items[focusedIdx]) {
        items[focusedIdx].click();
      } else {
        goVerify();
      }
    } else if (e.key === 'Escape') {
      hideDropdown();
    }
  });

  function updateFocus(items) {
    items.forEach((el, i) => {
      el.classList.toggle('focused', i === focusedIdx);
      if (i === focusedIdx) el.scrollIntoView({ block: 'nearest' });
    });
  }

  input.addEventListener('input', () => {
    selectedJuso = null;
    selectedSize = null;
    aptMatch = null;
    document.getElementById('sizePanel').style.display = 'none';
    const keyword = input.value.trim();
    clearTimeout(debounceTimer);
    if (keyword.length < 2) { hideDropdown(); return; }
    debounceTimer = setTimeout(() => fetchSuggestions(keyword), 300);
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) hideDropdown();
  });

  async function fetchSuggestions(keyword) {
    try {
      const res = await fetch(
        `/api/address-search?keyword=${encodeURIComponent(keyword)}`,
        { signal: AbortSignal.timeout(5000) }
      );
      if (!res.ok) return;
      showDropdown((await res.json()).results || []);
    } catch { hideDropdown(); }
  }

  function showDropdown(results) {
    if (!results.length) { hideDropdown(); return; }
    focusedIdx = -1;
    dropdown.dataset.results = JSON.stringify(results);
    dropdown.innerHTML = results.map((r, i) => `
      <div class="dropdown-item" onclick="selectAddress(${i})">
        <div class="dropdown-bdnm">${r.bdNm}</div>
        <div class="dropdown-addr">${r.roadAddr}</div>
      </div>
    `).join('');
    dropdown.style.display = 'block';
    // 드롭다운 표시 즉시 캐시 워밍 — 사용자가 선택하기 전에 MOLIT 데이터 미리 fetch
    fetch(`/api/prefetch?lawd_cd=${results[0].admCd.slice(0, 5)}`).catch(() => {});
  }

  function hideDropdown() { dropdown.style.display = 'none'; }

  async function selectAddress(idx) {
    const results = JSON.parse(dropdown.dataset.results);
    selectedJuso = results[idx];
    aptMatch = null;
    input.value = selectedJuso.bdNm;
    hideDropdown();
    fetch(`/api/prefetch?lawd_cd=${selectedJuso.admCd.slice(0, 5)}`).catch(() => {}); // 캐시 워밍
    const sggCd = selectedJuso.admCd.slice(0, 5);
    const dong = extractDong(selectedJuso.jibunAddr);
    // apt-match와 apt-sizes를 병렬 호출
    const [, matchData] = await Promise.allSettled([
      fetchAptSizes(sggCd, selectedJuso.bdNm, dong),
      fetchAptMatch(selectedJuso.bdNm, sggCd, dong),
    ]);
    if (matchData.status === 'fulfilled' && matchData.value?.lat) {
      aptMatch = matchData.value;
    }
  }

  async function fetchAptMatch(bdNm, sggCd, dong) {
    try {
      const dongParam = dong ? `&dong=${encodeURIComponent(dong)}` : '';
      const res = await fetch(
        `/api/apt-match?bd_nm=${encodeURIComponent(bdNm)}&sgg_cd=${sggCd}${dongParam}`,
        { signal: AbortSignal.timeout(5000) }
      );
      if (!res.ok) return null;
      return await res.json();
    } catch { return null; }
  }

  async function fetchAptSizes(lawd_cd, apt_name, dong) {
    try {
      const dongParam = dong ? `&dong=${encodeURIComponent(dong)}` : '';
      const res = await fetch(
        `/api/apt-sizes?lawd_cd=${lawd_cd}&apt_name=${encodeURIComponent(apt_name)}${dongParam}`,
        { signal: AbortSignal.timeout(10000) }
      );
      if (!res.ok) return;
      const data = await res.json();
      showSizeChips(data.sizes || []);
    } catch {}
  }

  function showSizeChips(sizes) {
    if (!sizes.length) return;
    const panel = document.getElementById('sizePanel');
    document.getElementById('sizeChips').innerHTML = sizes
      .map(s => `<div class="size-chip" onclick="selectSize(this, ${s})">${s}평</div>`)
      .join('');
    panel.style.display = 'flex';
  }

  function selectSize(el, pyeong) {
    selectedSize = pyeong;
    document.querySelectorAll('.size-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
  }

  function extractDong(jibunAddr) {
    const m = jibunAddr.match(/\s(\S+동)\s/);
    return m ? m[1] : null;
  }

  function showError(msg) {
    const hint = document.querySelector('.hint');
    hint.textContent = msg;
    hint.className = 'hint-error';
    setTimeout(() => {
      hint.textContent = '단지명 또는 동 주소를 입력하면 평형을 선택할 수 있어요';
      hint.className = 'hint';
    }, 3000);
  }

  function goVerify() {
    const addr = input.value.trim();
    if (!addr) { input.focus(); return; }

    if (!selectedJuso) {
      showError('목록에서 주소를 선택해주세요');
      input.focus();
      return;
    }

    let url = '/market?address=' + encodeURIComponent(addr);
    url += '&lawd_cd=' + selectedJuso.admCd.slice(0, 5);
    url += '&apt_name=' + encodeURIComponent(selectedJuso.bdNm);
    const dong = extractDong(selectedJuso.jibunAddr);
    if (dong) url += '&dong=' + encodeURIComponent(dong);
    // apt-match DB 좌표 우선, 없으면 JUSO entX/entY fallback
    if (aptMatch?.lat) {
      url += '&lat=' + aptMatch.lat + '&lng=' + aptMatch.lng;
    } else {
      if (selectedJuso.entX) url += '&entX=' + selectedJuso.entX;
      if (selectedJuso.entY) url += '&entY=' + selectedJuso.entY;
    }
    if (selectedSize) url += '&pyeong=' + selectedSize;
    window.location.href = url;
  }
</script>

</body>
</html>
