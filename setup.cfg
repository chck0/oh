[flake8]
# line length: relax 79->99 (URLs, SQL, long strings)
max-line-length = 99

# intentional style exceptions
extend-ignore =
    # E231: compact dict literals in transit.py (intentional readability choice)
    E231,
    # E221: alignment spaces for key lists in config.py etc.
    E221,

# per-file overrides
per-file-ignores =
    # allow long SQL strings in test files
    tests/*.py: E501
