[flake8]
# 줄 길이: 79(기본) → 99 완화 (URL, SQL, 긴 문자열 허용)
max-line-length = 99

# 의도적 스타일 예외
extend-ignore =
    # E231: transit.py 그리드 좌표·경로 필터 compact dict — 가독성 위해 의도적 사용
    E231,
    # E221: 변수 정렬을 위한 의도적 다중 공백 (config.py 키 목록 등)
    E221,

# 체크 대상
per-file-ignores =
    # conftest/test 파일은 긴 SQL 문자열 허용
    tests/*.py: E501
