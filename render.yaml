services:
  - type: web
    name: verifyhome
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.market_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATA_GO_KR_API_KEY
        sync: false
      - key: JUSO_CONFIRM_KEY
        sync: false
