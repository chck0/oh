# /etc/nginx/sites-available/real_estate
# 활성화: sudo ln -s /etc/nginx/sites-available/real_estate /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;   # 도메인 받으면 교체

    # 정적 프론트엔드
    root /opt/real_estate/web;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # FastAPI 백엔드
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }
}
