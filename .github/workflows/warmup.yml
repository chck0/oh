name: Vercel Warmup

on:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping production
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://kaisttest.vercel.app/api/_debug)
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ] && echo "warm" || echo "cold start triggered"
