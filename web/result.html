      font-size: 11.5px; color: var(--color-text-secondary);
      margin-bottom: 5px;
      line-height: 1.3;
      letter-spacing: 0;
      font-weight: 600;
    }
    .dp-kpi-value {
      font-size: 17px; font-weight: 700;
      font-feature-settings: 'tnum';
      letter-spacing: -0.005em;
    }
    .clr-up   { color: #FF7E8A; }
    .clr-dn   { color: var(--blue-700); }
    .clr-flat { color: var(--color-text-secondary); }

    /* 차트 */
    .dp-pyeong-tabs {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .dp-tab {
      padding: 5px 13px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--color-border-strong);
      font-size: 12.5px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      background: var(--color-bg-subtle);
      color: var(--color-text-secondary);
      font-feature-settings: 'tnum';
      transition: all 100ms;
    }
    .dp-tab:hover { border-color: var(--color-text-tertiary); }
    .dp-tab.active {
      background: var(--color-brand-gradient);
      color: var(--color-text-on-brand);
      border-color: transparent;
    }
    .dp-chart-legend {
      display: flex; gap: 14px;
      margin-bottom: 8px;
      font-size: 11px;
      color: var(--color-text-secondary);
    }
    .dp-legend-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      margin-right: 3px;
      vertical-align: middle;
    }
    .dp-chart-wrap {
      position: relative; height: 190px;
    }

    /* 실거래 테이블 */
    .dp-trade-group { margin-bottom: 14px; }
    .dp-trade-group:last-child { margin-bottom: 0; }
    .dp-trade-group-title {
      font-size: 12px; font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: 0;
      margin-bottom: 6px;
      padding-bottom: 5px;
      border-bottom: 1.5px solid var(--color-border-strong);
    }
    .dp-trade-table {
      width: 100%; border-collapse: collapse;
      font-size: 13px;
      font-feature-settings: 'tnum';
    }
    .dp-trade-table th {
      padding: 7px 6px; font-size: 11.5px;
      color: var(--color-text-primary);
      font-weight: 700;
      letter-spacing: 0;
      text-align: left;
      border-bottom: 1.5px solid var(--color-border-strong);
    }
    .dp-trade-table td {
      padding: 8px 6px;
      border-bottom: 1px solid var(--color-border-default);
      color: var(--color-text-primary);
      font-weight: 500;
    }
    .dp-trade-amount {
      font-weight: 700; color: var(--color-text-primary);
    }

    /* POI */
    .dp-poi-category {
      font-size: 11.5px; font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: 0;
      margin: 14px 0 6px;
      padding-bottom: 5px;
      border-bottom: 1.5px solid var(--color-border-strong);
    }
    .dp-poi-category:first-child { margin-top: 0; }
    .dp-poi-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0;
      font-size: 14px;
      border-bottom: 1px solid var(--color-border-default);
    }
    .dp-poi-row:last-child { border-bottom: none; }
    .dp-poi-name {
      flex: 1; color: var(--color-text-primary);
    }
    .dp-poi-tag {
      color: var(--color-text-tertiary);
      font-size: 12px;
    }
    .dp-poi-dist {
      font-size: 12.5px;
      color: var(--color-text-secondary);
      white-space: nowrap;
      font-feature-settings: 'tnum';
      font-weight: 500;
    }


    /* ── 텍스트 색상 강화 (다크 테마) ─────────────────────── */
    html, body {
      --color-text-tertiary: var(--gray-500);
      --color-text-secondary: var(--gray-700);
    }

    /* ── 입체감을 위한 패널 분리 ─────────────────────────── */
    .stats-panel,
    .bucket-section,
    .rec-card,
    .list-card {
      background: var(--color-bg-panel);
    }
    .bucket-body {
      background: var(--color-bg-subtle);
    }

    /* ════════════════════════════════════════════════════════════
       spec-12 · 모바일 전용 UX (≤767px 한정)
       ⚠️ PC 무영향 원칙: 이 블록 규칙은 모바일에서만 적용되며
       데스크톱(≥768px) 렌더링·동작에 일절 영향을 주지 않는다.
       기존 데스크톱 선언은 수정하지 않고 여기서 override만 한다.
       (소스 맨 끝 배치 → 동일 특이도 규칙을 소스순서로 안전하게 덮어씀)
       ════════════════════════════════════════════════════════════ */
    /* 모바일 토글 버튼 기본값: 데스크톱에선 숨김(추가 셀렉터 — 기존 요소 무영향) */
    .mobile-view-toggle { display: none; }

    @media (max-width: 767px) {
      /* A·C. 레이아웃: .result-layout이 flex이므로 flex-direction으로 세로 스택
         (기존 315행 블록은 flex에 무효한 grid-template이라 실제 동작 안 했음) */
      .result-layout { flex-direction: column; }
      .left-panel {
        width: 100%; min-width: 0; flex: 1 1 auto; min-height: 0;
        border-right: none; border-bottom: 1px solid var(--color-border-strong);
      }
      .map-panel {
        width: 100%; min-width: 0;
        flex: 0 0 32vh; min-height: 32vh;   /* spec-12 #1: 리스트 모드 지도 미리보기 축소(카드 공간 확보) */
      }

      /* spec-12 #2: 지도 범례 컴팩트화 (작은 모바일 지도에 맞춰 축소) */
      #map-legend {
        top: 8px; left: 8px; padding: 9px 12px; min-width: 0; border-radius: 10px;
      }
      #map-legend .lg-title { margin-bottom: 6px; font-size: 10px; }
      #map-legend .lg-row { margin-bottom: 5px; font-size: 12px; gap: 7px; }
      #map-legend .lg-dot { width: 10px; height: 10px; }
      #map-legend .lg-divider { margin: 6px 0; }

      /* C. 지도 우선 모드 — 토글로 .mobile-map-focus 부여 시 리스트 접고 지도 확대 */
      .result-layout.mobile-map-focus .left-panel {
        flex: 0 0 0; height: 0; min-height: 0; overflow: hidden; border: none;
      }
      .result-layout.mobile-map-focus .map-panel {
        flex: 1 1 auto; height: 100%; min-height: 0;
      }

      /* C. 모바일 전용 플로팅 토글 버튼 (position:fixed → flex 흐름 무영향) */
      .mobile-view-toggle {
        display: inline-flex; align-items: center; gap: 6px;
        /* spec-12 #4: Kakao 로고·저작권(코너) 위로 띄워 안 가리게 + 가로 중앙 */
        position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%);
        z-index: 880;
        padding: 10px 18px;
        background: var(--color-brand-gradient); color: #fff;
        border: none; border-radius: var(--radius-pill);
        font-family: inherit; font-size: 14px; font-weight: 700;
        box-shadow: var(--shadow-brand-strong); cursor: pointer;
      }
      /* 상세/채팅 열려 있으면 토글 숨김(겹침 방지) — :has() CSS만, JS 무변경 */
      .result-layout:has(.detail-panel.open) .mobile-view-toggle,
      .result-layout:has(.chat-panel:not(.hidden)) .mobile-view-toggle {
        display: none;
      }

      /* A. 상세 패널 → 하단 바텀시트 (데스크톱 480px 사이드패널은 무손상) */
      .detail-panel {
        position: fixed; left: 0; right: 0; bottom: 0; top: auto;
        width: 100%; min-width: 0; height: 88vh; max-height: 88vh;
        transform: translateY(101%);
        transition: transform .28s ease;
        border-left: none; border-radius: 16px 16px 0 0;
        overflow: hidden; z-index: 910;
      }
      .detail-panel.open {            /* 데스크톱 .open(480px·border·shadow) 재정의 */
        width: 100%; min-width: 0;
        transform: translateY(0);
        border-left: none;
        box-shadow: 0 -8px 28px rgba(0,0,0,0.35);
      }
      /* D(Phase 2). 바텀시트 상단 그립바 — 스와이프 닫기 시각 단서 (CSS만) */
      .detail-panel__header { padding-top: 18px; position: relative; }
      .detail-panel__header::before {
        content: ''; position: absolute; top: 7px; left: 50%;
        transform: translateX(-50%);
        width: 40px; height: 4px; border-radius: 2px;
        background: rgba(255,255,255,0.55); pointer-events: none;
      }

      /* B. 친구 채팅 패널 → 전폭 (데스크톱 440px 사이드패널은 무손상) */
      .chat-panel {
        width: 100%; min-width: 0; max-width: none; border-radius: 0;
      }
      .chat-panel__resize { display: none; }   /* 모바일에선 가로 리사이즈 불필요 */
    }
  </style>
</head>

<script>
// ═══════════════════════════════════════════════════════
//  영상 플레이리스트
// ═══════════════════════════════════════════════════════
const VIDEOS = [
  '어이(크레용팝).mp4','lnsomnia(휘성).mp4','Love is(트라이앵글).mp4',
  'No1(보아).mp4','Rollin (브레이브걸스).mp4','Shake It(씨스타).mp4',
  '우리집(2PM).mp4','Hold Up (Neo, Jeiff).mp4',
];
const VIDEO_BASE = '/static/videos/';
const vCurr = document.getElementById('video-current');
const vNext = document.getElementById('video-next');
const vTitle = document.getElementById('video-title');
let currentIdx = 0; let playedRecently = new Set();
function shortName(f){ return f.replace(/\.mp4$/,''); }
function pickRandomNext(){
  if(playedRecently.size>=VIDEOS.length-1) playedRecently.clear();
  let c=VIDEOS.map((_,i)=>i).filter(i=>i!==currentIdx&&!playedRecently.has(i));
  if(!c.length) c=VIDEOS.map((_,i)=>i).filter(i=>i!==currentIdx);
  return c[Math.floor(Math.random()*c.length)];
}
function playVideo(idx){
  currentIdx=idx; playedRecently.add(idx);
  vCurr.src=VIDEO_BASE+encodeURIComponent(VIDEOS[idx]); vCurr.load(); vCurr.play().catch(()=>{});
  vTitle.textContent=shortName(VIDEOS[idx]);
  vNext.src=VIDEO_BASE+encodeURIComponent(VIDEOS[pickRandomNext()]); vNext.load();
  renderPlaylist();
}
vCurr.addEventListener('ended',()=>playVideo(pickRandomNext()));
function toggleMute(){
  const btn=document.getElementById('mute-btn');
  const icon=document.getElementById('mute-icon'); const text=document.getElementById('mute-text');
  if(vCurr.muted){ vCurr.muted=false; vNext.muted=false; icon.textContent='🔊'; text.textContent='소리 켜짐'; btn.classList.add('unmuted'); }
  else{ vCurr.muted=true; vNext.muted=true; icon.textContent='🔇'; text.textContent='소리 켜기'; btn.classList.remove('unmuted'); }
}
function renderPlaylist(){
  const plCount = document.getElementById('pl-count');
  if(plCount) plCount.textContent = VIDEOS.length+'곡';
  document.getElementById('playlist-items').innerHTML=VIDEOS.map((name,i)=>`
    <div class="playlist-item ${i===currentIdx?'active':''}" onclick="playVideo(${i})">
      <span class="pl-num">${String(i+1).padStart(2,'0')}</span>
      <span class="pl-glyph">${i===currentIdx?'▶':''}</span>
      <span>${shortName(name)}</span>
    </div>`).join('');
}
playVideo(0);

// ═══════════════════════════════════════════════════════
//  검색 파라미터 + 전역 상태
// ═══════════════════════════════════════════════════════
const params = new URLSearchParams(location.search);
// 필수 파라미터 누락 시 검색 폼으로 redirect
if(!params.get('workplace_address') || !params.get('pyeong_types')){
  location.replace('/search.html');
  throw new Error('redirect');
}
// "조건 다시 입력" 링크에 현재 검색 조건 전달 (search.html에서 prefill)
document.querySelectorAll('a[href="/search.html"]').forEach(a => {
  a.href = '/search.html' + location.search;
});
const reqBody = {
  workplace_address: params.get('workplace_address'),
  max_price: parseInt(params.get('max_price'), 10),
  max_minutes: parseInt(params.get('max_minutes'), 10),
  pyeong_types: params.get('pyeong_types').split(','),
};
if(params.get('min_kaptdaCnt')) reqBody.min_kaptdaCnt=parseInt(params.get('min_kaptdaCnt'), 10);

function fmtPrice(manwon){
  if(!manwon) return '-';
  const e=Math.floor(manwon/10000), m=manwon%10000;
  if(e&&m) return `${e}억 ${m.toLocaleString()}만`;
  if(e)    return `${e}억`;
  return `${m.toLocaleString()}만`;
}
// spec-42: 단위(억/만)를 작게 — 스탯 숫자 가독성·정렬용
function fmtPriceRich(manwon){
  if(!manwon) return '-';
  const e=Math.floor(manwon/10000), m=manwon%10000;
  const u=(s)=>`<span class="dp-stat-unit">${s}</span>`;
  if(e&&m) return `${e}${u('억')} ${m.toLocaleString()}${u('만')}`;
  if(e)    return `${e}${u('억')}`;
  return `${m.toLocaleString()}${u('만')}`;
}
function shortPrice(manwon){
  if(!manwon) return '-';
  const e=Math.floor(manwon/10000);
  const sub=Math.round((manwon%10000)/1000);
  return sub===0 ? `${e}억` : `${e}.${sub}억`;
}
function fmtPct(v){
  if(v==null) return '-';
  return (v>0?'+':'')+v+'%';
}
function escHtml(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function runSearch(){
  const ctrl = new AbortController();
  const _tid = setTimeout(() => ctrl.abort(), 70000);
  try{
    const res = await fetch('/api/search',{
      method:'POST',
      headers:{'Content-Type':'application/json','ngrok-skip-browser-warning':'1'},
      body: JSON.stringify(reqBody),
      signal: ctrl.signal,
    });
    clearTimeout(_tid);
    if(!res.ok){ const t=await res.text(); throw new Error(`HTTP ${res.status}: ${t}`); }
    resultData = await res.json();
    onSearchDone();
    // LLM 폴링 즉시 시작 — 사용자가 음악 보는 동안 백그라운드에서 코멘트 미리 받아둠
    // (백엔드 BackgroundTask가 응답 직후부터 LLM 돌리고 있음)
    if(resultData.llm_pending){
      setTimeout(pollComments, 2000);  // 첫 폴링까지 2초 (백그라운드 시작 시간 여유)
    }
  } catch(err){
    clearTimeout(_tid);
    if(window._analysisTimerInterval){ clearInterval(window._analysisTimerInterval); window._analysisTimerInterval=null; }
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('main').style.display='flex';
    const msg = err.name === 'AbortError' ? '검색 시간이 너무 오래 걸렸어요. 잠시 후 다시 시도해주세요.' : err.message;
    document.getElementById('cards-panel').innerHTML=`
      <div class="error-box"><h2>분석 중 오류</h2><p>${msg}</p>
      <p style="margin-top:16px"><a href="/search.html${location.search}">← 조건 다시 입력</a></p></div>`;
  }
}

// LLM 댓글 폴링 — 백그라운드 완료 후 전체 카드 업데이트
// 추천(Sonnet)과 일반(Haiku) 둘 다 받음. 완료될 때까지 반복 폴링.
let _pollCount = 0;
const MAX_POLL = 72; // 최대 ~6분 후 자동 종료
async function pollComments(){
  if(!resultData || _pollCount >= MAX_POLL) return;
  // 백그라운드 탭에서는 카운트 증가 없이 간격만 늘림
  if(document.hidden){ setTimeout(pollComments, 15000); return; }
  _pollCount++;
  try{
    const pendingCards = resultData.cards.filter(c=>c.friend_comment == null || c.friend_comment === '');
    if(!pendingCards.length) return;
    // URL 길이 한계 대비: 최대 80개씩 끊어서 보냄
    const CHUNK = 80;
    let allComments = {};
    for(let i=0; i<pendingCards.length; i+=CHUNK){
      const slice = pendingCards.slice(i, i+CHUNK);
      const keys = slice.map(c=>`${c.apt_seq}:${c.pyeong_type||''}`).join(',');
      const res = await fetch(`/api/comments?wp_id=${resultData.wp_id}&keys=${encodeURIComponent(keys)}`,
        {headers:{'ngrok-skip-browser-warning':'1'}});
      if(res.ok) Object.assign(allComments, await res.json());
    }

    let updated = false;
    resultData.cards.forEach(c=>{
      const ck = `${c.apt_seq}:${c.pyeong_type||''}`;
      if(allComments[ck] && (c.friend_comment == null || c.friend_comment === '')){
        c.friend_comment = allComments[ck].comment;
        updated = true;
      }
    });
    if(updated && panelMode==='list') renderCards(resultData);

    // 남은 게 있으면 또 폴링 (5초 간격으로 빠르게)
    const remaining = resultData.cards.filter(c=>!c.friend_comment).length;
    if(remaining) setTimeout(pollComments, 5000);
  } catch(e){
    console.warn('댓글 폴링 실패', e);
    setTimeout(pollComments, 10000);
  }
}

function onSearchDone(){
  // 모든 진행 단계 완료 표시 (AI 코멘트는 백그라운드 계속)
  const steps = document.querySelectorAll('.progress-step');
  steps.forEach(s=>{ s.classList.remove('active'); s.classList.add('done'); });
  // 마지막 단계는 active 유지 (AI가 백그라운드로 계속 돌아감)
  if(steps[2]){ steps[2].classList.remove('done'); steps[2].classList.add('active'); }
  document.querySelectorAll('.progress-connector').forEach((c,i)=>{
    c.classList.remove('in-progress');
    if(i===0) c.classList.add('done');
    else c.classList.add('in-progress');  // 2번째 커넥터는 진행 중 애니메이션 유지
  });

  document.getElementById('loading-title').textContent = '분석 완료';
  document.getElementById('loading-title').classList.add('done');
  const cnt = resultData.cards.length;
  document.getElementById('loading-subtitle').innerHTML =
    `<strong class="num">${cnt.toLocaleString()}개</strong> 매물을 찾았어요.`;
  document.getElementById('done-btn').classList.add('show');
  // ⏱ 개발용 타이머 정지 + 최종 시간 표시 (배포 전 제거 예정)
  if(window._analysisTimerInterval){ clearInterval(window._analysisTimerInterval); window._analysisTimerInterval=null; }
  const _tEl = document.getElementById('analysis-timer');
  if(_tEl) _tEl.textContent = '⏱ 분석 완료 — ' + (performance.now()/1000).toFixed(1) + '초';
  // 자동 전환 제거 — 아래 '결과 보기' 버튼을 눌러야 결과로 넘어감
}

//  통계 패널 (인사이트 3줄)
// ═══════════════════════════════════════════════════════
function renderStatsPanel(data){
  const s = data.stats || {};
  if(!s.total) return '';

  // 통근 × 평균가 — 범례와 동일한 색상 적용
  // 라벨 포맷에 무관하게 시작 숫자로 색상 결정
  const bucketColor = lbl => {
    if (!lbl || /이내|이하|^≤/.test(lbl)) return '#FF6FB5'; // ≤30분 → 핑크
    const start = parseInt((lbl.match(/^(\d+)/) || [])[1] || '99');
    if (start <= 31) return '#C45ED6'; // 31~45분 → 퍼플
    if (start <= 45) return '#7C3FE6'; // 46~60분 → 바이올렛
    return '#7C3FE6';
  };
  // 라벨을 범례 텍스트로 정규화
  const bucketLabel = lbl => {
    if (!lbl || /이내|이하|^≤/.test(lbl)) return '30분 이하';
    const start = parseInt((lbl.match(/^(\d+)/) || [])[1] || '99');
    if (start <= 31) return '31~45분';
    return '46~60분';
  };
  let curveHtml = '';
  if(s.commute_curve && s.commute_curve.length){
    const maxPrice = Math.max(...s.commute_curve.map(b=>b.avg_price||0));
    const rows = s.commute_curve.map(b=>{
      const pct = maxPrice ? Math.max(8, Math.round((b.avg_price||0)/maxPrice*100)) : 0;
      const color = bucketColor(b.label||'');
      return `<div class="minibar-row">
        <span class="minibar-row__dot" style="background:${color}"></span>
        <span class="minibar-row__label num">${escHtml(bucketLabel(b.label||''))}</span>
        <div class="minibar-row__track"><div class="minibar-row__fill" style="width:${pct}%;background:${color}"></div></div>
        <span class="minibar-row__value num">${shortPrice(b.avg_price).replace('억','')}</span>
      </div>`;
    }).join('');
    curveHtml = `<div class="stats-block">
      <div class="stats-block__label">통근시간 × 평균가<span class="stats-block__label-helper">단위: 억</span></div>
      ${rows}
    </div>`;
  }

  // 평형 분포 — 컴팩트 그리드
  let ptHtml = '';
  if(s.pyeong_breakdown && s.pyeong_breakdown.length){
    const cells = s.pyeong_breakdown.map(p=>`
      <div class="pyeong-grid__cell">
        <div class="pyeong-grid__pt">${escHtml(p.pyeong_type)}</div>
        <div class="pyeong-grid__val num">${shortPrice(p.avg_price)}</div>
        <div class="pyeong-grid__cnt num">${p.count}건</div>
      </div>`).join('');
    ptHtml = `<div class="stats-block">
      <div class="stats-block__label">평형 분포 · 평균가</div>
      <div class="pyeong-grid">${cells}</div>
    </div>`;
  }

  // 연식 분포 — stacked bar + legend
  let ageHtml = '';
  if(s.age_breakdown){
    const a = s.age_breakdown;
    const total = (a.new_10||0) + (a.mid_20||0) + (a.old||0) + (a.unknown||0);
    if(total){
      const pct = (n)=>(n||0)/total*100;
      const segs = [];
      if(a.new_10)  segs.push(`<div class="stacked-bar__seg s-new" style="width:${pct(a.new_10)}%"></div>`);
      if(a.mid_20)  segs.push(`<div class="stacked-bar__seg s-mid" style="width:${pct(a.mid_20)}%"></div>`);
      if(a.old)     segs.push(`<div class="stacked-bar__seg s-old" style="width:${pct(a.old)}%"></div>`);
      if(a.unknown) segs.push(`<div class="stacked-bar__seg s-unknown" style="width:${pct(a.unknown)}%"></div>`);
      const legend = [];
      if(a.new_10)  legend.push(`<span class="stacked-legend__item"><span class="stacked-legend__dot s-new"></span>신축 10년↓ <strong class="stacked-legend__count num">${a.new_10}</strong></span>`);
      if(a.mid_20)  legend.push(`<span class="stacked-legend__item"><span class="stacked-legend__dot s-mid"></span>준신축 20년↓ <strong class="stacked-legend__count num">${a.mid_20}</strong></span>`);
      if(a.old)     legend.push(`<span class="stacked-legend__item"><span class="stacked-legend__dot s-old"></span>구축 <strong class="stacked-legend__count num">${a.old}</strong></span>`);
      if(a.unknown) legend.push(`<span class="stacked-legend__item"><span class="stacked-legend__dot s-unknown"></span>미상 <strong class="stacked-legend__count num">${a.unknown}</strong></span>`);
      ageHtml = `<div class="stats-block">
        <div class="stats-block__label">연식 분포</div>
        <div class="stacked-bar">${segs.join('')}</div>
        <div class="stacked-legend">${legend.join('')}</div>
      </div>`;
    }
  }

  return `<div class="stats-panel">
    <div class="stats-panel__top">
      <span class="stats-panel__count num">${s.total}<span class="unit">개</span></span>
      <span class="stats-panel__avg">평균 <strong class="num">${shortPrice(s.avg_price)}</strong></span>
    </div>
    ${curveHtml}
    ${ptHtml}
    ${ageHtml}
  </div>`;
}

function fmtTradeAmount(manwon){
  if(!manwon) return '-';
  const e=Math.floor(manwon/10000);
  const rem=manwon%10000;
  const chon=Math.round(rem/1000);
  if(chon===0) return `${e}억`;
  if(chon===10) return `${e+1}억`;
  return `${e}억 ${chon}천`;
}

// spec-38: 선택 단지 핀 강조 (지도에서 식별)
let _activeAptOverlay = null;
let _activeAptPrevZ = null;
function setActiveAptPin(aptSeq){
  // 이전 강조 해제 + zIndex 원복
  document.querySelectorAll('.pin.pin-selected').forEach(p => p.classList.remove('pin-selected'));
  if(_activeAptOverlay && _activeAptPrevZ != null && _activeAptOverlay.setZIndex){
    _activeAptOverlay.setZIndex(_activeAptPrevZ);
  }
  _activeAptOverlay = null; _activeAptPrevZ = null;
  if(!aptSeq) return;
  // 핀 DOM 강조 (선택자 이스케이프 회피 위해 data-attr 순회)
  document.querySelectorAll('.pin[data-apt-seq]').forEach(p => {
    if(p.dataset.aptSeq === String(aptSeq)) p.classList.add('pin-selected');
  });
  // 오버레이 최상단으로
  const overlay = aptOverlayMap[aptSeq];
  if(overlay && overlay.setZIndex){
    _activeAptPrevZ = overlay.getZIndex ? overlay.getZIndex() : 5;
    overlay.setZIndex(200);
    _activeAptOverlay = overlay;
  }
}
function clearActiveAptPin(){ setActiveAptPin(null); }

  // 사이드 패널 먼저 열기 → relayout → setCenter (패널 열린 후 실제 지도 영역 기준으로 정중앙)
  document.getElementById('detail-panel').classList.add('open');

  document.body.style.overflow = '';
  if (kakaoMap && resultData) {
    const card = resultData.cards.find(c => c.apt_seq === aptSeq);
    if (card && card.lat && card.lng) {
      kakaoMap.relayout();
      kakaoMap.setCenter(new kakao.maps.LatLng(card.lat, card.lng));
    }
  }
  document.getElementById('detail-title').textContent = '불러오는 중...';

  });
  document.getElementById('detail-tab-info').classList.add('active');
  document.querySelectorAll('.detail-tab-btn').forEach((b,i) => b.classList.toggle('active', i===0));

  if (_detailCache[aptSeq]) { _renderDetail(_detailCache[aptSeq]); return; }

  const wpId = window._lastWpId || 0;
  fetch(`/api/apt/${encodeURIComponent(aptSeq)}/detail?wp_id=${wpId}`)
    .then(r => r.json())
    .then(data => { _detailCache[aptSeq] = data; _renderDetail(data); })
    .catch(() => { loading.textContent = '불러오기 실패. 다시 시도해 주세요.'; });
}

// ── spec-12 Phase 2: 모바일 바텀시트 헤더를 아래로 스와이프 → 닫기 ──
// 헤더(그립바)만 대상이라 본문 스크롤과 충돌 없음. 데스크톱은 matchMedia
// 가드로 touchstart에서 즉시 종료 → PC 동작/렌더 무영향 (순수 추가).
(function initMobileSheetSwipe() {
  const mq = window.matchMedia('(max-width: 767px)');
  const panel = document.getElementById('detail-panel');
  if (!panel) return;
  const header = panel.querySelector('.detail-panel__header');
  if (!header) return;
  let startY = 0, dy = 0, dragging = false;
  const CLOSE_PX = 100;

  header.addEventListener('touchstart', (e) => {
    if (!mq.matches || !panel.classList.contains('open')) return;  // 데스크톱/닫힘 무동작
    startY = e.touches[0].clientY; dy = 0; dragging = true;
    panel.style.transition = 'none';
  }, { passive: true });

  header.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    dy = e.touches[0].clientY - startY;
    if (dy < 0) dy = 0;                       // 아래로만 따라감
    panel.style.transform = `translateY(${dy}px)`;
  }, { passive: true });

  function end() {
    if (!dragging) return;
    dragging = false;
    panel.style.transition = '';              // CSS 전환 복원
    panel.style.transform = '';               // 인라인 제거 → CSS 클래스가 제어
    if (dy > CLOSE_PX && typeof closeDetail === 'function') closeDetail();  // 닫기
    dy = 0;                                    // 임계 미달 시 .open이 제자리 스냅백
  }
  header.addEventListener('touchend', end, { passive: true });
  header.addEventListener('touchcancel', end, { passive: true });
})();

let _chatAptSeq = null, _chatPyeongType = null, _chatHistory = [];
let _chatAttachment = null;  // spec-27: {type, media_type, data (base64), filename}

function _onChatFileSelected(e) {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  if (file.size > 3 * 1024 * 1024) {
    alert('파일이 너무 커요. 3MB 이하만 첨부 가능해요.');
    return;
  }
  const reader = new FileReader();
  reader.onload = ev => {
    const [meta, b64] = ev.target.result.split(',');
    const mediaType = (meta.match(/data:([^;]+)/) || [])[1] || 'application/octet-stream';
    _chatAttachment = {
      type: file.type.startsWith('image/') ? 'image' : 'document',
      media_type: mediaType, data: b64, filename: file.name,
    };
    _renderChatAttachment();
  };
  reader.readAsDataURL(file);
}

function _renderChatAttachment() {
  const bar = document.getElementById('chat-attachment-bar');
  if (!bar) return;
  if (!_chatAttachment) { bar.innerHTML = ''; return; }
  const isImg = _chatAttachment.type === 'image';
  bar.innerHTML = `<div class="chat-attach-preview">
    ${isImg ? `<img src="data:${_chatAttachment.media_type};base64,${_chatAttachment.data}" alt="첨부">` : ''}
    <span>${isImg ? '이미지 첨부됨' : escHtml(_chatAttachment.filename)}</span>
    <button onclick="_clearChatAttachment()">✕</button>
  </div>`;
}

function _clearChatAttachment() {
  _chatAttachment = null;
  _renderChatAttachment();
}

// spec-25: Claude가 실제로 답변 가능한 질문으로 구성
const CHAT_SUGGESTIONS = [
  '최근 시세 트렌드 어때?',
  '주변 단지 대비 시세는?',
  '실거래 최근 거래 어때?',
  '주차·교통 편해?',

];

function _openChatFromEl(el) {
  openFriendChat(el.dataset.aptSeq, el.dataset.aptNm, el.dataset.pyeongType || '',

}

function _renderChips(questions) {
  const sugBox = document.getElementById('chat-suggestions');
  sugBox.innerHTML = questions.map(q =>
    `<button class="chat-chip">${escHtml(q)}</button>`
  ).join('');
  sugBox.querySelectorAll('.chat-chip').forEach(btn => {
    btn.addEventListener('click', () => sendChatMessage(btn.textContent.trim()));
  });
}

function openFriendChat(aptSeq, aptNm, pyeongType, lat, lng) {
  _chatAptSeq = aptSeq; _chatPyeongType = pyeongType; _chatHistory = [];
  document.getElementById('chat-apt-name').textContent = aptNm || '';
  const msgBox = document.getElementById('chat-messages');
  msgBox.innerHTML = '';

  // F1(spec-24): 호가 링크 바 — lat/lng 좌표로 단지 위치 직접 열기 (zoom 17)
  const _ms = (lat && lng) ? `${lat},${lng},17` : '37.5,127,13';
  const naverUrl = `https://new.land.naver.com/complexes?ms=${_ms}&a=APT:ABYG:JGC:DDDAPT&e=RETAIL`;
  const hoUrl    = `https://hogangnono.com/`;
  document.getElementById('chat-price-links').innerHTML =
    `<span class="chat-price-links__label">호가 보기:</span>` +
    `<a href="${naverUrl}" target="_blank" rel="noopener" title="${escHtml(aptNm||'')} 위치로 이동">네이버부동산</a>` +
    `<a href="${hoUrl}" target="_blank" rel="noopener" title="호갱노노에서 직접 검색">호갱노노</a>`;

  // spec-23: localStorage 대화 복원 (24시간 TTL, 최대 10턴)
  try {
    const saved = localStorage.getItem(`chat_${aptSeq}`);
    if (saved) {
      const parsed = JSON.parse(saved);
      if (Date.now() - parsed.ts < 86400000) {
        _chatHistory = parsed.history || [];
        _chatHistory.forEach(m => {
          _appendChatMsg(m.role, escHtml(m.content).replace(/\n/g, '<br>'));
        });
      }
    }
  } catch(e) {}

  _renderChips(CHAT_SUGGESTIONS);
  document.getElementById('chat-suggestions').style.display = '';
  document.getElementById('chat-panel').classList.remove('hidden');
  document.getElementById('chat-input').focus();
}

function closeFriendChat() {
  document.getElementById('chat-panel').classList.add('hidden');
  try {
    if (_chatAptSeq && _chatHistory.length) {
      localStorage.setItem(`chat_${_chatAptSeq}`, JSON.stringify({
        ts: Date.now(), history: _chatHistory.slice(-10),
      }));
    }
  } catch(e) {}
  _chatHistory = [];
}

async function sendChatMessage(text) {
  const input = document.getElementById('chat-input');
  const message = (text || input.value).trim();
  if (!message || !_chatAptSeq) return;
  input.value = '';
  _appendChatMsg('user', escHtml(message));
  const loadId = 'cl-' + Date.now();
  _appendChatMsg('assistant', '<span class="spinner-mini"></span> 생각 중...', loadId);
  try {
    const res = await fetch(`/api/apt/${_chatAptSeq}/chat`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'ngrok-skip-browser-warning': '1'},
      body: JSON.stringify({
        pyeong_type: _chatPyeongType, message, history: _chatHistory,
        attachments: _chatAttachment ? [_chatAttachment] : null,
      }),
    });
    _clearChatAttachment();  // 전송 직후 첨부 초기화

    const box = document.getElementById('chat-messages');
    const bubble = document.getElementById(loadId);   // '생각 중...' 말풍선 재사용
    let acc = '';
    let suggestions = [];
    let started = false;
    const _render = () => { if (bubble) bubble.innerHTML = escHtml(acc).replace(/\n/g, '<br>'); };

    if (!res.body || !res.body.getReader) {
      // 스트리밍 미지원 환경 폴백 — JSON 한 번에 수신
      const data = await res.json().catch(() => ({}));
      acc = data.reply || '잠깐, 다시 시도해봐.';
      suggestions = data.suggestions || [];
      _render();
    } else {
      // SSE 스트림 파싱 (data: {json}\n\n)
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        buf += decoder.decode(value, {stream: true});
        const parts = buf.split('\n\n');
        buf = parts.pop();
        for (const part of parts) {
          const line = part.trim();
          if (!line.startsWith('data:')) continue;
          let payload;
          try { payload = JSON.parse(line.slice(5).trim()); } catch { continue; }
          if (payload.type === 'delta') {
            if (!started) { started = true; if (bubble) bubble.innerHTML = ''; }
            acc += payload.text;
            _render();
          } else if (payload.type === 'done') {
            suggestions = payload.suggestions || [];
          } else if (payload.type === 'error') {
            if (!acc) { acc = payload.message || '에러가 났어. 잠깐 기다려봐.'; _render(); }
          }
        }
        box.scrollTop = box.scrollHeight;
      }
    }

    if (bubble) bubble.removeAttribute('id');
    const reply = acc || '잠깐, 다시 시도해봐.';
    if (bubble && !acc) bubble.innerHTML = escHtml(reply).replace(/\n/g, '<br>');
    box.scrollTop = box.scrollHeight;

    _chatHistory.push({role:'user', content: message}, {role:'assistant', content: reply});
    if (_chatHistory.length > 20) _chatHistory = _chatHistory.slice(-20);
    try {
      localStorage.setItem(`chat_${_chatAptSeq}`, JSON.stringify({
        ts: Date.now(), history: _chatHistory.slice(-10),
      }));
    } catch(e) {}
    // F2(spec-24): 동적 Chip 갱신
    if (suggestions && suggestions.length) {
      _renderChips(suggestions);
    }
  } catch {
    document.getElementById(loadId)?.remove();
    _appendChatMsg('assistant', '에러가 났어. 잠깐 기다려봐.');
  }
}

function _appendChatMsg(role, html, id) {
  const box = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `chat-msg chat-msg--${role}`;
  if (id) div.id = id;
  div.innerHTML = html;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

  if (resultData && resultData.cards) {
    resultData.cards = resultData.cards.filter(c => !c._isLookup || c.apt_seq !== aptSeq);
    resultData.cards.push({
      apt_seq: r.apt_seq, apt_nm: r.apt_nm, pyeong_type: r.pyeong_type,
      price_low: r.price_low, price_high: r.price_high,
      total_time_min: r.transit_min, lat: r.lat, lng: r.lng,
      kaptdaCnt: r.kaptdaCnt, build_year: r.build_year, _isLookup: true,
    });
  }

  // aptGroupMap에 추가 (핀 클릭 이벤트 위임 처리용)
  aptGroupMap[aptSeq] = aptGroupMap[aptSeq] || {
    apt_seq: r.apt_seq, apt_nm: r.apt_nm, lat: r.lat, lng: r.lng,
    umd_nm: r.umd_nm, kaptdaCnt: r.kaptdaCnt, build_year: r.build_year,
    any_recommended: false,
    cards: [{ apt_seq: r.apt_seq, apt_nm: r.apt_nm, pyeong_type: r.pyeong_type,
               price_low: r.price_low, total_time_min: r.transit_min }],
  };

  // 기존 직접 검색 핀 제거 → 새 핀 추가
  if (_lookupOverlay) { _lookupOverlay.setMap(null); _lookupOverlay = null; }
  if (kakaoMap && r.lat && r.lng) {
    kakaoMap.panTo(new kakao.maps.LatLng(r.lat, r.lng));
    const pinText = `${escHtml(r.apt_nm.slice(0,6))} ${r.transit_min ? r.transit_min+'분' : '?'}`;
    _lookupOverlay = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(r.lat, r.lng),
      content: `<div class="pin pin-lookup" data-apt-seq="${r.apt_seq}">${pinText}</div>`,
      yAnchor: 1, zIndex: 100,
    });
    _lookupOverlay.setMap(kakaoMap);
  }

  // 상세 패널 열기
  showDetail(aptSeq, window._lastWpId || 0);
}

// ── spec-26: 아파트 직접 검색 (자동완성) ────────────────────────
let _aptSearchDebounce = null;
let _aptDropdownData   = [];

function _onAptSearchInput() {
  const val = (document.getElementById('apt-search-input')?.value || '').trim();
  if (val.length < 2) { _hideAptDropdown(); return; }

  // 1) 현재 결과 카드에서 즉시 검색 (항상 동작)
  const cardHits = _searchInCards(val);
  _showAptDropdown(cardHits, val, true);

  // 2) DB 에서 추가 검색 (300ms 디바운스)
  clearTimeout(_aptSearchDebounce);
  _aptSearchDebounce = setTimeout(() => _fetchAptSuggestions(val, cardHits), 300);
}

function _searchInCards(query) {
  const q = query.toLowerCase();
  return (window._lastCards || [])
    .filter(c => c.apt_nm?.toLowerCase().includes(q))
    .slice(0, 5)
    .map(c => ({
      apt_seq: c.apt_seq, apt_nm: c.apt_nm, umd_nm: c.umd_nm,
      lat: c.lat, lng: c.lng, kaptdaCnt: c.kaptdaCnt, build_year: c.build_year,
      pyeong_type: c.pyeong_type, price_low: c.price_low, price_high: c.price_high,
      transit_min: c.total_time_min, _inResult: true,
    }));
}

async function _fetchAptSuggestions(name, cardHits) {
  const wpId       = window._lastWpId || 0;
  const pyeongType = window._lastSearchData?.search_params?.pyeong_types?.[0] || '20평대';
  try {
    const res = await fetch(
      `/api/search/apt-lookup?name=${encodeURIComponent(name)}&wp_id=${wpId}&pyeong_type=${encodeURIComponent(pyeongType)}`,
      { headers: { 'ngrok-skip-browser-warning': '1' } }
    );
    const data = await res.json();
    const seenSeqs = new Set(cardHits.map(r => r.apt_seq));
    const extra = (data.results || []).filter(r => !seenSeqs.has(r.apt_seq));
    _showAptDropdown([...cardHits, ...extra], name, false);
  } catch(e) {
    _showAptDropdown(cardHits, name, false);
  }
}

function _showAptDropdown(results, query, loading) {
  _aptDropdownData = results;
  const drop = document.getElementById('apt-search-dropdown');
  if (!drop) return;
  if (!results.length && !loading) {
    drop.innerHTML = `<div class="apt-dropdown-empty">「${escHtml(query)}」 결과 없음</div>`;
    drop.style.display = 'block';
    return;
  }
  drop.innerHTML = results.map((r, i) =>
    `<div class="apt-dropdown-item" data-idx="${i}">
      <span class="apt-dropdown-nm">${escHtml(r.apt_nm)}
        ${r._inResult ? '<span class="apt-dropdown-tag">결과 내</span>' : ''}
      </span>
      <span class="apt-dropdown-meta">${escHtml(r.umd_nm || '')}</span>
    </div>`
  ).join('') + (loading ? '<div class="apt-dropdown-loading">검색 중…</div>' : '');
  drop.querySelectorAll('.apt-dropdown-item').forEach(el => {
    el.addEventListener('click', () => _selectAptResult(_aptDropdownData[+el.dataset.idx]));
  });
  drop.style.display = 'block';
}

function _hideAptDropdown() {
  const drop = document.getElementById('apt-search-dropdown');
  if (drop) drop.style.display = 'none';
}

function _selectAptResult(r) {
  const inp = document.getElementById('apt-search-input');
  if (inp) inp.value = r.apt_nm;
  _hideAptDropdown();
  const resultDiv = document.getElementById('apt-search-result');
  if (resultDiv) resultDiv.innerHTML = renderAptLookupCard(r);
}

function renderAptLookupCard(r) {
  function _fmt(v) {
    if (!v) return '-';
    const e = Math.floor(v / 10000), m = v % 10000;
    return e ? `${e}억${m ? ` ${m.toLocaleString()}만` : ''}` : `${v.toLocaleString()}만`;
  }
  const thisYear = new Date().getFullYear();

  // 가격 (범위)
  const priceHtml = (r.price_low && r.price_high && r.price_low !== r.price_high)
    ? `${_fmt(r.price_low)}<span style="font-size:12px;font-weight:400;color:#aaa"> ~ ${_fmt(r.price_high)}</span>`
    : _fmt(r.price_low || r.price_high);

  // 통근 버킷
  let bucketLabel = '시간 미조회';
  if (r.transit_min != null) {
    if      (r.transit_min <= 30) bucketLabel = '30분 이내';
    else if (r.transit_min <= 40) bucketLabel = '30~40분';
    else if (r.transit_min <= 50) bucketLabel = '40~50분';
    else                           bucketLabel = '50~60분';
  }

  const meta = [r.umd_nm, r.kaptdaCnt ? `${r.kaptdaCnt.toLocaleString()}세대` : null]
    .filter(Boolean).join(' · ');

  const transitChip = r.transit_min
    ? `<span class="reason-chip reason-chip--info">통근 약 ${r.transit_min}분</span>` : '';
  const yearChip = r.build_year
    ? `<span class="reason-chip reason-chip--neutral">${r.build_year}년 (${thisYear - r.build_year}년차)</span>` : '';

  // 클릭·핀 이벤트용 캐시 저장
  _lookupResultCache[r.apt_seq] = r;

  const favActive = (typeof isFav === 'function' && isFav(r.apt_seq, r.pyeong_type)) ? ' active' : '';
  const favTitle  = favActive ? '관심 해제' : '관심 추가';

  return `<div class="rec-card" style="border:2px solid var(--color-brand-primary)">
    <button class="fav-btn${favActive}"
      onclick="toggleFav('${escHtml(r.apt_seq)}','${escHtml(r.pyeong_type||'')}',this,event)"
      title="${favTitle}">♥</button>
    <span class="rec-card__slot">직접 검색<span class="rec-card__slot-divider"></span>${escHtml(r.pyeong_type||'')}</span>
    <div class="rec-card__title-row">
      <h3 class="rec-card__title" style="cursor:pointer;text-decoration:underline dotted"
        onclick="_openLookupDetail('${escHtml(r.apt_seq)}')" title="지도에서 보기">${escHtml(r.apt_nm)}</h3>
      <div class="rec-card__price">${priceHtml}</div>
    </div>
    <div class="rec-card__meta num">${escHtml(meta)}</div>
    <div class="rec-card__reasons">${transitChip}${yearChip}</div>
    <div style="display:flex;justify-content:flex-end;margin-top:8px">
      <button class="apt-lookup-card__chat"
        data-apt-seq="${r.apt_seq}" data-apt-nm="${escHtml(r.apt_nm)}"
        data-pyeong-type="${escHtml(r.pyeong_type)}"
        data-lat="${r.lat||''}" data-lng="${r.lng||''}"
        onclick="_openChatFromEl(this)">친구에게 물어보기</button>
    </div>
  </div>`;
}

function clearPoiMarker() {  // spec-40: 전체 제거 (단지 전환/패널 닫기 시)
  if (_poiInfoWindow) { _poiInfoWindow.close(); _poiInfoWindow = null; }
  _poiMarkers.forEach(({ overlay }, row) => {
    overlay.setMap(null);
    if (row && row.classList) row.classList.remove('poi-active');
  });
  _poiMarkers.clear();
}

// spec-40: 아파트를 지도 정중앙에 고정 + 활성 POI를 모두 포함하도록 줌 맞춤
function _recenterApt() {
  if (!kakaoMap) return;
  const card = resultData && resultData.cards
    ? resultData.cards.find(c => c.apt_seq === _currentAptSeq) : null;
  if (!card || !card.lat || !card.lng) return;
  const aptLat = card.lat, aptLng = card.lng;
  if (_poiMarkers.size === 0) {
    kakaoMap.setCenter(new kakao.maps.LatLng(aptLat, aptLng));
    return;
  }
  // 아파트를 중심으로 좌우·상하 대칭 범위 → 아파트가 항상 정중앙에 유지됨
  let maxLatD = 0, maxLngD = 0;
  _poiMarkers.forEach(({ pos }) => {
    maxLatD = Math.max(maxLatD, Math.abs(pos.getLat() - aptLat));
    maxLngD = Math.max(maxLngD, Math.abs(pos.getLng() - aptLng));
  });
  const pad = 1.3, eps = 0.0006;  // 핀 말풍선 여백
  const sw = new kakao.maps.LatLng(aptLat - maxLatD*pad - eps, aptLng - maxLngD*pad - eps);
  const ne = new kakao.maps.LatLng(aptLat + maxLatD*pad + eps, aptLng + maxLngD*pad + eps);
  kakaoMap.setBounds(new kakao.maps.LatLngBounds(sw, ne));
}

function togglePoiMarker(row) {
  // 이미 표시 중인 시설을 다시 클릭 → 해당 핀만 제거 (토글 off)
  if (_poiMarkers.has(row)) {
    _poiMarkers.get(row).overlay.setMap(null);
    _poiMarkers.delete(row);
    row.classList.remove('poi-active');
    _recenterApt();
    return;
  }
  row.classList.add('poi-active');
  const poiName = row.dataset.poiName;
  const walkMin = parseInt(row.dataset.walkMin, 10) || 0;
  const distM   = parseInt(row.dataset.distM,  10) || 0;
  showPoiMarker(row, poiName, walkMin, distM);
}

function showPoiMarker(row, poiName, walkMin, distM) {
  if (!kakaoMap || !poiName) { if (row) row.classList.remove('poi-active'); return; }
  const card = resultData && resultData.cards
    ? resultData.cards.find(c => c.apt_seq === _currentAptSeq)
    : null;
  if (!card || !card.lat || !card.lng) { row.classList.remove('poi-active'); return; }

  const distLabel = distM >= 1000 ? `${(distM/1000).toFixed(1)}km` : `${distM}m`;
  const walkLabel = walkMin ? `도보 ${walkMin}분 · ` : '';
  // spec-41: 넓은 시설(캠퍼스·역사)은 등록 좌표가 도보거리보다 멀 수 있어 반경을 넉넉히.
  //  (이름 검증 + 거리순 정렬로 정확도 확보, 반경은 다른 지역 오매칭만 차단)
  const searchRadius = Math.min(Math.max(distM * 2 + 1500, 2000), 8000);

  const loc = new kakao.maps.LatLng(card.lat, card.lng);
  const ps = new kakao.maps.services.Places();
  const opts = { location: loc, radius: searchRadius, sort: kakao.maps.services.SortBy.DISTANCE };

  function place(doc) {
    const pos = new kakao.maps.LatLng(parseFloat(doc.y), parseFloat(doc.x));
    const overlay = new kakao.maps.CustomOverlay({
      position: pos,
      map: kakaoMap,
      yAnchor: 1.0,
      content: `<div class="poi-custom-pin">
        <div class="poi-pin__bubble">
          <div class="poi-pin__name">${escHtml(poiName)}</div>
          <div class="poi-pin__dist">${walkLabel}${distLabel}</div>
        </div>
        <div class="poi-pin__stem"></div>
        <div class="poi-pin__dot"></div>
      </div>`,
    });
    _poiMarkers.set(row, { overlay, pos });  // spec-40: 핀 유지(다중)
    _recenterApt();                          // 아파트 정중앙 고정 + 활성 핀 모두 보이게
  }

  // spec-39/41: 이름 검증 후 배치. 풀네임 검색 → 일치 없으면 폴백 질의 재검색 →
  //  그래도 없으면 틀린 핀 대신 안내(모르면 모른다). 최근접 무검증(data[0]) 폐기.
  //  폴백 질의: "안암역 3번출구"처럼 다단어면 첫 단어("안암역")로, 아니면 앞 6글자로 재검색.
  const firstToken = poiName.split(/\s+/)[0];
  const fbQuery = (firstToken && firstToken.length >= 2 && firstToken !== poiName)
    ? firstToken : (poiName.length > 4 ? poiName.substring(0, 6) : null);

  function fail() {
    row.classList.remove('poi-active');  // 핀 없이 활성표시만 남는 것 방지
    _poiNotice('지도에서 위치를 확인하지 못했습니다');
  }

  ps.keywordSearch(poiName, (data, status) => {
    const best = (status === kakao.maps.services.Status.OK && data.length)
      ? _pickBestPoi(data, poiName) : null;
    if (best) { place(best); return; }
    if (!fbQuery) { fail(); return; }
    ps.keywordSearch(fbQuery, (d2, s2) => {
      const b2 = (s2 === kakao.maps.services.Status.OK && d2.length)
        ? _pickBestPoi(d2, poiName) : null;
      if (b2) place(b2); else fail();
    }, opts);
  }, opts);
}

// spec-39/41: POI 마커 위치 신뢰성 헬퍼 ──────────────────────
function _normName(s){ return (s||'').replace(/\s+/g,'').toLowerCase(); }
// Kakao 검색 결과(거리순 정렬됨) 중 우리 이름과 일치하는 가장 가까운 시설을 고른다.
//  1순위 정확 일치, 2순위 부분 일치(한쪽이 다른쪽을 포함). 없으면 null.
//  거리 검증은 하지 않는다 — 넓은 시설(캠퍼스·역사)의 등록 좌표는 도보 기준점과
//  멀 수 있어 거리로 거르면 정상 시설이 탈락한다(spec-41). 지리 제약은 검색 반경이 담당.
function _pickBestPoi(data, poiName){
  const target = _normName(poiName);
  let exact = null, partial = null;
  for (const d of data){            // data는 location 기준 거리순 → 앞쪽이 더 가까움
    const cand = _normName(d.place_name);
    if (!cand) continue;
    if (cand === target){ if (!exact) exact = d; continue; }
    if (!partial && cand.length >= 2 && (cand.includes(target) || target.includes(cand)))
      partial = d;
  }
  return exact || partial || null;  // 이름 무관한 최근접(data[0]) 무검증 배치는 금지
}
// 틀린 핀 대신 짧은 안내 (모르면 모른다)
let _poiNoticeTimer = null;
function _poiNotice(msg){
  let el = document.getElementById('poi-notice');
  if (!el) {
    el = document.createElement('div');
    el.id = 'poi-notice';
    el.className = 'poi-notice';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_poiNoticeTimer);
  _poiNoticeTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

// ── 패널 리사이즈 핸들 (spec-19) ─────────────────────────────
(function initResizeHandle() {
  const handle  = document.getElementById('resize-handle');
  const left    = document.querySelector('.left-panel');
  const layout  = document.querySelector('.result-layout');
  if (!handle || !left || !layout) return;

  let dragging = false;
  let startX   = 0;
  let startW   = 0;

  handle.addEventListener('mousedown', e => {
    dragging = true;
    startX   = e.clientX;
    startW   = left.getBoundingClientRect().width;
    handle.classList.add('dragging');
    document.body.style.userSelect = 'none';
    document.body.style.cursor     = 'col-resize';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const layoutW = layout.getBoundingClientRect().width;
    const minLeft = 280, minRight = 320, handleW = 8;
    const maxW = layoutW - minRight - handleW;
    const newW = Math.max(minLeft, Math.min(maxW, startW + e.clientX - startX));
    left.style.width = newW + 'px';
    if (kakaoMap) kakaoMap.relayout();
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.userSelect = '';
    document.body.style.cursor     = '';
    if (kakaoMap) kakaoMap.relayout();
  });
})();

// ── 채팅 패널 좌측 드래그 리사이즈 ────────────────────────────────
(function() {
  const CHAT_W_KEY = 'chat_panel_w';
  const panel = document.getElementById('chat-panel');
  const handle = document.getElementById('chat-resize-handle');
  if (!panel || !handle) return;

  // 저장된 너비 복원
  const savedW = parseInt(localStorage.getItem(CHAT_W_KEY) || '0');
  if (savedW >= 320 && savedW <= 700) panel.style.width = savedW + 'px';

  let dragging = false, startX = 0, startW = 0;

  handle.addEventListener('mousedown', e => {
    dragging = true;
    startX   = e.clientX;
    startW   = panel.getBoundingClientRect().width;
    handle.classList.add('dragging');
    document.body.style.userSelect = 'none';
    document.body.style.cursor     = 'col-resize';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const minW = 320, maxW = Math.min(700, window.innerWidth * 0.65);
    // 왼쪽 드래그 → 너비 증가, 오른쪽 드래그 → 너비 감소
    const newW = Math.max(minW, Math.min(maxW, startW + (startX - e.clientX)));
    panel.style.width = newW + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.userSelect = '';
    document.body.style.cursor     = '';
    localStorage.setItem(CHAT_W_KEY, Math.round(panel.getBoundingClientRect().width));
  });
})();
