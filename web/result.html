<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BADUGI — 분석 결과</title>

  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css" />
  <link rel="stylesheet" href="/static/design-system/tokens.css">
  <link rel="stylesheet" href="/static/design-system/typography.css">
  <link rel="stylesheet" href="/static/design-system/motion.css">

  <!-- Chart.js — 상세 패널 차트 전용, 비동기 로드 (초기 렌더 불필요) -->
  <script async src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <!-- 카카오맵 SDK — 키는 백엔드(/api/kakao-sdk)가 .env의 KAKAO_JS_KEY로 주입 -->
  <script src="/api/kakao-sdk?libraries=services"></script>

  <style>
    /* ── 기본 레이아웃 ──────────────────────────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: 'SUIT', system-ui, sans-serif;
      background: var(--color-bg-base);
      color: var(--color-text-primary);
      height: 100vh; line-height: 1.5;
      display: flex; flex-direction: column;
      letter-spacing: -0.0025em;
      -webkit-font-smoothing: antialiased;
    }
    header {
      flex-shrink: 0; background: var(--color-bg-panel);
      padding: 16px 22px;
      border-bottom: 1px solid var(--color-border-strong);
      display: flex; align-items: center; gap: 20px;
    }
    header h1 {
      font-size: 20px; font-weight: 800;
      letter-spacing: -0.01em;
      background: var(--color-brand-gradient);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .back-link {
      color: var(--color-text-secondary); text-decoration: none;
      font-size: 14px; font-weight: 500;
    }
    .back-link:hover { color: var(--color-brand-primary); }

    .num { font-feature-settings: 'tnum'; font-variant-numeric: tabular-nums; }

    .partial-banner {
      margin: 12px 0; padding: 10px 14px;
      background: var(--color-warning-bg, #fff8e1);
      border-left: 3px solid var(--color-warning, #f59e0b);
      border-radius: 4px;
      font-size: 13px; color: var(--color-warning-text, #78350f);
      line-height: 1.5;
    }

    /* ════════════════════════════════════════════════════════
       [5] 로딩 오버레이 — 3단계 진행 표시
       ════════════════════════════════════════════════════════ */
    .loading-overlay {
      position: fixed; inset: 0; background: var(--color-bg-base); z-index: 1000;
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 24px 32px; overflow-y: auto;
    }
    .loading-overlay.hidden { display: none; }

    .loading-head {
      text-align: center; margin-bottom: 24px; max-width: 520px;
    }
    .loading-head h2 {
      font-size: 24px; font-weight: 700;
      letter-spacing: -0.015em;
      color: var(--color-text-primary);
      margin-bottom: 6px;
    }
    .loading-head h2.done { color: var(--color-brand-primary); }
    .loading-head p {
      font-size: 14px; color: var(--color-text-secondary);
      line-height: 1.55;
    }
    .loading-head p strong {
      color: var(--color-text-primary); font-weight: 600;
    }

    /* 진행 단계 */
    .progress-steps {
      display: flex; align-items: flex-start; justify-content: center;
      margin-bottom: 28px;
      font-feature-settings: 'tnum';
    }
    .progress-step {
      display: flex; flex-direction: column; align-items: center;
      gap: 6px; padding: 0 4px;
    }
    .progress-step__dot {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--color-bg-muted);
      border: 2px solid var(--color-border-default);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      color: var(--color-text-tertiary);
      position: relative;
      transition: all 200ms;
    }
    .progress-step.active .progress-step__dot {
      background: var(--color-brand-primary);
      border-color: var(--color-brand-primary);
      color: white;
      box-shadow: 0 0 0 4px var(--color-brand-bg-subtle);
    }
    .progress-step.done .progress-step__dot {
      background: var(--color-brand-primary);
      border-color: var(--color-brand-primary);
      color: white;
    }
    .progress-step.done .progress-step__dot .pn { display: none; }
    .progress-step.done .progress-step__dot::after {
      content: ''; position: absolute;
      width: 10px; height: 6px;
      border-left: 2px solid white;
      border-bottom: 2px solid white;
      transform: rotate(-45deg);
      margin-top: -2px;
    }
    .progress-step__label {
      font-size: 11.5px; font-weight: 600;
      color: var(--color-text-tertiary);
      white-space: nowrap;
    }
    .progress-step.active .progress-step__label { color: var(--color-brand-primary); }
    .progress-step.done .progress-step__label { color: var(--color-text-secondary); }
    .progress-connector {
      width: 56px; height: 2px;
      background: var(--color-border-default);
      margin-top: 12px;
      position: relative; overflow: hidden;
      border-radius: 2px;
    }
    .progress-connector.done { background: var(--color-brand-primary); }
    .progress-connector.in-progress::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, var(--color-brand-primary) 50%, transparent 50%);
      background-size: 200% 100%;
      animation: progress-flow 1.4s linear infinite;
    }
    @keyframes progress-flow {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 영상 + 플레이리스트 */
    .video-row {
      display: flex; gap: 16px; align-items: stretch;
      width: 100%; max-width: 640px;
    }
    .video-stage {
      flex-shrink: 0;
      width: 280px; aspect-ratio: 9/16;
      background: var(--color-bg-base);
      border-radius: 12px; overflow: hidden;
      position: relative;
      box-shadow: var(--shadow-xl);
    }
    .video-stage video { width: 100%; height: 100%; object-fit: cover; }
    .video-title {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 12px 14px 11px;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      color: white; font-size: 12.5px; font-weight: 500;
      letter-spacing: -0.005em;
    }
    .video-side {
      display: flex; flex-direction: column; gap: 10px;
      flex: 1; min-width: 0;
    }
    .mute-btn {
      padding: 10px 14px; background: var(--color-bg-panel);
      color: var(--color-text-primary);
      border: 1px solid var(--color-border-default);
      border-radius: 10px;
      font-family: inherit;
      font-size: 12.5px; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      transition: all 120ms;
    }
    .mute-btn:hover { background: var(--color-bg-subtle); }
    .mute-btn .mute-icon { font-size: 14px; }
    .mute-btn .mute-text { flex: 1; text-align: left; }
    .mute-btn.unmuted {
      background: var(--color-brand-bg-subtle);
      border-color: var(--color-brand-primary);
      color: var(--color-brand-primary);
    }
    .playlist {
      background: var(--color-bg-panel);
      border: 1px solid var(--color-border-default);
      border-radius: 10px; overflow: hidden;
      flex: 1; display: flex; flex-direction: column;
    }
    .playlist-head {
      padding: 10px 14px;
      font-size: 10px; font-weight: 700;
      color: var(--color-text-tertiary);
      letter-spacing: 0.12em; text-transform: uppercase;
      border-bottom: 1px solid var(--color-border-default);
      background: var(--color-bg-subtle);
      display: flex; justify-content: space-between; align-items: center;
    }
    .playlist-head .pl-count {
      letter-spacing: 0; text-transform: none;
      font-weight: 500;
      font-feature-settings: 'tnum';
    }
    .playlist-items {
      flex: 1; overflow-y: auto;
      max-height: 320px;
    }
    .playlist-item {
      padding: 9px 14px; font-size: 12.5px;
      color: var(--color-text-secondary);
      cursor: pointer;
      border-bottom: 1px solid var(--color-bg-muted);
      display: flex; align-items: center; gap: 8px;
      transition: background 120ms;
    }
    .playlist-item:last-child { border-bottom: none; }
    .playlist-item:hover { background: var(--color-bg-subtle); }
    .playlist-item.active {
      background: var(--color-brand-bg-subtle);
      color: var(--color-brand-primary);
      font-weight: 600;
    }
    .playlist-item .pl-num {
      font-size: 11px; font-weight: 500;
      width: 14px;
      color: var(--color-text-tertiary);
      font-feature-settings: 'tnum';
    }
    .playlist-item.active .pl-num { color: var(--color-brand-primary); }
    .playlist-item .pl-glyph { width: 8px; font-size: 9px; }

    .done-btn {
      margin-top: 24px;
      padding: 14px 36px;
      background: var(--color-brand-gradient); color: var(--color-text-on-brand);
      border: none; border-radius: 12px;
      font-family: inherit;
      font-size: 15px; font-weight: 700;
      letter-spacing: -0.005em;
      cursor: pointer; display: none;
      align-items: center; gap: 8px;
      box-shadow: var(--shadow-brand);
      transition: all 200ms;
    }
    .done-btn:hover {
      background: var(--color-brand-gradient-hover);
      transform: translateY(-1px);
      box-shadow: var(--shadow-brand-strong);
    }
    .done-btn .arrow { font-size: 16px; transition: transform 200ms; }
    .done-btn:hover .arrow { transform: translateX(3px); }
    .done-btn.show {
      display: inline-flex;
      animation: fadeInUp 400ms ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ════════════════════════════════════════════════════════
       메인 결과 레이아웃
       ════════════════════════════════════════════════════════ */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .combined-bar {
      display: flex; align-items: center; flex-shrink: 0;
      background: var(--color-bg-panel);
      border-bottom: 1px solid var(--color-border-strong);
    }
    .summary-bar {
      flex: 1; min-width: 0; background: var(--color-bg-panel);
      padding: 14px 22px;
      font-size: 14px;
      display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
      font-feature-settings: 'tnum';
    }
    .summary-bar strong {
      color: var(--color-brand-primary);
      font-weight: 700;
      font-size: 15px;
    }
    .summary-bar .stats {
      color: var(--color-text-secondary);
      font-size: 13px; margin-left: auto;
      font-weight: 500;
    }
    .summary-bar .sep {
      color: var(--color-border-strong);
      font-weight: 400;
    }

    /* result-layout: left-panel + resize-handle + map-panel (spec-19: 드래그 리사이즈) */
    .result-layout {
      flex: 1; display: flex;
      min-height: 0;
    }
    /* 모바일 세로 분할: 카드 위 / 지도 아래 50vh */
    @media (max-width: 767px) {
      .result-layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 50vh;
      }
      .left-panel {
        border-right: none;
        border-bottom: 1px solid var(--color-border-strong);
      }
      .map-panel { min-height: 50vh; }
    }
    /* 좌측 패널 — fav-tabs(상단) + cards-panel(스크롤) 세로 배치 */
    .left-panel {
      display: flex; flex-direction: column;
      overflow: hidden;
      min-height: 0;
      width: 440px; min-width: 280px; flex-shrink: 0;
    }
    .cards-panel {
      overflow-y: auto;
      background: var(--color-bg-base);
      padding: 14px;
      flex: 1; min-height: 0;
    }
    /* sort toggle button (combined-bar 우측) */
    .sort-bar {
      display: none;
      align-items: center;
      border-left: 1px solid var(--color-border-strong);
      flex-shrink: 0;
    }
    .sort-bar.visible { display: flex; }
    .sort-toggle-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 0 18px; height: 100%;
      font-size: 13px; font-weight: 600; font-family: inherit;
      color: var(--color-text-primary);
      background: none; border: none; cursor: pointer;
      white-space: nowrap;
    }
    .sort-toggle-btn:hover { color: var(--color-brand-primary); }
    .sort-toggle-btn .sort-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 18px; height: 18px; border-radius: 9px;
      background: var(--color-brand-primary); color: #fff;
      font-size: 11px; font-weight: 700; padding: 0 4px;
    }
    .sort-toggle-btn .sort-arrow { font-size: 10px; color: var(--color-text-tertiary); transition: transform .2s; }
    .sort-toggle-btn.open .sort-arrow { transform: rotate(180deg); }
    /* 접힘 시 정렬 칩·힌트 숨김 → 매물 공간 확보 */
    .sort-panel:not(.open) .sort-chips-wrap,
    .sort-panel:not(.open) .sort-hint { display: none; }
    .sort-panel:not(.open) { padding-bottom: 9px; }

    /* sort-panel: 항상 표시, 네이버맵 스타일 칩 */
    .sort-panel {
      display: flex; flex-direction: column;
      background: var(--color-bg-subtle); flex-shrink: 0;
      border-bottom: 1px solid var(--color-border-strong);
      padding: 11px 13px 9px;
      gap: 8px;
    }
    .sort-panel-header {
      display: flex; align-items: center; justify-content: space-between;
    }
    .sort-panel-title {
      font-size: 13px; font-weight: 700; color: var(--color-text-primary);
      letter-spacing: .02em;
    }
    .sort-panel-reset {
      font-size: 12px; color: var(--color-text-tertiary);
      background: none; border: none; cursor: pointer; padding: 2px 6px;
    }
    .sort-panel-reset:hover { color: var(--color-brand-primary); }
    .sort-chips-wrap {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 7px;
    }
    .sort-check-item {
      display: flex; flex-direction: row; align-items: center;
      gap: 10px;
      cursor: pointer; padding: 10px 12px;
      border-radius: 10px; border: 1.5px solid var(--color-border-default);
      background: var(--color-bg-panel); user-select: none; transition: all .15s;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
      position: relative;
    }
    .sort-check-item .icon-bubble {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s; background: var(--color-bg-subtle);
    }
    .sort-check-item i { font-size: 18px; line-height: 1; color: var(--color-brand-primary); }
    .sort-check-item:hover { border-color: var(--color-brand-primary); box-shadow: 0 2px 8px rgba(229,115,115,.2); }
    .sort-check-item:hover .icon-bubble { background: var(--color-brand-bg-subtle); }
    .sort-check-item.checked { border-color: transparent; background: var(--color-brand-gradient); }
    .sort-check-item.checked .icon-bubble { background: rgba(255,255,255,0.18); }
    .sort-chip-label {
      font-size: 13px; font-weight: 800; color: var(--color-text-primary); line-height: 1.3;
      word-break: keep-all; text-align: left; letter-spacing: -.01em;
    }
    .sort-check-item.checked .sort-chip-label { color: #ffffff; }
    .sort-check-item .rank-badge {
      display: none; position: absolute; top: -8px; right: -8px;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--color-brand-gradient); color: #fff; border: 2px solid var(--color-bg-panel);
      font-size: 12px; font-weight: 800;
      align-items: center; justify-content: center; line-height: 1;
    }
    .sort-check-item.checked .rank-badge { display: inline-flex; }
    .sort-hint {
      font-size: 11px; color: var(--color-text-tertiary); line-height: 1.6;
      padding: 0 2px;
    }
    .sort-hint .hint-order { color: var(--color-brand-primary); font-weight: 600; }
    .map-panel { position: relative; flex: 1; min-width: 320px; }
    #map { width: 100%; height: 100%; background: var(--color-bg-muted); }
    /* spec-19: 리사이즈 핸들 */
    .resize-handle {
      width: 6px; flex-shrink: 0;
      background: var(--color-border-strong);
      cursor: col-resize; z-index: 10;
      transition: background 0.15s;
    }
    .resize-handle:hover, .resize-handle.dragging { background: #5B9BD5; }
    @media (max-width: 767px) { .resize-handle { display: none; } }

    /* ════════════════════════════════════════════════════════
       [2] 통계 패널 — 미니 막대그래프
       ════════════════════════════════════════════════════════ */
    .stats-panel {
      background: var(--color-bg-panel);
      border: 1px solid var(--color-border-strong);
      border-radius: var(--radius-lg);
      padding: 16px 16px 14px;
      margin-bottom: 12px;
    }
    .stats-panel__top {
      display: flex; align-items: baseline; gap: 8px;
      padding-bottom: 14px;
      border-bottom: 1.5px solid var(--color-border-strong);
      margin-bottom: 16px;
    }
    .stats-panel__count {
      font-size: 26px; font-weight: 700;
      letter-spacing: -0.015em;
      color: var(--color-text-primary);
      font-feature-settings: 'tnum';
    }
    .stats-panel__count .unit {
      font-size: 14px; font-weight: 500;
      color: var(--color-text-secondary);
      margin-left: 2px;
    }
    .stats-panel__avg {
      font-size: 14px;
      color: var(--color-text-secondary);
      margin-left: auto;
      font-feature-settings: 'tnum';
    }
    .stats-panel__avg strong {
      font-weight: 700;
      color: var(--color-text-primary);
      font-size: 15px;
    }

    .stats-block { margin-bottom: 14px; }
    .stats-block:last-child { margin-bottom: 0; }
    .stats-block__label {
      font-size: 13px; font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: -0.005em;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .stats-block__label-helper {
      font-size: 12px; font-weight: 500;
      color: var(--color-text-secondary);
      letter-spacing: 0;
      margin-left: auto;
    }

    .minibar-row {
      display: grid;
      grid-template-columns: 12px 80px 1fr 56px;
      align-items: center; gap: 8px;
      padding: 5px 0; font-size: 13.5px;
      font-feature-settings: 'tnum';
    }
    .minibar-row__dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .minibar-row__label {
      color: var(--color-text-primary);
      font-weight: 600;
      white-space: nowrap;
    }
    .minibar-row__track {
      height: 9px;
      background: var(--color-bg-muted);
      border-radius: 3px; position: relative; overflow: hidden;
    }
    .minibar-row__fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      border-radius: 3px;
    }
    .minibar-row__value {
      text-align: right; font-weight: 700;
      color: var(--color-text-primary);
      font-size: 14px;
    }

    .stacked-bar {
      display: flex; height: 10px;
      border-radius: 4px; overflow: hidden;
      background: var(--color-bg-muted);
    }
    .stacked-bar__seg { height: 100%; }
    .stacked-bar__seg.s-new     { background: var(--green-700); }
    .stacked-bar__seg.s-mid     { background: var(--amber-700); }
    .stacked-bar__seg.s-old     { background: var(--gray-500); }
    .stacked-bar__seg.s-unknown { background: var(--gray-300); }

    .stacked-legend {
      display: flex; flex-wrap: wrap; gap: 10px 16px;
      margin-top: 10px; font-size: 13px;
      font-feature-settings: 'tnum';
    }
    .stacked-legend__item {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--color-text-primary);
      font-weight: 500;
    }
    .stacked-legend__dot { width: 8px; height: 8px; border-radius: 2px; }
    .stacked-legend__dot.s-new     { background: var(--green-700); }
    .stacked-legend__dot.s-mid     { background: var(--amber-700); }
    .stacked-legend__dot.s-old     { background: var(--gray-500); }
    .stacked-legend__dot.s-unknown { background: var(--gray-300); }
    .stacked-legend__count {
      font-weight: 600; color: var(--color-text-primary);
      margin-left: 1px;
    }

    .pyeong-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    }
    .pyeong-grid__cell {
      background: var(--color-bg-subtle);
      border: 1px solid var(--color-border-default);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .pyeong-grid__pt {
      font-size: 12.5px; font-weight: 700;
      color: var(--color-text-primary);
      margin-bottom: 4px;
    }
    .pyeong-grid__val {
      font-size: 16px; font-weight: 700;
      color: var(--color-text-primary);
      font-feature-settings: 'tnum';
      letter-spacing: -0.005em;
    }
    .pyeong-grid__cnt {
      font-size: 12px; color: var(--color-text-secondary);
      font-feature-settings: 'tnum';
      font-weight: 500;
      margin-top: 3px;
    }

    /* ════════════════════════════════════════════════════════
       spec-26: 아파트 직접 검색
       ════════════════════════════════════════════════════════ */
    .apt-search-bar {
      padding: 10px 14px 4px; background: var(--color-bg-subtle); border-radius: 12px; margin-bottom: 10px;
    }
    .apt-search-input-wrap { position: relative; }
    .apt-search-bar input {
      width: 100%; box-sizing: border-box;
      border: 1px solid var(--color-border-default); border-radius: 20px;
      padding: 8px 16px; font-size: 13px; outline: none; font-family: inherit;
      background: var(--color-bg-panel); color: var(--color-text-primary);
    }
    .apt-search-bar input:focus { border-color: var(--color-brand-primary); }
    .apt-search-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: var(--color-bg-panel); border: 1px solid var(--color-border-default); border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1); z-index: 200; overflow: hidden;
    }
    .apt-dropdown-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; cursor: pointer; gap: 8px;
    }
    .apt-dropdown-item:hover { background: var(--color-bg-subtle); }
    .apt-dropdown-nm { font-size: 13px; font-weight: 600; color: var(--color-text-primary); }
    .apt-dropdown-meta { font-size: 11px; color: var(--color-text-tertiary); flex-shrink: 0; }
    .apt-dropdown-tag {
      font-size: 10px; background: var(--color-brand-bg-subtle); color: var(--color-brand-primary);
      border-radius: 6px; padding: 1px 6px; margin-left: 4px;
    }
    .apt-dropdown-empty, .apt-dropdown-loading { padding: 10px 16px; font-size: 13px; color: var(--color-text-tertiary); }
    .apt-lookup-card {
      background: var(--color-bg-panel); border: 2px solid var(--color-brand-primary);
      border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 8px;
      position: relative;
    }
    .apt-lookup-card__badge {
      display: inline-block; background: var(--color-brand-primary); color: var(--color-text-on-brand);
      font-size: 11px; font-weight: 700; border-radius: 6px;
      padding: 2px 8px; margin-bottom: 6px;
    }
    .apt-lookup-card__title { font-size: 15px; font-weight: 700; margin-bottom: 3px; color: var(--color-text-primary); }
    .apt-lookup-card__meta { font-size: 12px; color: var(--color-text-tertiary); margin-bottom: 6px; }
    .apt-lookup-card__price { font-size: 14px; font-weight: 600; color: var(--red-600); }
    .apt-lookup-card__transit { font-size: 12px; color: var(--color-text-secondary); margin-top: 3px; }
    .apt-lookup-card__footer {
      display: flex; justify-content: flex-end; margin-top: 10px;
    }
    .apt-lookup-card__chat {
      background: var(--color-brand-bg-subtle); color: var(--color-brand-primary);
      border: 1px solid var(--color-border-default); border-radius: 16px;
      font-size: 12px; padding: 5px 14px; cursor: pointer;
    }
    .apt-search-empty { color: var(--color-text-tertiary); font-size: 13px; padding: 8px 14px; }

       /* 추천 섹션 헤더
       ════════════════════════════════════════════════════════ */
    .rec-section-head {
      background: linear-gradient(135deg, var(--red-600) 0%, var(--red-800) 100%);
      color: white; border-radius: var(--radius-lg);
      padding: 14px 16px;
      margin: 4px 0 10px;
    }
    .rec-section-head h3 {
      font-size: 16px; font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 5px;
    }
    .rec-section-head p {
      font-size: 12.5px; opacity: 0.9;
      line-height: 1.55;
    }

    /* ════════════════════════════════════════════════════════
       [1] 추천 카드 — AI 친구 코멘트 HERO
       ════════════════════════════════════════════════════════ */
    /* ── 추천 카드 (compact 3-row) ── */
    .rec-card {
      position: relative;
      background: var(--color-bg-panel);
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border-strong);
      border-left: 4px solid var(--color-brand-primary);
      padding: 14px 44px 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: box-shadow 200ms ease;
    }
    .rec-card:hover { box-shadow: var(--shadow-lg); }
    /* row1: 슬롯 칩 (통근버킷 × 평형) */
    .rec-card__slot {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 700;
      color: var(--color-brand-primary);
      background: var(--color-brand-bg-subtle);
      padding: 3px 9px;
      border-radius: var(--radius-pill);
      letter-spacing: 0.01em;
      margin-bottom: 8px;
    }
    .rec-card__slot-divider {
      width: 1px; height: 9px;
      background: currentColor; opacity: 0.4;
    }
    /* row2: 단지명 + 가격 */
    .rec-card__title-row {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 10px; margin-bottom: 6px;
    }
    .rec-card__title {
      font-size: 16px; font-weight: 700;
      letter-spacing: -0.005em;
      color: var(--color-text-primary);
      line-height: 1.3; flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .rec-card__price {
      font-size: 18px; font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--color-text-primary);
      font-feature-settings: 'tnum';
      white-space: nowrap; flex-shrink: 0;
    }
    .rec-card__price .unit {
      font-size: 13px; font-weight: 500;
      color: var(--color-text-secondary);
      margin-left: 1px;
    }
    /* row3: 메타 (동 · 세대수 · 최고층) */
    .rec-card__meta {
      font-size: 12px; color: var(--color-text-secondary);
      font-feature-settings: 'tnum';
      margin-bottom: 8px; line-height: 1.4;
      font-weight: 500;
    }
    .rec-card__meta .dot {
      display: inline-block; width: 2px; height: 2px; border-radius: 50%;
      background: currentColor; opacity: 0.5;
      margin: 0 5px; vertical-align: middle;
    }
    /* 이유 칩 */
    .rec-card__reasons {
      display: flex; gap: 5px; flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .reason-chip {
      display: inline-flex; align-items: center;
      padding: 4px 9px;
      border-radius: var(--radius-pill);
      font-size: 12px; font-weight: 600;
      font-feature-settings: 'tnum';
      white-space: nowrap;
    }
    .reason-chip--info    { background: var(--blue-100);              color: var(--blue-700); }
    .reason-chip--brand   { background: var(--color-brand-bg-subtle); color: var(--color-brand-primary); }
    .reason-chip--neutral { background: var(--color-bg-subtle);       color: var(--color-text-secondary); border: 1px solid var(--color-border-default); }

    /* AI 친구 한마디 — 기본 접힘, 클릭 시 펼침 */
    .rec-card__friend-toggle {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600;
      color: var(--color-brand-primary);
      cursor: pointer; padding: 4px 0; user-select: none;
      border: none; background: none; font-family: inherit;
    }
    .rec-card__friend-toggle .toggle-arrow {
      font-size: 10px; transition: transform 180ms ease;
    }
    .rec-card__friend-toggle.open .toggle-arrow { transform: rotate(180deg); }
    .rec-card__friend-body-wrap {
      overflow: hidden;
      max-height: 0; transition: max-height 250ms ease;
    }
    .rec-card__friend-body-wrap.open { max-height: 200px; }
    .rec-card__friend {
      display: flex; gap: 10px; align-items: flex-start;
      background: var(--color-brand-bg-subtle);
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 6px;
    }
    .rec-card__friend.empty { background: var(--color-bg-subtle); }
    .rec-card__friend-avatar {
      flex-shrink: 0;
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--color-brand-primary);
      color: var(--color-text-on-brand);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
    }
    .rec-card__friend.empty .rec-card__friend-avatar {
      background: var(--color-text-tertiary);
    }
    .rec-card__friend-label {
      font-size: 11px; font-weight: 700;
      color: var(--color-brand-primary);
      margin-bottom: 4px;
    }
    .rec-card__friend.empty .rec-card__friend-label { color: var(--color-text-tertiary); }
    .rec-card__friend-text {
      font-size: 13px; line-height: 1.55;
      color: var(--color-text-primary);
      white-space: pre-line; font-weight: 500;
    }
    .rec-card__friend.empty .rec-card__friend-text {
      font-style: italic; color: var(--color-text-tertiary); font-weight: 400;
    }
    .spinner-mini {
      display: inline-block; width: 10px; height: 10px;
      border: 1.5px solid var(--color-border-default);
      border-top-color: var(--color-text-tertiary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px; vertical-align: -1px;
    }

    .price-chg-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 6px;
      vertical-align: middle;
      letter-spacing: -0.3px;
    }
    .price-chg-badge--up   { background: var(--red-50); color: var(--red-600); }
    .price-chg-badge--down { background: var(--blue-100); color: var(--blue-700); }

    .why-tags {
      font-size: 11px;
      color: var(--color-text-tertiary);
      margin-top: 3px;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .commute-econ-row {
      font-size: 11.5px; color: var(--color-text-tertiary);
      margin-top: 7px; padding-top: 6px;
      border-top: 1px dashed var(--color-border-default);
      display: flex; align-items: center; gap: 4px;
    }

    /* ── 관심 단지 ♥ ───────────────────────────────────────── */
    .fav-btn {
      position: absolute; top: 10px; right: 12px;
      background: none; border: none; cursor: pointer;
      font-size: 20px; line-height: 1; color: var(--color-border-strong);
      padding: 4px; border-radius: 50%;
      transition: color 0.15s, transform 0.12s;
      z-index: 2;
    }
    .fav-btn:hover { transform: scale(1.25); color: #e74c3c; }
    .fav-btn.active { color: #e74c3c; }

    /* 탭 (전체 / ♥ 관심) */
    .fav-tabs {
      display: flex; gap: 0;
      border-bottom: 1px solid var(--color-border-strong);
      background: var(--color-bg-panel);
      position: sticky; top: 0; z-index: 10;
      margin-bottom: 12px;
    }
    .fav-tab-btn {
      flex: 1; padding: 9px 0; border: none; background: none;
      border-bottom: 2px solid transparent;
      font-size: 13px; font-weight: 600; cursor: pointer;
      color: var(--color-text-secondary);
      transition: color 0.15s, border-color 0.15s;
    }
    .fav-tab-btn.active {
      background: var(--color-brand-gradient);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      border-bottom-color: var(--purple-500);
    }
    .fav-tab-btn:disabled { opacity: 0.38; cursor: not-allowed; }
    .fav-empty {
      padding: 40px 20px; text-align: center;
      color: var(--color-text-secondary); font-size: 14px; line-height: 1.8;
    }

    .rec-card__footer {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
      padding-top: 14px;
      border-top: 1px dashed var(--color-border-strong);
    }
    .rec-card__transit {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 600;
      color: var(--blue-700);
      font-feature-settings: 'tnum';
    }
    .rec-card__transit strong {
      font-size: 14px; font-weight: 700;
    }
    .commute-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 11px;
      background: var(--blue-100);
      color: var(--blue-700);
      border-radius: var(--radius-pill);
      font-size: 12.5px; font-weight: 600;
      font-feature-settings: 'tnum';
    }
    .rec-card__reason {
      font-size: 12.5px;
      color: var(--color-text-secondary);
      font-weight: 500;
      text-align: right;
    }

    /* ════════════════════════════════════════════════════════
       [3] 버킷 섹션 — 접힘 상태 정보 노출
       ════════════════════════════════════════════════════════ */
    .bucket-divider {
      font-size: 13px; font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: -0.005em;
      padding: 18px 4px 10px;
    }
    .bucket-section {
      background: var(--color-bg-panel);
      border: 1px solid var(--color-border-strong);
      border-radius: var(--radius-lg);
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color 200ms, box-shadow 200ms;
    }
    .bucket-section:hover { box-shadow: var(--shadow-sm); }
    .bucket-section:hover { border-color: var(--color-border-strong); }
    .bucket-section.open { border-color: var(--color-border-strong); }
    .bucket-head {
      padding: 16px 18px; cursor: pointer; user-select: none;
      display: flex; flex-direction: column; gap: 10px;
    }
    .bucket-head__top {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px;
    }
    .bucket-head__title {
      display: flex; align-items: baseline; gap: 8px;
    }
    .bucket-head__time {
      font-size: 17px; font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: -0.01em;
    }
    .bucket-head__cnt {
      font-size: 13px; font-weight: 600;
      color: var(--color-text-secondary);
      font-feature-settings: 'tnum';
    }
    .bucket-head__chev {
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-tertiary);
      transition: transform 200ms;
    }
    .bucket-section.open .bucket-head__chev { transform: rotate(180deg); }
    .bucket-head__bottom {
      display: flex; align-items: center;
      gap: 12px; flex-wrap: wrap;
      font-feature-settings: 'tnum';
    }
    .bucket-head__price {
      font-size: 13.5px;
      color: var(--color-text-secondary);
      font-weight: 500;
    }
    .bucket-head__price strong {
      font-weight: 700; color: var(--color-text-primary);
      font-size: 14.5px;
    }
    .bucket-head__price .price-sep {
      margin: 0 4px; color: var(--color-text-tertiary);
    }
    .bucket-head__pts {
      display: flex; gap: 5px; flex-wrap: wrap;
    }
    .bucket-pt-chip {
      display: inline-flex; align-items: baseline; gap: 4px;
      background: var(--color-bg-subtle);
      border: 1px solid var(--color-border-strong);
      border-radius: var(--radius-sm);
      padding: 3px 9px; font-size: 12.5px;
      color: var(--color-text-secondary);
      font-weight: 600;
      font-feature-settings: 'tnum';
    }
    .bucket-pt-chip strong {
      color: var(--color-text-primary);
      font-weight: 700;
    }
    .bucket-head__ratio {
      height: 4px;
      background: var(--color-bg-muted);
      border-radius: 2px; overflow: hidden;
    }
    .bucket-head__ratio-fill {
      height: 100%;
      background: var(--color-brand-primary);
      opacity: 0.55; border-radius: 2px;
    }
    .bucket-body {
      display: none;
      border-top: 1.5px solid var(--color-border-strong);
      background: var(--color-bg-subtle);
      padding: 12px;
    }
    .bucket-section.open .bucket-body { display: block; }
    .bucket-pt-label {
      font-size: 12px; font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: -0.005em;
      margin: 14px 2px 8px;
    }
    .bucket-pt-label:first-child { margin-top: 4px; }
    .bucket-pt-label:first-child { margin-top: 4px; }

    /* 일반 list-card — 한 줄 row */
    .list-card {
      position: relative;
      background: var(--color-bg-panel);
      border: 1px solid var(--color-border-strong);
      border-radius: 8px;
      padding: 11px 40px 11px 14px;
      margin-bottom: 5px;
      cursor: pointer;
      transition: box-shadow 150ms, border-color 150ms;
      display: flex; align-items: center; gap: 10px;
    }
    .list-card:hover { border-color: var(--color-text-tertiary); box-shadow: var(--shadow-md); }
    .list-card:last-child { margin-bottom: 0; }
    /* 왼쪽: 단지명 + 평형 (flex-grow) */
    .list-card__top {
      flex: 1; min-width: 0;
    }
    .list-card__name {
      font-size: 14px; font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: -0.005em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .list-card__name .pt {
      font-size: 12px; font-weight: 600;
      color: var(--color-text-secondary);
      margin-left: 5px;
    }
    .list-card__meta {
      font-size: 11.5px; color: var(--color-text-tertiary);
      font-weight: 500; margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    /* 오른쪽: 통근시간 + 가격 (flex-shrink: 0) */
    .list-card__right {
      display: flex; flex-direction: column; align-items: flex-end;
      gap: 3px; flex-shrink: 0;
    }
    .list-card__price {
      font-size: 14px; font-weight: 700;
      color: var(--color-text-primary);
      font-feature-settings: 'tnum';
    }
    .list-card__row {
      display: flex; align-items: center; gap: 4px;
    }
    .list-card__comment { display: none; } /* 일반 카드는 코멘트 숨김 */

    .error-box {
      background: var(--color-bg-panel); padding: 24px;
      border: 1px solid var(--color-brand-primary);
      border-radius: var(--radius-lg);
      text-align: center;
    }
    .error-box h2 {
      color: var(--color-brand-primary); margin-bottom: 12px;
      font-size: 18px; font-weight: 700;
    }
    .error-box a {
      display: inline-block; margin-top: 4px;
      padding: 9px 20px; border-radius: var(--radius-pill);
      background: var(--color-brand-gradient);
      color: #ffffff; font-weight: 700; font-size: 14px;
      text-decoration: none; transition: opacity 0.15s;
    }
    .error-box a:hover { opacity: 0.85; }

    /* ════════════════════════════════════════════════════════
       지도 핀 (디자인 시스템 §4 핀 체계)
       ════════════════════════════════════════════════════════ */
    /* ── 집 모양 핀 (호갱노노 스타일) ─────────────────────── */
    .pin {
      display: inline-flex; flex-direction: column; align-items: center;
      cursor: pointer; font-family: 'SUIT', system-ui, sans-serif;
      filter: drop-shadow(0 2px 5px rgba(0,0,0,0.28));
      transition: transform 120ms ease, filter 120ms ease;
    }
    .pin:hover { transform: translateY(-3px); filter: drop-shadow(0 4px 10px rgba(0,0,0,0.36)); }
    /* 선택된 단지 핀 강조 — 흰 외곽 링 + 글로우 + 확대 + 펄스 (지도에서 식별) */
    .pin.pin-selected {
      z-index: 10;
      filter:
        drop-shadow(1.6px 0 0 #fff) drop-shadow(-1.6px 0 0 #fff)
        drop-shadow(0 1.6px 0 #fff) drop-shadow(0 -1.6px 0 #fff)
        drop-shadow(0 6px 16px rgba(0,0,0,0.5));
      animation: pinSelPulse 1.5s ease-in-out infinite;
    }
    @keyframes pinSelPulse {
      0%, 100% { transform: translateY(-5px) scale(1.18); }
      50%      { transform: translateY(-7px) scale(1.26); }
    }
    /* 지붕 (삼각형) */
    .pin-roof {
      width: 0; height: 0;
      border-left: 24px solid transparent;
      border-right: 24px solid transparent;
      border-bottom: 16px solid #3b82f6;
    }
    /* 몸체 (직사각형 + 아래 화살표) */
    .pin-body {
      width: 48px; min-height: 36px;
      background: #3b82f6;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 4px 4px 10px;
      position: relative;
      border-radius: 0 0 3px 3px;
    }
    .pin-body::after {
      content: '';
      position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 9px solid #3b82f6;
    }
    .pin-time {
      font-size: 13px; font-weight: 800; color: #fff;
      line-height: 1.2; font-feature-settings: 'tnum';
      white-space: nowrap;
    }
    .pin-sub {
      font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.82);
      line-height: 1.1; white-space: nowrap;
    }
    .pin-crown {
      font-size: 14px; line-height: 1; margin-bottom: 1px;
    }
    /* 통근시간 색상 */
    .pin-t1 .pin-roof { border-bottom-color:#FF6FB5; }
    .pin-t1 .pin-body { background:#FF6FB5; }
    .pin-t1 .pin-body::after { border-top-color:#FF6FB5; }
    .pin-t2 .pin-roof { border-bottom-color:#C45ED6; }
    .pin-t2 .pin-body { background:#C45ED6; }
    .pin-t2 .pin-body::after { border-top-color:#C45ED6; }
    .pin-t3 .pin-roof { border-bottom-color:#7C3FE6; }
    .pin-t3 .pin-body { background:#7C3FE6; }
    .pin-t3 .pin-body::after { border-top-color:#7C3FE6; }
    .pin-t4 .pin-roof { border-bottom-color:#7C3FE6; }
    .pin-t4 .pin-body { background:#7C3FE6; }
    .pin-t4 .pin-body::after { border-top-color:#7C3FE6; }
    /* 추천 핀 — 틸 */
    .pin-best .pin-roof { border-bottom-color:#00C9A7; }
    .pin-best .pin-body { background:#00C9A7; }
    .pin-best .pin-body::after { border-top-color:#00C9A7; }
    /* 복수 평형 뱃지 */
    .pin-multi {
      position: absolute; top: -6px; right: -6px;
      background: var(--color-bg-panel); color: var(--color-text-secondary);
      border: 1.5px solid var(--color-border-default); border-radius: 99px;
      font-size: 9px; font-weight: 700;
      padding: 0 4px; line-height: 16px;
      font-feature-settings: 'tnum';
    }
    /* 직장 핀 */
    .pin-lookup {
      display: inline-block; padding: 5px 12px;
      border-radius: 999px; font-size: 12px; font-weight: 700;
      white-space: nowrap; cursor: pointer; line-height: 1.4;
      background:#f59e0b; color:#fff; border:1px solid #d97706;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    /* 오피스 마커 — 원형 위치핀 SVG 픽토그램, 집핀과 완전히 다른 형태 */
    .pin-workplace-wrap, .pin-workplace-2-wrap {
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.55));
      cursor: pointer;
    }
    /* 지도 좌상단 범례 */
    #map-legend {
      position: absolute; top: 10px; left: 10px; z-index: 200;
      background: rgba(21,18,26,0.94);
      backdrop-filter: blur(8px);
      border: 1px solid var(--color-border-default);
      border-radius: 12px;
      padding: 14px 20px; min-width: 160px;
      font-size: 13px; font-family: 'SUIT', sans-serif;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12); pointer-events: none;
    }
    #map-legend .lg-title {
      font-weight: 700; font-size: 11px;
      color: var(--color-text-tertiary);
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 10px;
    }
    #map-legend .lg-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px; line-height: 1.4;
      color: var(--color-text-primary); font-size: 13px; font-weight: 500;
    }
    #map-legend .lg-dot {
      width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.07);
    }
    #map-legend .lg-row:last-child { margin-bottom: 0; }
    #map-legend .lg-divider {
      border: none; border-top: 1px solid rgba(0,0,0,0.07);
      margin: 8px 0;
    }

    /* ════════════════════════════════════════════════════════
       [spec-14] 즐겨찾기 비교
       ════════════════════════════════════════════════════════ */
    .compare-check {
      position: absolute; top: 8px; left: 8px; z-index: 5;
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 600;
      color: var(--color-text-secondary);
      background: rgba(21,18,26,0.88);
      border: 1px solid var(--color-border-default);
      border-radius: 5px; padding: 2px 7px;
      cursor: pointer; user-select: none;
    }
    .compare-check input { accent-color: var(--color-brand-primary); cursor: pointer; }
    .compare-bar {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      background: var(--color-bg-subtle);
      border-top: 1px solid var(--color-border-strong);
      font-size: 13px;
    }
    .compare-bar.hidden { display: none; }
    .compare-bar__count { flex: 1; font-weight: 600; color: var(--color-text-primary); }
    .compare-bar__btn {
      padding: 6px 14px; border-radius: 7px; border: none; cursor: pointer;
      background: var(--color-brand-gradient); color: #fff;
      font-size: 13px; font-weight: 700;
    }
    .compare-bar__btn:disabled { background: var(--color-bg-muted); color: var(--color-text-tertiary); cursor: not-allowed; }
    .compare-bar__clear {
      padding: 5px 10px; border-radius: 6px; border: 1px solid var(--color-border-default);
      background: var(--color-bg-panel); color: var(--color-text-secondary);
      font-size: 12px; cursor: pointer;
    }
    /* ── 단지 상세 사이드 패널 (spec-17) ─────────────────────── */

    /* spec-18: 경로 상세 팝업 */
    .route-overlay {
      position: fixed; inset: 0; z-index: 700;
      background: rgba(0,0,0,0.48);
      display: flex; align-items: flex-end; justify-content: center;
    }
    .route-overlay.hidden { display: none; }
    .route-panel {
      background: var(--color-bg-panel); border-radius: 20px 20px 0 0;
      width: 100%; max-width: 640px;
      max-height: 70vh; display: flex; flex-direction: column;
      overflow: hidden;
    }
    .route-panel__drag {
      width: 40px; height: 4px; background: var(--color-border-strong); border-radius: 2px;
      margin: 10px auto 6px; flex-shrink: 0;
    }
    .route-panel__header {
      display: flex; align-items: center; gap: 8px;
      padding: 0 16px 10px; flex-shrink: 0;
      border-bottom: 1px solid var(--color-border-default);
    }
    .route-panel__title {
      flex: 1; font-size: 15px; font-weight: 700;
      color: var(--color-text-primary); margin: 0;
    }
    .route-panel__close {
      background: none; border: none; cursor: pointer;
      font-size: 18px; color: var(--color-text-secondary);
      padding: 4px 8px; line-height: 1;
    }
    .route-panel__body {
      flex: 1; overflow-y: auto; padding: 12px 16px 28px;
    }
    .route-panel__wp-tabs {
      display: flex; gap: 8px; margin-bottom: 12px;
    }
    .route-panel__wp-tab {
      padding: 5px 14px; border-radius: 16px;
      font-size: 13px; font-weight: 600;
      border: 1.5px solid var(--color-border-default);
      cursor: pointer; background: var(--color-bg-subtle);
      color: var(--color-text-secondary);
      transition: background 150ms, color 150ms;
    }
    .route-panel__wp-tab.active {
      background: var(--color-brand-gradient); color: var(--color-text-on-brand);
      border-color: transparent;
    }

    .detail-panel {
      background: var(--color-bg-panel);
      width: 0; min-width: 0; overflow: hidden;
      flex-shrink: 0; display: flex; flex-direction: column;
      border-left: none;
      transition: width .25s ease, border .25s ease;
    }
    .detail-panel.open {
      width: 480px; min-width: 280px;
      border-left: 1px solid var(--color-border-strong);
      box-shadow: -4px 0 20px rgba(0,0,0,0.08);
    }
    .detail-panel__header {
      padding: 13px 14px;
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
      background: var(--color-brand-gradient);
      box-shadow: 0 2px 8px rgba(124, 63, 230, 0.22);
    }
    .detail-panel__title { font-size: 14px; font-weight: 700; flex: 1; line-height: 1.4; color: #fff; }
    .detail-fav-btn {
      flex-shrink: 0; background: none; border: none; cursor: pointer;
      font-size: 20px; color: rgba(255,255,255,0.7);
      padding: 2px 4px; line-height: 1;
      transition: color 150ms, transform 150ms;
    }
    .detail-fav-btn:hover { color: #fff; transform: scale(1.2); }
    .detail-fav-btn.active { color: #fff; }
    .detail-panel__close {
      flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.35); background: rgba(255,255,255,0.18);
      cursor: pointer; font-size: 14px; color: #fff;
      display: flex; align-items: center; justify-content: center;
    }
    .detail-panel__tabs {
      display: flex; padding: 10px 20px 0; flex-shrink: 0;
      border-bottom: 1px solid var(--color-border-default);
    }
    .detail-tab-btn {
      flex: 1; padding: 8px 4px; font-size: 13px; font-weight: 600;
      border: none; background: none; cursor: pointer; color: var(--color-text-tertiary);
      border-bottom: 2px solid transparent; transition: color .15s, border-color .15s;
    }
    .detail-tab-btn.active {
      background: var(--color-brand-gradient);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      border-bottom-color: var(--purple-500);
    }
    .detail-panel__body { flex: 1; overflow-y: auto; padding: 0 20px 24px; background: var(--color-bg-subtle); }
    .detail-tab-pane { display: none; }
    .detail-tab-pane.active { display: block; }
    .detail-section { margin-bottom: 20px; }
    .detail-section__title {
      font-size: 11px; font-weight: 700; color: var(--color-text-tertiary);
      letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px;
    }
    .detail-kv { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; }
    .detail-kv__label { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 2px; }
    .detail-kv__value { font-size: 14px; font-weight: 600; color: var(--color-text-primary); }
    .detail-kv__sub { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); }
    /* spec-31: 경사 인디케이터 — 이모지 금지, CSS 막대 4단계 */
    .slope-ind { display: inline-flex; align-items: flex-end; gap: 2px; height: 12px; vertical-align: -1px; margin-right: 6px; }
    .slope-ind > i { width: 4px; background: var(--color-border-strong); border-radius: 1px; display: inline-block; }
    .slope-ind > i:nth-child(1) { height: 4px; }
    .slope-ind > i:nth-child(2) { height: 7px; }
    .slope-ind > i:nth-child(3) { height: 10px; }
    .slope-ind > i:nth-child(4) { height: 12px; }
    .slope-ind[data-lv="1"] > i:nth-child(-n+1),
    .slope-ind[data-lv="2"] > i:nth-child(-n+2),
    .slope-ind[data-lv="3"] > i:nth-child(-n+3),
    .slope-ind[data-lv="4"] > i:nth-child(-n+4) { background: #A82E1B; }
    .detail-trade-row {
      display: grid; grid-template-columns: 90px 1fr 1fr 40px;
      gap: 4px 8px; padding: 8px 0; border-bottom: 1px solid var(--color-border-default); font-size: 13px;
    }
    .detail-trade-row:last-child { border-bottom: none; }
    .detail-trade-date { color: var(--color-text-tertiary); font-size: 12px; }
    .detail-trade-amount { font-weight: 700; color: var(--color-text-primary); }
    .detail-trade-floor { color: var(--color-text-tertiary); font-size: 12px; text-align: right; }
    .detail-poi-row {
      display: flex; gap: 8px; align-items: center;
      padding: 7px 4px; border-bottom: 1px solid var(--color-border-default); font-size: 13px;
      cursor: pointer; border-radius: 4px; transition: background 0.1s;
    }
    .detail-poi-row:last-child { border-bottom: none; }
    .detail-poi-row:hover { background: var(--color-bg-subtle); }
    .detail-poi-row.poi-active { background: var(--color-brand-bg-subtle); }
    .detail-poi-dist { color: var(--color-text-tertiary); font-size: 12px; margin-left: auto; white-space: nowrap; }
    .detail-price-badge {
      display: inline-block; padding: 3px 8px; border-radius: 12px;
      font-size: 12px; font-weight: 700;
    }
    .detail-price-badge--up { background: var(--red-50); color: var(--red-600); }
    .detail-price-badge--down { background: var(--blue-100); color: var(--blue-700); }
    .detail-price-badge--flat { background: var(--color-bg-muted); color: var(--color-text-secondary); }
    .detail-loading { text-align: center; padding: 40px; color: var(--color-text-tertiary); font-size: 14px; }
    /* POI 커스텀 핀 */
    .poi-custom-pin { display: flex; flex-direction: column; align-items: center; }
    .poi-pin__bubble {
      background: var(--color-bg-base); color: var(--color-text-primary); border-radius: 10px;
      padding: 7px 12px; font-size: 12px; white-space: nowrap;
      box-shadow: 0 4px 14px rgba(0,0,0,0.35); line-height: 1.5;
    }
    .poi-pin__name { font-weight: 600; font-size: 13px; }
    .poi-pin__dist { color: var(--color-text-tertiary); font-size: 11px; margin-top: 1px; }
    .poi-pin__stem { width: 2px; height: 7px; background: var(--color-bg-base); }
    .poi-pin__dot {
      width: 12px; height: 12px; background: #e53e3e;
      border: 2.5px solid #fff; border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    /* spec-39: POI 위치 확인 실패 안내 토스트 */
    .poi-notice {
      position: fixed; left: 50%; bottom: 32px; transform: translateX(-50%) translateY(12px);
      background: rgba(12,10,14,0.95); color: var(--color-text-primary); font-size: 13px; font-weight: 500;
      padding: 10px 18px; border-radius: 10px; box-shadow: 0 6px 20px rgba(0,0,0,0.35);
      z-index: 600; opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s;
    }
    .poi-notice.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .compare-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .compare-overlay.hidden { display: none; }

    /* spec-22: 친구 채팅 패널 */
    .chat-panel {
      position: fixed; top: 54px; right: 0;
      width: 440px; height: calc(100vh - 54px);
      background: var(--color-bg-panel); z-index: 850;
      box-shadow: -6px 0 24px rgba(0,0,0,0.13);
      border-radius: 16px 0 0 16px;
      display: flex; flex-direction: column;
      transition: transform 0.25s ease;
      min-width: 320px; max-width: 700px;
    }
    .chat-panel.hidden { transform: translateX(100%); pointer-events: none; }
    .chat-panel__resize {
      position: absolute; left: 0; top: 0; bottom: 0; width: 7px;
      cursor: col-resize; z-index: 10; border-radius: 16px 0 0 16px;
      background: transparent; transition: background 0.15s;
    }
    .chat-panel__resize:hover,
    .chat-panel__resize.dragging { background: rgba(91,155,213,0.35); }
    .chat-panel__header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px 12px; border-bottom: 1px solid var(--color-border-default);
      background: var(--color-bg-base); border-radius: 16px 0 0 0; color: var(--color-text-primary);
    }
    .chat-panel__avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--color-brand-primary); color: var(--color-text-on-brand);
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .chat-panel__apt-name { flex: 1; font-size: 14px; font-weight: 600; }
    .chat-panel__close {
      background: none; border: none; color: rgba(255,255,255,0.6);
      font-size: 20px; cursor: pointer; padding: 0 4px; line-height: 1;
    }
    .chat-panel__messages {
      flex: 1; overflow-y: auto; padding: 14px 14px 6px; display: flex; flex-direction: column; gap: 10px;
    }
    .chat-msg { max-width: 88%; font-size: 13px; line-height: 1.5; padding: 9px 13px; border-radius: 14px; }
    .chat-msg--user { align-self: flex-end; background: var(--color-brand-gradient); color: var(--color-text-on-brand); border-radius: 14px 14px 4px 14px; }
    .chat-msg--assistant { align-self: flex-start; background: var(--color-bg-subtle); color: var(--color-text-primary); border-radius: 14px 14px 14px 4px; }
    .chat-panel__suggestions {
      padding: 8px 12px; display: flex; flex-wrap: wrap; gap: 7px;
    }
    .chat-chip {
      background: var(--color-brand-gradient); color: #ffffff;
      border: none; border-radius: 20px;
      font-size: 12px; font-weight: 700; padding: 6px 14px; cursor: pointer;
      white-space: nowrap; transition: opacity 0.15s;
    }
    .chat-chip:hover { opacity: 0.85; }
    .chat-attachment-bar { padding: 0 12px 4px; }
    .chat-attach-preview {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      background: var(--color-brand-bg-subtle); border-radius: 10px; padding: 6px 10px; font-size: 12px;
    }
    .chat-attach-preview img { max-height: 56px; border-radius: 6px; object-fit: cover; }
    .chat-attach-preview span { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chat-attach-preview button {
      background: none; border: none; cursor: pointer; color: var(--color-text-tertiary);
      font-size: 15px; line-height: 1; padding: 0 2px; flex-shrink: 0;
    }
    .chat-attach-btn {
      background: none; border: 1px solid var(--color-border-default); border-radius: 50%;
      width: 36px; height: 36px; font-size: 17px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; color: var(--color-text-secondary);
    }
    .chat-attach-btn:hover { background: var(--color-brand-bg-subtle); }
    .chat-panel__input-row {
      display: flex; gap: 8px; padding: 10px 12px 14px;
      border-top: 1px solid var(--color-border-default);
    }
    .chat-panel__input-row input {
      flex: 1; border: 1px solid var(--color-border-default); border-radius: 22px;
      padding: 8px 14px; font-size: 13px; outline: none;
      font-family: inherit; background: var(--color-bg-subtle); color: var(--color-text-primary);
    }
    .chat-panel__input-row input:focus { border-color: var(--color-brand-primary); }
    .chat-panel__send {
      background: var(--color-brand-gradient); color: var(--color-text-on-brand);
      border: none; border-radius: 22px; padding: 8px 16px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      box-shadow: var(--shadow-brand);
    }
    .chat-panel__send:hover { background: var(--color-brand-gradient-hover); }
    .chat-price-links {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 14px; background: var(--color-bg-subtle);
      border-bottom: 1px solid var(--color-border-default); font-size: 11.5px; flex-shrink: 0;
    }
    .chat-price-links__label { color: var(--color-text-tertiary); margin-right: 2px; }
    .chat-price-links a {
      color: var(--color-text-secondary); text-decoration: none;
      padding: 3px 10px; border: 1px solid var(--color-border-default);
      border-radius: 12px; background: var(--color-bg-panel);
      transition: background 0.15s;
    }
    .chat-price-links a:hover { background: var(--color-brand-bg-subtle); color: var(--color-brand-primary); border-color: var(--color-brand-primary); }
    .dp__friend { cursor: pointer; }
    .dp__friend:hover { opacity: 0.85; }
    .compare-panel {
      background: var(--color-bg-panel); border-radius: 16px;
      max-width: 860px; width: 100%;
      max-height: 88vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      padding: 20px 22px 24px;
    }
    .compare-panel__head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .compare-panel__title { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
    .compare-panel__close {
      padding: 4px 12px; border-radius: 6px;
      border: 1px solid var(--color-border-default);
      background: var(--color-bg-subtle); cursor: pointer; font-size: 13px;
      color: var(--color-text-secondary);
    }
    .compare-table {
      width: 100%; border-collapse: collapse;
      font-size: 13.5px;
    }
    .compare-table th {
      padding: 10px 12px; text-align: center;
      background: var(--color-bg-subtle);
      border-bottom: 2px solid var(--color-border-strong);
      font-size: 13px; font-weight: 700;
      letter-spacing: -0.01em;
    }
    .compare-table th:first-child { text-align: left; }
    .compare-table td {
      padding: 9px 12px; text-align: center;
      border-bottom: 1px solid var(--color-border-default);
      vertical-align: middle;
    }
    .compare-table td:first-child {
      text-align: left; font-weight: 600;
      color: var(--color-text-secondary); font-size: 12px;
      background: var(--color-bg-subtle);
      white-space: nowrap;
    }
    .compare-table tr:last-child td { border-bottom: none; }
    .compare-table tr:hover td { background: var(--color-brand-bg-subtle); }
    .compare-table tr:hover td:first-child { background: var(--color-bg-subtle); }
    .compare-th-sub { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); }
    .compare-best { color: var(--color-brand-primary); font-weight: 700; }

    .pin-multi-mark {
      display: inline-block;
      background: white; color: var(--color-text-tertiary);
      font-size: 9px; font-weight: 700;
      padding: 0 4px;
      border-radius: 3px;
      margin-left: 5px;
      font-feature-settings: 'tnum';
    }
    .pin-best .pin-multi-mark {
      background: rgba(255,255,255,0.25);
      color: white;
    }

    /* ════════════════════════════════════════════════════════
       [4] 호버 툴팁
       ════════════════════════════════════════════════════════ */
    .pin-tooltip {
      position: fixed; z-index: 900;
      width: 310px;
      background: var(--color-bg-panel);
      border: 1px solid var(--color-border-strong);
      border-radius: 12px;
      box-shadow: var(--shadow-xl);
      overflow: hidden;
      cursor: pointer;
      transition: opacity 100ms ease;
    }
    .pin-tooltip.hidden { display: none; }
    .pin-tooltip__head { padding: 14px 16px 0; }
    .pin-tooltip__top {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; margin-bottom: 3px;
    }
    .pin-tooltip__name {
      font-size: 16px; font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--color-text-primary);
      line-height: 1.3;
    }
    .pin-tooltip__badge {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.05em;
      background: var(--color-brand-primary);
      color: var(--color-text-on-brand);
      padding: 2px 7px;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
    }
    .pin-tooltip__meta {
      font-size: 13px; color: var(--color-text-secondary);
      font-feature-settings: 'tnum';
      margin-bottom: 14px;
      font-weight: 500;
    }
    .pin-tooltip__tabs {
      display: flex; gap: 0;
      border-bottom: 1px solid var(--color-border-default);
      padding: 0 16px;
    }
    .pin-tooltip__tab {
      padding: 10px 0; margin-right: 18px;
      font-size: 13.5px; font-weight: 600;
      color: var(--color-text-secondary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 120ms;
      font-feature-settings: 'tnum';
    }
    .pin-tooltip__tab:hover { color: var(--color-text-secondary); }
    .pin-tooltip__tab.active {
      background: var(--color-brand-gradient);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      border-bottom-color: var(--purple-500);
    }
    .pin-tooltip__body { padding: 12px 16px 0; }
    .pin-tooltip__metric-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .pin-tooltip__metric {
      display: flex; flex-direction: column; gap: 2px;
    }
    .pin-tooltip__metric-label {
      font-size: 11px; font-weight: 700;
      color: var(--color-text-tertiary);
      letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1px;
    }
    .pin-tooltip__metric-val {
      font-size: 17px; font-weight: 700;
      color: var(--color-text-primary);
      font-feature-settings: 'tnum';
      letter-spacing: -0.01em;
    }
    .pin-tooltip__metric-val .unit {
      font-size: 12px; font-weight: 500;
      color: var(--color-text-secondary);
      margin-left: 2px;
    }
    .pin-tooltip__metric-sub {
      font-size: 12px;
      color: var(--color-text-secondary);
      font-feature-settings: 'tnum';
      margin-top: 2px;
      font-weight: 500;
    }
    .pin-tooltip__comment {
      font-size: 13px; line-height: 1.6;
      color: var(--color-text-primary);
      background: var(--color-brand-bg-subtle);
      border-left: 3px solid var(--color-brand-primary);
      padding: 9px 12px;
      border-radius: 5px;
      margin-bottom: 14px;
      white-space: pre-line;
      font-weight: 500;
    }
    .pin-tooltip__comment.empty {
      background: var(--color-bg-subtle);
      border-color: var(--color-border-default);
      color: var(--color-text-tertiary);
      font-style: italic;
    }

    /* ════════════════════════════════════════════════════════
       [6] 상세 패널
       ════════════════════════════════════════════════════════ */
    .dp__header {
      position: sticky; top: 0; z-index: 10;
      background: linear-gradient(135deg, var(--red-600) 0%, var(--red-800) 100%);
      padding: 11px 14px;
      display: flex; align-items: center; gap: 10px;
      box-shadow: 0 2px 8px rgba(124, 63, 230, 0.20);
    }
    .dp__back {
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: var(--radius-sm);
      padding: 5px 11px;
      font-size: 12.5px; font-weight: 600;
      color: white;
      cursor: pointer; font-family: inherit;
      transition: all 120ms;
      backdrop-filter: blur(4px);
    }
    .dp__back:hover {
      background: rgba(255, 255, 255, 0.28);
      border-color: rgba(255, 255, 255, 0.5);
    }
    .dp__name {
      font-size: 15px; font-weight: 700;
      letter-spacing: -0.01em;
      color: white;
      flex: 1; min-width: 0;
    }
    .dp__badge {
      font-size: 10.5px; font-weight: 700;
      background: rgba(255, 255, 255, 0.95);
      color: var(--color-brand-primary);
      padding: 3px 8px;
      border-radius: var(--radius-sm);
      letter-spacing: 0.05em;
    }

    /* spec-42: 인스타 클린카드 — HERO/섹션을 흰 소프트카드로 */
    .dp__hero {
      padding: 16px;
      background: var(--color-bg-panel);
      border: none;
      border-radius: 16px;
      box-shadow: 0 2px 14px rgba(26,24,22,0.05);
      margin: 12px 12px 0;
    }
    .dp__meta {
      font-size: 13px;
      color: var(--color-text-tertiary);
      font-feature-settings: 'tnum';
      margin-bottom: 13px;
      font-weight: 500;
    }
    .dp__meta strong { color: var(--color-text-primary); font-weight: 700; }
    /* 스탯 줄 (통근·최저가·세대) — 하나의 스트립 + 얇은 구분선 */
    .dp-statrow {
      display: flex; margin-bottom: 14px;
      background: var(--color-bg-subtle);
      border-radius: 14px; padding: 15px 4px;
    }
    .dp-stat {
      flex: 1; min-width: 0; text-align: center;
      position: relative; padding: 0 8px;
    }
    .dp-stat + .dp-stat::before {
      content: ''; position: absolute; left: 0; top: 50%;
      transform: translateY(-50%);
      width: 1px; height: 28px;
      background: var(--color-border-default);
    }
    .dp-stat-num {
      font-size: 20px; font-weight: 800; letter-spacing: -0.03em;
      font-feature-settings: 'tnum';
      background: var(--color-brand-gradient);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15; white-space: nowrap;
    }
    .dp-stat-num.clr-up { background: none; -webkit-text-fill-color: #FF7E8A; }
    .dp-stat-num.clr-dn { background: none; -webkit-text-fill-color: var(--blue-700); }
    .dp-stat-unit {
      font-size: 12px; font-weight: 700;
      margin-left: 1.5px; letter-spacing: 0;
    }
    .dp-stat-label {
      font-size: 12px; color: var(--color-text-primary);
      margin-top: 6px; font-weight: 700; letter-spacing: 0.01em;
      line-height: 1.35; white-space: nowrap;
    }
    .dp-stat-py { display: inline; white-space: nowrap; font-size: 9px; font-weight: 600; opacity: 0.85; }
    /* 알약 칩 */
    .dp-chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
    .dp-chip {
      font-size: 12px; font-weight: 700; padding: 6px 13px;
      border-radius: 9999px; background: var(--color-bg-muted);
      color: var(--color-text-secondary); white-space: nowrap;
      letter-spacing: -0.01em;
    }
    .dp-chip.brand { background: var(--red-50); color: var(--color-brand-primary); }
    .dp-chip.cool  { background: var(--blue-100); color: var(--blue-700); }
    /* 시세 한 줄 결론 (KPI 3중복 대체) */
    .dp-verdict {
      background: var(--color-bg-subtle); border-radius: 12px;
      padding: 13px 14px; font-size: 14px; font-weight: 600;
      line-height: 1.5; color: var(--color-text-primary);
    }
    .dp-verdict b { font-weight: 800; }
    .dp-verdict .clr-up { color: #FF7E8A; }
    .dp-verdict .clr-dn { color: var(--blue-700); }
    .dp-verdict-sub {
      display: block; font-size: 12px; color: var(--color-text-tertiary);
      margin-top: 5px; font-weight: 500; font-feature-settings: 'tnum';
    }
    .dp__commute {
      font-size: 13px; font-weight: 700;
      color: var(--blue-700);
      font-feature-settings: 'tnum';
      margin-bottom: 10px;
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--blue-100);
      padding: 5px 11px;
      border-radius: var(--radius-pill);
    }
    /* spec-42: 친구 한마디 — 채팅형(헤더줄 + 본문 풀폭) */
    .dp__friend {
      display: block;
      background: var(--color-brand-bg-subtle);
      border-radius: 14px;
      padding: 14px 16px 15px;
    }
    .dp__friend.empty {
      background: var(--color-bg-subtle);
    }
    .dp__friend-head {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px;
    }
    .dp__friend-label {
      font-size: 12.5px; font-weight: 800;
      color: var(--color-brand-primary);
      letter-spacing: -0.01em; flex: 1;
    }
    .dp__friend.empty .dp__friend-label {
      color: var(--color-text-tertiary);
    }
    .dp__friend-cta {
      font-size: 11px; font-weight: 700;
      color: var(--color-brand-primary);
      background: rgba(124, 63, 230, 0.08);
      padding: 4px 10px; border-radius: 9999px;
      white-space: nowrap; transition: background 120ms;
    }
    .dp__friend:hover .dp__friend-cta { background: rgba(124, 63, 230, 0.16); }
    .dp__friend-avatar {
      flex-shrink: 0;
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--color-brand-primary);
      color: var(--color-text-on-brand);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
      box-shadow: 0 2px 6px rgba(124, 63, 230, 0.25);
    }
    .dp__friend.empty .dp__friend-avatar {
      background: var(--color-text-tertiary);
      box-shadow: none;
    }
    .dp__friend-text {
      font-size: 14px; line-height: 1.75;
      color: var(--color-text-primary);
      font-weight: 500;
      white-space: pre-line;
      letter-spacing: -0.005em;
    }
    .dp__friend.empty .dp__friend-text {
      font-style: italic;
      color: var(--color-text-tertiary);
      font-weight: 400;
    }

    .dp__section {
      background: var(--color-bg-panel);
      border: none;
      border-radius: 16px;
      box-shadow: 0 2px 14px rgba(26,24,22,0.05);
      margin: 12px 12px 0;
      overflow: hidden;
      transition: box-shadow 160ms ease;
    }
    .dp__section:hover { box-shadow: 0 4px 18px rgba(26,24,22,0.10); }
    .dp__section-head {
      padding: 15px 16px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer; user-select: none;
      transition: background 120ms;
    }
    .dp__section-head:hover { background: var(--color-bg-subtle); }
    .dp__section-icon {
      flex-shrink: 0;
      width: 34px; height: 34px;
      border-radius: 10px;
      background: var(--color-bg-subtle);
      border: none;
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-tertiary);
      transition: all 200ms;
    }
    .dp__section-icon svg { width: 17px; height: 17px; }
    /* spec-42: 섹션별 컬러 아이콘 (식별성↑·예쁨↑) */
    .dp__section-icon.ic-commute { background: var(--blue-100);  color: var(--blue-700); }
    .dp__section-icon.ic-price   { background: var(--red-50);    color: var(--color-brand-primary); }
    .dp__section-icon.ic-trade   { background: var(--amber-100); color: var(--amber-700); }
    .dp__section-icon.ic-poi     { background: var(--green-100); color: var(--green-700); }
    .dp__section-icon.ic-bld     { background: var(--color-bg-muted); color: var(--color-text-secondary); }
    .dp__section-titlebox {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: 2px;
    }
    .dp__section-title {
      font-size: 14.5px; font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: -0.01em;
    }
    .dp__section-preview {
      font-size: 12.5px; color: var(--color-text-tertiary);
      font-feature-settings: 'tnum';
      margin-top: 3px;
      font-weight: 500;
    }
    /* 프리뷰 속 핵심 숫자 강조 (스캔성↑) */
    .dp__section-preview .num { color: var(--color-text-secondary); font-weight: 700; }
    .dp__section-preview strong { font-weight: 700; }
    .dp__section-chev {
      width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-tertiary);
      transition: transform 200ms;
      flex-shrink: 0;
    }
    .dp__section.open .dp__section-chev { transform: rotate(180deg); }
    .dp__section.open .dp__section-icon { transform: scale(1.04); }
    .dp__section-body { display: none; padding: 14px 16px 16px; }
    .dp__section.open .dp__section-body {
      display: block;
      border-top: 1px solid var(--color-bg-muted);
      margin: 0 16px;
      padding: 14px 0 16px;
    }

    /* 통근 경로 */
    .dp-route {
      background: var(--color-bg-subtle);
      border: 1px solid var(--color-border-default);
      border-radius: 10px;
      padding: 11px 13px;
      margin-bottom: 6px;
    }
    .dp-route.best {
      background: var(--color-bg-panel);
      border-color: var(--color-brand-primary);
      border-width: 1.5px;
    }
    .dp-route__head {
      display: flex; flex-direction: column; align-items: stretch; gap: 9px;
      cursor: pointer;
      margin-bottom: 4px;
    }
    .dp-route__topline { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
    .dp-route__sub { font-size: 12px; color: var(--color-text-tertiary); font-weight: 500; margin-left: 8px; }
    .dp-route__time {
      font-size: 18px; font-weight: 700;
      color: var(--color-brand-primary);
      font-feature-settings: 'tnum';
      letter-spacing: -0.01em;
    }
    .dp-route__time .unit {
      font-size: 12px; font-weight: 500;
      color: var(--color-text-secondary);
      margin-left: 1px;
    }
    .dp-route__mode {
      font-size: 13px; color: var(--color-text-primary);
      flex: 1; font-weight: 600;
    }
    .dp-route__chev {
      font-size: 11px; color: var(--color-text-tertiary);
      transition: transform 200ms;
    }
    .dp-route__body { display: none; padding-top: 8px; }
    .dp-route__body.open { display: block; }
    .dp-route.best .dp-route__chev { transform: rotate(180deg); }

    /* 한 줄 여정 요약 바 + 펼침 타임라인 */
    .dp-bar { display: flex; gap: 3px; height: 28px; }
    .dp-seg {
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
      font-size: 11.5px; font-weight: 700; padding: 0 7px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      min-width: 0; font-feature-settings: 'tnum';
    }
    .dp-tl-row {
      display: flex; gap: 11px; padding: 9px 0;
      border-bottom: 1px solid var(--color-border-default);
    }
    .dp-tl-row:last-child { border-bottom: none; }
    .dp-tl-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
    .dp-tl-dot.walk { width: 9px; height: 9px; margin-top: 5px; margin-left: 2px; background: var(--color-text-tertiary); }
    .dp-tl-info { flex: 1; min-width: 0; }
    .dp-tl-head { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
    .dp-tl-badge {
      display: inline-flex; align-items: center;
      font-size: 12px; font-weight: 600; padding: 2px 9px; border-radius: 5px;
    }
    .dp-tl-time { font-size: 12px; color: var(--color-text-tertiary); font-weight: 500; }
    .dp-tl-sta { font-size: 14px; color: var(--color-text-primary); line-height: 1.4; }
    .dp-tl-sta .arr { color: var(--color-text-tertiary); margin: 0 5px; }
    .dp-tl-walk { font-size: 13px; color: var(--color-text-secondary); }

    .dp-step {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 0; font-size: 13px;
      color: var(--color-text-primary);
      border-bottom: 1px solid var(--color-border-default);
    }
    .dp-step:last-child { border-bottom: none; }
    .dp-step-type {
      flex-shrink: 0;
      min-width: 44px; padding: 2px 0;
      text-align: center;
      border-radius: 4px;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.02em;
      background: var(--blue-100);
      color: var(--blue-700);
    }
    .dp-step-type.walk { background: var(--color-bg-muted); color: var(--color-text-secondary); }
    .dp-step-type.bus { background: var(--green-100); color: var(--green-700); }
    .dp-step-type.subway { background: var(--blue-100); color: var(--blue-700); }
    .dp-step-info { flex: 1; min-width: 0; line-height: 1.4; }
    .dp-step-line { font-weight: 600; color: var(--color-text-primary); font-size: 13.5px; }
    .dp-step-sta { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; font-weight: 500; }
    .dp-step-time {
      flex-shrink: 0; font-weight: 700;
      color: var(--color-text-primary);
      font-size: 12.5px;
      font-feature-settings: 'tnum';
    }
    .dp-route-more-btn {
      width: 100%;
      padding: 9px;
      background: var(--color-bg-panel);
      border: 1px solid var(--color-border-default);
      border-radius: 8px;
      font-size: 12px; font-weight: 600;
      color: var(--color-text-secondary);
      cursor: pointer;
      font-family: inherit;
      margin-top: 4px;
      transition: all 120ms;
    }
    .dp-route-more-btn:hover {
      background: var(--color-bg-subtle);
      border-color: var(--color-border-strong);
    }
    #dp-routes-extra { display: none; }
    #dp-routes-extra.open { display: block; }

    /* 건물 정보 그리드 */
    .dp-building-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px 14px;
    }
    .dp-bld-item { display: flex; flex-direction: column; gap: 1px; }
    .dp-bld-label {
      font-size: 11.5px; font-weight: 700;
      color: var(--color-text-secondary);
      letter-spacing: 0.02em;
    }
    .dp-bld-value {
      font-size: 14px; color: var(--color-text-primary);
      font-weight: 600;
      font-feature-settings: 'tnum';
    }

    /* KPI */
    .dp-kpis {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
      margin-bottom: 12px;
    }
    .dp-kpi {
      background: var(--color-bg-subtle);
      border: 1px solid var(--color-border-default);
      border-radius: 8px;
      padding: 11px 8px;
      text-align: center;
    }
    .dp-kpi-label {
