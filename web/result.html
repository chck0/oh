<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BADUGI — 분석 결과</title>

  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/[email protected]/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/static/design-system/tokens.css">
  <link rel="stylesheet" href="/static/design-system/typography.css">
  <link rel="stylesheet" href="/static/design-system/motion.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- 카카오맵 SDK (클러스터러 제거 — 단지 단위 핀 직접 표시) -->
  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=764855b79f6cfa586600499f333d624c&autoload=false"></script>

  <style>
    /* ── 기본 레이아웃 ──────────────────────────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: 'Pretendard', system-ui, sans-serif;
      background: white;
      color: var(--color-text-primary);
      height: 100vh; line-height: 1.5;
      display: flex; flex-direction: column;
      letter-spacing: -0.0025em;
      -webkit-font-smoothing: antialiased;
    }
    header {
      flex-shrink: 0; background: white;
      padding: 16px 22px;
      border-bottom: 1px solid var(--color-border-strong);
      display: flex; align-items: center; gap: 20px;
    }
    header h1 {
      color: var(--color-brand-primary);
      font-size: 20px; font-weight: 700;
      letter-spacing: -0.01em;
    }
    .back-link {
      color: var(--color-text-secondary); text-decoration: none;
      font-size: 14px; font-weight: 500;
    }
    .back-link:hover { color: var(--color-brand-primary); }

    .num { font-feature-settings: 'tnum'; font-variant-numeric: tabular-nums; }

    .partial-banner {
      margin: 12px 0; padding: 10px 14px;
      background: var(--color-warning-bg, #fff8e1);
      border-left: 3px solid var(--color-warning, #f59e0b);
      border-radius: 4px;
      font-size: 13px; color: var(--color-warning-text, #78350f);
      line-height: 1.5;
    }

    /* ════════════════════════════════════════════════════════
       [5] 로딩 오버레이 — 3단계 진행 표시
       ════════════════════════════════════════════════════════ */
    .loading-overlay {
      position: fixed; inset: 0; background: white; z-index: 1000;
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 24px 32px; overflow-y: auto;
    }
    .loading-overlay.hidden { display: none; }

    .loading-head {
      text-align: center; margin-bottom: 24px; max-width: 520px;
    }
    .loading-head h2 {
      font-size: 24px; font-weight: 700;
      letter-spacing: -0.015em;
      color: var(--color-text-primary);
      margin-bottom: 6px;
    }
    .loading-head h2.done { color: var(--color-brand-primary); }
    .loading-head p {
      font-size: 14px; color: var(--color-text-secondary);
      line-height: 1.55;
    }
    .loading-head p strong {
      color: var(--color-text-primary); font-weight: 600;
    }

    /* 진행 단계 */
    .progress-steps {
      display: flex; align-items: flex-start; justify-content: center;
      margin-bottom: 28px;
      font-feature-settings: 'tnum';
    }
    .progress-step {
      display: flex; flex-direction: column; align-items: center;
      gap: 6px; padding: 0 4px;
    }
    .progress-step__dot {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--color-bg-muted);
      border: 2px solid var(--color-border-default);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      color: var(--color-text-tertiary);
      position: relative;
      transition: all 200ms;
    }
    .progress-step.active .progress-step__dot {
      background: var(--color-brand-primary);
      border-color: var(--color-brand-primary);
      color: white;
      box-shadow: 0 0 0 4px var(--color-brand-bg-subtle);
    }
    .progress-step.done .progress-step__dot {
      background: var(--color-brand-primary);
      border-color: var(--color-brand-primary);
      color: white;
    }
    .progress-step.done .progress-step__dot .pn { display: none; }
    .progress-step.done .progress-step__dot::after {
      content: ''; position: absolute;
      width: 10px; height: 6px;
      border-left: 2px solid white;
      border-bottom: 2px solid white;
      transform: rotate(-45deg);
      margin-top: -2px;
    }
    .progress-step__label {
      font-size: 11.5px; font-weight: 600;
      color: var(--color-text-tertiary);
      white-space: nowrap;
    }
    .progress-step.active .progress-step__label { color: var(--color-brand-primary); }
    .progress-step.done .progress-step__label { color: var(--color-text-secondary); }
    .progress-connector {
      width: 56px; height: 2px;
      background: var(--color-border-default);
      margin-top: 12px;
      position: relative; overflow: hidden;
      border-radius: 2px;
    }
    .progress-connector.done { background: var(--color-brand-primary); }
    .progress-connector.in-progress::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, var(--color-brand-primary) 50%, transparent 50%);
      background-size: 200% 100%;
      animation: progress-flow 1.4s linear infinite;
    }
    @keyframes progress-flow {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 영상 + 플레이리스트 */
    .video-row {
      display: flex; gap: 16px; align-items: stretch;
      width: 100%; max-width: 640px;
    }
    .video-stage {
      flex-shrink: 0;
      width: 280px; aspect-ratio: 9/16;
      background: #1A1816;
      border-radius: 12px; overflow: hidden;
      position: relative;
      box-shadow: var(--shadow-xl);
    }
    .video-stage video { width: 100%; height: 100%; object-fit: cover; }
    .video-title {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 12px 14px 11px;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      color: white; font-size: 12.5px; font-weight: 500;
      letter-spacing: -0.005em;
    }
    .video-side {
      display: flex; flex-direction: column; gap: 10px;
      flex: 1; min-width: 0;
    }
    .mute-btn {
      padding: 10px 14px; background: white;
      color: var(--color-text-primary);
      border: 1px solid var(--color-border-default);
      border-radius: 10px;
      font-family: inherit;
      font-size: 12.5px; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      transition: all 120ms;
    }
    .mute-btn:hover { background: var(--color-bg-subtle); }
    .mute-btn .mute-icon { font-size: 14px; }
    .mute-btn .mute-text { flex: 1; text-align: left; }
    .mute-btn.unmuted {
      background: var(--color-brand-bg-subtle);
      border-color: var(--color-brand-primary);
      color: var(--color-brand-primary);
    }
    .playlist {
      background: white;
      border: 1px solid var(--color-border-default);
      border-radius: 10px; overflow: hidden;
      flex: 1; display: flex; flex-direction: column;
    }
    .playlist-head {
      padding: 10px 14px;
      font-size: 10px; font-weight: 700;
      color: var(--color-text-tertiary);
      letter-spacing: 0.12em; text-transform: uppercase;
      border-bottom: 1px solid var(--color-border-default);
      background: var(--color-bg-subtle);
      display: flex; justify-content: space-between; align-items: center;
    }
    .playlist-head .pl-count {
      letter-spacing: 0; text-transform: none;
      font-weight: 500;
      font-feature-settings: 'tnum';
    }
    .playlist-items {
      flex: 1; overflow-y: auto;
      max-height: 320px;
    }
    .playlist-item {
      padding: 9px 14px; font-size: 12.5px;
      color: var(--color-text-secondary);
      cursor: pointer;
      border-bottom: 1px solid var(--color-bg-muted);
      display: flex; align-items: center; gap: 8px;
      transition: background 120ms;
    }
    .playlist-item:last-child { border-bottom: none; }
    .playlist-item:hover { background: var(--color-bg-subtle); }
    .playlist-item.active {
      background: var(--color-brand-bg-subtle);
      color: var(--color-brand-primary);
      font-weight: 600;
    }
    .playlist-item .pl-num {
      font-size: 11px; font-weight: 500;
      width: 14px;
      color: var(--color-text-tertiary);
      font-feature-settings: 'tnum';
    }
    .playlist-item.active .pl-num { color: var(--color-brand-primary); }
    .playlist-item .pl-glyph { width: 8px; font-size: 9px; }

    .done-btn {
      margin-top: 24px;
      padding: 14px 36px;
      background: var(--color-brand-primary); color: white;
      border: none; border-radius: 12px;
      font-family: inherit;
      font-size: 15px; font-weight: 700;
      letter-spacing: -0.005em;
      cursor: pointer; display: none;
      align-items: center; gap: 8px;
      box-shadow: 0 4px 16px rgba(168, 46, 27, 0.30);
      transition: all 200ms;
    }
    .done-btn:hover {
      background: var(--color-brand-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(168, 46, 27, 0.38);
    }
    .done-btn .arrow { font-size: 16px; transition: transform 200ms; }
    .done-btn:hover .arrow { transform: translateX(3px); }
    .done-btn.show {
      display: inline-flex;
      animation: fadeInUp 400ms ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ════════════════════════════════════════════════════════
       메인 결과 레이아웃
       ════════════════════════════════════════════════════════ */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .summary-bar {
      flex-shrink: 0; background: white;
      padding: 14px 22px;
      border-bottom: 1px solid var(--color-border-strong);
      font-size: 14px;
      display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
      font-feature-settings: 'tnum';
    }
    .summary-bar strong {
      color: var(--color-brand-primary);
      font-weight: 700;
      font-size: 15px;
    }
    .summary-bar .stats {
      color: var(--color-text-secondary);
      font-size: 13px; margin-left: auto;
      font-weight: 500;
    }
    .summary-bar .sep {
      color: var(--color-border-strong);
      font-weight: 400;
    }

    /* result-layout: 정확히 2개의 자식(left-panel, map-panel)만 갖는 grid */
    .result-layout {
      flex: 1; display: grid;
      grid-template-columns: 400px 1fr;
      min-height: 0;
    }
    /* 좌측 패널 — fav-tabs(상단) + cards-panel(스크롤) 세로 배치 */
    .left-panel {
      display: flex; flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--color-border-strong);
      min-height: 0;
    }
    .cards-panel {
      overflow-y: auto;
      background: white;
      padding: 14px;
      flex: 1; min-height: 0;
    }
    .map-panel { position: relative; }
    #map { width: 100%; height: 100%; background: #f0f0f0; }

    /* ════════════════════════════════════════════════════════
       [2] 통계 패널 — 미니 막대그래프
       ════════════════════════════════════════════════════════ */
    .stats-panel {
      background: white;
      border: 1px solid var(--color-border-strong);
      border-radius: var(--radius-lg);
      padding: 16px 16px 14px;
      margin-bottom: 12px;
    }
    .stats-panel__top {
      display: flex; align-items: baseline; gap: 8px;
      padding-bottom: 14px;
      border-bottom: 1.5px solid var(--color-border-strong);
      margin-bottom: 16px;
    }
    .stats-panel__count {
      font-size: 26px; font-weight: 700;
      letter-spacing: -0.015em;
      color: var(--color-text-primary);
      font-feature-settings: 'tnum';
    }
    .stats-panel__count .unit {
      font-size: 14px; font-weight: 500;
      color: var(--color-text-secondary);
      margin-left: 2px;
    }
    .stats-panel__avg {
      font-size: 14px;
      color: var(--color-text-secondary);
      margin-left: auto;
      font-feature-settings: 'tnum';
    }
    .stats-panel__avg strong {
      font-weight: 700;
      color: var(--color-text-primary);
      font-size: 15px;
    }

    .stats-block { margin-bottom: 14px; }
    .stats-block:last-child { margin-bottom: 0; }
    .stats-block__label {
      font-size: 13px; font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: -0.005em;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .stats-block__label-helper {
      font-size: 12px; font-weight: 500;
      color: var(--color-text-secondary);
      letter-spacing: 0;
      margin-left: auto;
    }

    .minibar-row {
      display: grid;
      grid-template-columns: 76px 1fr 56px;
      align-items: center; gap: 12px;
      padding: 5px 0; font-size: 13.5px;
      font-feature-settings: 'tnum';
    }
    .minibar-row__label {
      color: var(--color-text-primary);
      font-weight: 600;
      white-space: nowrap;
    }
    .minibar-row__track {
      height: 9px;
      background: var(--color-bg-muted);
      border-radius: 3px; position: relative; overflow: hidden;
    }
    .minibar-row__fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      background: var(--color-text-secondary);
      border-radius: 3px;
    }
    .minibar-row.cheap .minibar-row__fill {
      background: var(--color-brand-primary);
    }
    .minibar-row__value {
      text-align: right; font-weight: 700;
      color: var(--color-text-primary);
      font-size: 14px;
    }

    .stacked-bar {
      display: flex; height: 10px;
      border-radius: 4px; overflow: hidden;
      background: var(--color-bg-muted);
    }
    .stacked-bar__seg { height: 100%; }
    .stacked-bar__seg.s-new     { background: var(--green-700); }
    .stacked-bar__seg.s-mid     { background: var(--amber-700); }
    .stacked-bar__seg.s-old     { background: var(--gray-500); }
    .stacked-bar__seg.s-unknown { background: var(--gray-300); }

    .stacked-legend {
      display: flex; flex-wrap: wrap; gap: 10px 16px;
      margin-top: 10px; font-size: 13px;
      font-feature-settings: 'tnum';
    }
    .stacked-legend__item {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--color-text-primary);
      font-weight: 500;
    }
    .stacked-legend__dot { width: 8px; height: 8px; border-radius: 2px; }
    .stacked-legend__dot.s-new     { background: var(--green-700); }
    .stacked-legend__dot.s-mid     { background: var(--amber-700); }
    .stacked-legend__dot.s-old     { background: var(--gray-500); }
    .stacked-legend__dot.s-unknown { background: var(--gray-300); }
    .stacked-legend__count {
      font-weight: 600; color: var(--color-text-primary);
      margin-left: 1px;
    }

    .pyeong-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    }
    .pyeong-grid__cell {
      background: var(--color-bg-subtle);
      border: 1px solid var(--color-border-default);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .pyeong-grid__pt {
      font-size: 12.5px; font-weight: 700;
      color: var(--color-text-primary);
      margin-bottom: 4px;
    }
    .pyeong-grid__val {
      font-size: 16px; font-weight: 700;
      color: var(--color-text-primary);
      font-feature-settings: 'tnum';
      letter-spacing: -0.005em;
    }
    .pyeong-grid__cnt {
      font-size: 12px; color: var(--color-text-secondary);
      font-feature-settings: 'tnum';
      font-weight: 500;
      margin-top: 3px;
    }

    /* ════════════════════════════════════════════════════════
       추천 섹션 헤더
       ════════════════════════════════════════════════════════ */
    .rec-section-head {
      background: linear-gradient(135deg, var(--red-600) 0%, var(--red-800) 100%);
      color: white; border-radius: var(--radius-lg);
      padding: 14px 16px;
      margin: 4px 0 10px;
    }
    .rec-section-head h3 {
      font-size: 16px; font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 5px;
    }
    .rec-section-head p {
      font-size: 12.5px; opacity: 0.9;
      line-height: 1.55;
    }

    /* ════════════════════════════════════════════════════════
       [1] 추천 카드 — AI 친구 코멘트 HERO
       ════════════════════════════════════════════════════════ */
    .rec-card {
      position: relative;
      background: white;
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border-strong);
      border-left: 4px solid var(--color-brand-primary);
      padding: 18px 44px 16px 18px;  /* right 44px: ♥ 버튼 공간 확보 */
      margin-bottom: 10px;
      cursor: pointer;
      transition: box-shadow 200ms ease;
    }
    .rec-card:hover { box-shadow: var(--shadow-lg); }
    .rec-card__slot {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 700;
      color: var(--color-brand-primary);
      background: var(--color-brand-bg-subtle);
      padding: 5px 11px;
      border-radius: var(--radius-sm);
      letter-spacing: 0.01em;
    }
    .rec-card__slot-divider {
      width: 1px; height: 9px;
      background: currentColor; opacity: 0.4;
    }
    .rec-card__title-row {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 12px; margin: 12px 0 4px;
    }
    .rec-card__title {
      font-size: 18px; font-weight: 700;
      letter-spacing: -0.005em;
      color: var(--color-text-primary);
      line-height: 1.3; flex: 1;
    }
    .rec-card__price {
      font-size: 22px; font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--color-text-primary);
      font-feature-settings: 'tnum';
      white-space: nowrap; line-height: 1.2;
    }
    .rec-card__price .unit {
      font-size: 14px; font-weight: 500;
      color: var(--color-text-secondary);
      margin-left: 1px;
    }
    .rec-card__meta {
      font-size: 13.5px; color: var(--color-text-secondary);
      font-feature-settings: 'tnum';
      margin-bottom: 14px; line-height: 1.55;
      font-weight: 500;
    }
    .rec-card__meta .dot {
      display: inline-block; width: 2px; height: 2px; border-radius: 50%;
      background: currentColor; opacity: 0.5;
      margin: 0 6px; vertical-align: middle;
    }

    /* AI 친구 한마디 — HERO */
    .rec-card__friend {
      display: flex; gap: 11px; align-items: flex-start;
      background: linear-gradient(180deg, #FDF4F2 0%, #FBEDE9 100%);
      border-radius: 10px;
      padding: 12px 13px 13px;
      margin-bottom: 12px;
    }
    .rec-card__friend.empty {
      background: var(--color-bg-subtle);
    }
    .rec-card__friend-avatar {
      flex-shrink: 0;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--color-brand-primary);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      box-shadow: 0 2px 6px rgba(168, 46, 27, 0.25);
      margin-top: 1px;
    }
    .rec-card__friend.empty .rec-card__friend-avatar {
      background: var(--color-text-tertiary);
      box-shadow: none;
    }
    .rec-card__friend-body { flex: 1; min-width: 0; }
    .rec-card__friend-label {
      font-size: 11px; font-weight: 700;
      color: var(--color-brand-primary);
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 5px;
    }
    .rec-card__friend.empty .rec-card__friend-label {
      color: var(--color-text-tertiary);
    }
    .rec-card__friend-text {
      font-size: 15px; line-height: 1.6;
      color: var(--color-text-primary);
      white-space: pre-line;
      letter-spacing: -0.005em;
      font-weight: 500;
    }
    .rec-card__friend.empty .rec-card__friend-text {
      font-style: italic; color: var(--color-text-tertiary);
      font-weight: 400;
    }
    .spinner-mini {
      display: inline-block; width: 10px; height: 10px;
      border: 1.5px solid var(--color-border-default);
      border-top-color: var(--color-text-tertiary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px; vertical-align: -1px;
    }

    .why-tags {
      font-size: 11px;
      color: #888;
      margin-top: 3px;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── 관심 단지 ♥ ───────────────────────────────────────── */
    .fav-btn {
      position: absolute; top: 10px; right: 12px;
      background: none; border: none; cursor: pointer;
      font-size: 20px; line-height: 1; color: #ddd;
      padding: 4px; border-radius: 50%;
      transition: color 0.15s, transform 0.12s;
      z-index: 2;
    }
    .fav-btn:hover { transform: scale(1.25); color: #e74c3c; }
    .fav-btn.active { color: #e74c3c; }

    /* 탭 (전체 / ♥ 관심) */
    .fav-tabs {
      display: flex; gap: 0;
      border-bottom: 1px solid var(--color-border-strong);
      background: white;
      position: sticky; top: 0; z-index: 10;
      margin-bottom: 12px;
    }
    .fav-tab-btn {
      flex: 1; padding: 9px 0; border: none; background: none;
      border-bottom: 2px solid transparent;
      font-size: 13px; font-weight: 600; cursor: pointer;
      color: var(--color-text-secondary);
      transition: color 0.15s, border-color 0.15s;
    }
    .fav-tab-btn.active {
      color: var(--color-brand-primary);
      border-bottom-color: var(--color-brand-primary);
    }
    .fav-tab-btn:disabled { opacity: 0.38; cursor: not-allowed; }
    .fav-empty {
      padding: 40px 20px; text-align: center;
      color: var(--color-text-secondary); font-size: 14px; line-height: 1.8;
    }

    .rec-card__footer {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
      padding-top: 14px;
      border-top: 1px dashed var(--color-border-strong);
    }
    .rec-card__transit {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 600;
      color: var(--blue-700);
      font-feature-settings: 'tnum';
    }
    .rec-card__transit strong {
      font-size: 14px; font-weight: 700;
    }
    .commute-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 11px;
      background: var(--blue-100);
      color: var(--blue-700);
      border-radius: var(--radius-pill);
      font-size: 12.5px; font-weight: 600;
      font-feature-settings: 'tnum';
    }
    .rec-card__reason {
      font-size: 12.5px;
      color: var(--color-text-secondary);
      font-weight: 500;
      text-align: right;
    }

    /* ════════════════════════════════════════════════════════
       [3] 버킷 섹션 — 접힘 상태 정보 노출
       ════════════════════════════════════════════════════════ */
    .bucket-divider {
      font-size: 13px; font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: -0.005em;
      padding: 18px 4px 10px;
    }
    .bucket-section {
      background: white;
      border: 1px solid var(--color-border-strong);
      border-radius: var(--radius-lg);
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color 200ms, box-shadow 200ms;
    }
    .bucket-section:hover { box-shadow: var(--shadow-sm); }
    .bucket-section:hover { border-color: var(--color-border-strong); }
    .bucket-section.open { border-color: var(--color-border-strong); }
    .bucket-head {
      padding: 16px 18px; cursor: pointer; user-select: none;
      display: flex; flex-direction: column; gap: 10px;
    }
    .bucket-head__top {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px;
    }
    .bucket-head__title {
      display: flex; align-items: baseline; gap: 8px;
    }
    .bucket-head__time {
      font-size: 17px; font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: -0.01em;
    }
    .bucket-head__cnt {
      font-size: 13px; font-weight: 600;
      color: var(--color-text-secondary);
      font-feature-settings: 'tnum';
    }
    .bucket-head__chev {
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-tertiary);
      transition: transform 200ms;
    }
    .bucket-section.open .bucket-head__chev { transform: rotate(180deg); }
    .bucket-head__bottom {
      display: flex; align-items: center;
      gap: 12px; flex-wrap: wrap;
      font-feature-settings: 'tnum';
    }
    .bucket-head__price {
      font-size: 13.5px;
      color: var(--color-text-secondary);
      font-weight: 500;
    }
    .bucket-head__price strong {
      font-weight: 700; color: var(--color-text-primary);
      font-size: 14.5px;
    }
    .bucket-head__price .price-sep {
      margin: 0 4px; color: var(--color-text-tertiary);
    }
    .bucket-head__pts {
      display: flex; gap: 5px; flex-wrap: wrap;
    }
    .bucket-pt-chip {
      display: inline-flex; align-items: baseline; gap: 4px;
      background: var(--color-bg-subtle);
      border: 1px solid var(--color-border-strong);
      border-radius: var(--radius-sm);
      padding: 3px 9px; font-size: 12.5px;
      color: var(--color-text-secondary);
      font-weight: 600;
      font-feature-settings: 'tnum';
    }
    .bucket-pt-chip strong {
      color: var(--color-text-primary);
      font-weight: 700;
    }
    .bucket-head__ratio {
      height: 4px;
      background: var(--color-bg-muted);
      border-radius: 2px; overflow: hidden;
    }
    .bucket-head__ratio-fill {
      height: 100%;
      background: var(--color-brand-primary);
      opacity: 0.55; border-radius: 2px;
    }
    .bucket-body {
      display: none;
      border-top: 1.5px solid var(--color-border-strong);
      background: var(--color-bg-subtle);
      padding: 12px;
    }
    .bucket-section.open .bucket-body { display: block; }
    .bucket-pt-label {
      font-size: 12px; font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: -0.005em;
      margin: 14px 2px 8px;
    }
    .bucket-pt-label:first-child { margin-top: 4px; }
    .bucket-pt-label:first-child { margin-top: 4px; }

    /* 일반 list-card (버킷 안) */
    .list-card {
      position: relative;
      background: white;
      border: 1px solid var(--color-border-strong);
      border-radius: 10px;
      padding: 13px 40px 13px 14px;  /* right 40px: ♥ 버튼 공간 확보 */
      margin-bottom: 8px;
      cursor: pointer;
      transition: box-shadow 200ms, border-color 200ms;
    }
    .list-card:hover { border-color: var(--color-text-tertiary); }
    .list-card:hover { box-shadow: var(--shadow-md); }
    .list-card:last-child { margin-bottom: 0; }
    .list-card__top {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 10px; margin-bottom: 4px;
    }
    .list-card__name {
      font-size: 15px; font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: -0.005em;
    }
    .list-card__name .pt {
      font-size: 13px; font-weight: 600;
      color: var(--color-text-secondary);
      margin-left: 6px;
    }
    .list-card__price {
      font-size: 16px; font-weight: 700;
      color: var(--color-text-primary);
      font-feature-settings: 'tnum';
      letter-spacing: -0.005em;
    }
    .list-card__meta {
      font-size: 13px; color: var(--color-text-secondary);
      font-feature-settings: 'tnum';
      margin-bottom: 8px;
      line-height: 1.5;
      font-weight: 500;
    }
    .list-card__row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 6px;
    }
    .list-card__comment {
      font-size: 13px; line-height: 1.6;
      color: var(--color-text-primary);
      background: var(--color-brand-bg-subtle);
      border-left: 3px solid var(--color-brand-primary);
      padding: 8px 11px; border-radius: 5px;
      margin-top: 8px;
      white-space: pre-line;
      font-weight: 500;
    }
    .list-card__comment.empty {
      background: var(--color-bg-subtle);
      border-color: var(--color-border-default);
      color: var(--color-text-tertiary);
      font-style: italic;
    }

    .error-box {
      background: white; padding: 24px;
      border: 1px solid var(--color-brand-primary);
      border-radius: var(--radius-lg);
      text-align: center;
    }
    .error-box h2 {
      color: var(--color-brand-primary); margin-bottom: 12px;
      font-size: 18px; font-weight: 700;
    }

    /* ════════════════════════════════════════════════════════
       지도 핀 (디자인 시스템 §4 핀 체계)
       ════════════════════════════════════════════════════════ */
    .pin {
      padding: 4px 10px;
      background: var(--color-pin-default-bg);
      border: 1px solid var(--color-pin-default-border);
      border-radius: var(--radius-pill);
      font-size: 12px; font-weight: 600;
      color: var(--color-pin-default-text);
      white-space: nowrap; cursor: pointer;
      box-shadow: var(--shadow-md);
      font-family: 'Pretendard', system-ui, sans-serif;
      font-feature-settings: 'tnum';
      transition: transform 120ms ease, box-shadow 120ms ease;
    }
    .pin:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }
    .pin-best {
      background: var(--color-pin-recommended-bg);
      color: var(--color-pin-recommended-text);
      border-color: var(--color-pin-recommended-bg);
      box-shadow: var(--shadow-pin-recommended);
    }
    .pin-workplace {
      background: var(--color-pin-selected-bg);
      color: var(--color-pin-selected-text);
      border: 2px solid var(--color-brand-primary);
      padding: 6px 14px;
      font-size: 12.5px; font-weight: 700;
      letter-spacing: 0.02em;
    }
    .pin-multi-mark {
      display: inline-block;
      background: white; color: var(--color-text-tertiary);
      font-size: 9px; font-weight: 700;
      padding: 0 4px;
      border-radius: 3px;
      margin-left: 5px;
      font-feature-settings: 'tnum';
    }
    .pin-best .pin-multi-mark {
      background: rgba(255,255,255,0.25);
      color: white;
    }

    /* ════════════════════════════════════════════════════════
       [4] 호버 툴팁
       ════════════════════════════════════════════════════════ */
    .pin-tooltip {
      position: fixed; z-index: 900;
      width: 310px;
      background: white;
      border: 1px solid var(--color-border-strong);
      border-radius: 12px;
      box-shadow: var(--shadow-xl);
      overflow: hidden;
      cursor: pointer;
      transition: opacity 100ms ease;
    }
    .pin-tooltip.hidden { display: none; }
    .pin-tooltip__head { padding: 14px 16px 0; }
    .pin-tooltip__top {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; margin-bottom: 3px;
    }
    .pin-tooltip__name {
      font-size: 16px; font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--color-text-primary);
      line-height: 1.3;
    }
    .pin-tooltip__badge {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.05em;
      background: var(--color-brand-primary);
      color: white;
      padding: 2px 7px;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
    }
    .pin-tooltip__meta {
      font-size: 13px; color: var(--color-text-secondary);
      font-feature-settings: 'tnum';
      margin-bottom: 14px;
      font-weight: 500;
    }
    .pin-tooltip__tabs {
      display: flex; gap: 0;
      border-bottom: 1px solid var(--color-border-default);
      padding: 0 16px;
    }
    .pin-tooltip__tab {
      padding: 10px 0; margin-right: 18px;
      font-size: 13.5px; font-weight: 600;
      color: var(--color-text-secondary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 120ms;
      font-feature-settings: 'tnum';
    }
    .pin-tooltip__tab:hover { color: var(--color-text-secondary); }
    .pin-tooltip__tab.active {
      color: var(--color-brand-primary);
      border-bottom-color: var(--color-brand-primary);
    }
    .pin-tooltip__body { padding: 12px 16px 0; }
    .pin-tooltip__metric-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .pin-tooltip__metric {
      display: flex; flex-direction: column; gap: 2px;
    }
    .pin-tooltip__metric-label {
      font-size: 11px; font-weight: 700;
      color: var(--color-text-tertiary);
      letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 1px;
    }
    .pin-tooltip__metric-val {
      font-size: 17px; font-weight: 700;
      color: var(--color-text-primary);
      font-feature-settings: 'tnum';
      letter-spacing: -0.01em;
    }
    .pin-tooltip__metric-val .unit {
      font-size: 12px; font-weight: 500;
      color: var(--color-text-secondary);
      margin-left: 2px;
    }
    .pin-tooltip__metric-sub {
      font-size: 12px;
      color: var(--color-text-secondary);
      font-feature-settings: 'tnum';
      margin-top: 2px;
      font-weight: 500;
    }
    .pin-tooltip__comment {
      font-size: 13px; line-height: 1.6;
      color: var(--color-text-primary);
      background: var(--color-brand-bg-subtle);
      border-left: 3px solid var(--color-brand-primary);
      padding: 9px 12px;
      border-radius: 5px;
      margin-bottom: 14px;
      white-space: pre-line;
      font-weight: 500;
    }
    .pin-tooltip__comment.empty {
      background: var(--color-bg-subtle);
      border-color: var(--color-border-default);
      color: var(--color-text-tertiary);
      font-style: italic;
    }
    .pin-tooltip__cta {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      background: var(--color-bg-subtle);
      border-top: 1.5px solid var(--color-border-strong);
      font-size: 13.5px; font-weight: 700;
      color: var(--color-text-primary);
      transition: background 120ms, color 120ms;
    }
    .pin-tooltip:hover .pin-tooltip__cta {
      background: var(--color-brand-bg-subtle);
      color: var(--color-brand-primary);
    }
    .pin-tooltip__cta-arrow {
      font-size: 14px; transition: transform 200ms;
    }
    .pin-tooltip:hover .pin-tooltip__cta-arrow {
      transform: translateX(3px);
    }

    /* ════════════════════════════════════════════════════════
       [6] 상세 패널
       ════════════════════════════════════════════════════════ */
    .dp__header {
      position: sticky; top: 0; z-index: 10;
      background: linear-gradient(135deg, var(--red-600) 0%, var(--red-800) 100%);
      padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 2px 8px rgba(168, 46, 27, 0.20);
    }
    .dp__back {
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: var(--radius-sm);
      padding: 5px 11px;
      font-size: 12.5px; font-weight: 600;
      color: white;
      cursor: pointer; font-family: inherit;
      transition: all 120ms;
      backdrop-filter: blur(4px);
    }
    .dp__back:hover {
      background: rgba(255, 255, 255, 0.28);
      border-color: rgba(255, 255, 255, 0.5);
    }
    .dp__name {
      font-size: 17px; font-weight: 700;
      letter-spacing: -0.01em;
      color: white;
      flex: 1; min-width: 0;
    }
    .dp__badge {
      font-size: 10.5px; font-weight: 700;
      background: rgba(255, 255, 255, 0.95);
      color: var(--color-brand-primary);
      padding: 3px 8px;
      border-radius: var(--radius-sm);
      letter-spacing: 0.05em;
    }

    .dp__hero {
      padding: 18px 16px 16px;
      background: white;
      border-bottom: 1.5px solid var(--color-border-strong);
    }
    .dp__meta {
      font-size: 13.5px;
      color: var(--color-text-primary);
      font-feature-settings: 'tnum';
      margin-bottom: 12px;
      font-weight: 500;
    }
    .dp__commute {
      font-size: 14px; font-weight: 700;
      color: var(--blue-700);
      font-feature-settings: 'tnum';
      margin-bottom: 14px;
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--blue-100);
      padding: 7px 13px;
      border-radius: var(--radius-pill);
    }
    .dp__friend {
      display: flex; gap: 12px; align-items: flex-start;
      background: linear-gradient(180deg, #FDF4F2 0%, #FBEDE9 100%);
      border-radius: 10px;
      padding: 13px 14px 14px;
    }
    .dp__friend.empty {
      background: var(--color-bg-subtle);
    }
    .dp__friend-body { flex: 1; min-width: 0; }
    .dp__friend-label {
      font-size: 11px; font-weight: 700;
      color: var(--color-brand-primary);
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 5px;
    }
    .dp__friend.empty .dp__friend-label {
      color: var(--color-text-tertiary);
    }
    .dp__friend-avatar {
      flex-shrink: 0;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--color-brand-primary);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      box-shadow: 0 2px 6px rgba(168, 46, 27, 0.25);
      margin-top: 1px;
    }
    .dp__friend.empty .dp__friend-avatar {
      background: var(--color-text-tertiary);
      box-shadow: none;
    }
    .dp__friend-text {
      font-size: 15px; line-height: 1.6;
      color: var(--color-text-primary);
      font-weight: 500;
      white-space: pre-line;
      letter-spacing: -0.005em;
    }
    .dp__friend.empty .dp__friend-text {
      font-style: italic;
      color: var(--color-text-tertiary);
      font-weight: 400;
    }

    .dp__section {
      border-bottom: 1px solid var(--color-border-strong);
    }
    .dp__section:last-child { border-bottom: none; }
    .dp__section-head {
      padding: 16px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer; user-select: none;
      transition: background 120ms;
    }
    .dp__section-head:hover { background: var(--color-bg-subtle); }
    .dp__section-icon {
      flex-shrink: 0;
      width: 32px; height: 32px;
      border-radius: 8px;
      background: var(--color-bg-subtle);
      border: 1px solid var(--color-border-default);
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-secondary);
      transition: all 200ms;
    }
    .dp__section-icon svg { width: 17px; height: 17px; }
    .dp__section-titlebox {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: 1px;
    }
    .dp__section-title {
      font-size: 14.5px; font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: -0.005em;
    }
    .dp__section-preview {
      font-size: 13px; color: var(--color-text-secondary);
      font-feature-settings: 'tnum';
      margin-top: 3px;
      font-weight: 500;
    }
    .dp__section-chev {
      width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-tertiary);
      transition: transform 200ms;
      flex-shrink: 0;
    }
    .dp__section.open .dp__section-chev { transform: rotate(180deg); }
    .dp__section.open .dp__section-icon {
      background: var(--color-brand-bg-subtle);
      color: var(--color-brand-primary);
    }
    .dp__section-body { display: none; padding: 0 16px 16px; }
    .dp__section.open .dp__section-body { display: block; }

    /* 통근 경로 */
    .dp-route {
      background: var(--color-bg-subtle);
      border: 1px solid var(--color-border-default);
      border-radius: 10px;
      padding: 11px 13px;
      margin-bottom: 6px;
    }
    .dp-route.best {
      background: white;
      border-color: var(--color-brand-primary);
      border-width: 1.5px;
    }
    .dp-route__head {
      display: flex; align-items: baseline; gap: 8px;
      cursor: pointer;
      margin-bottom: 4px;
    }
    .dp-route__time {
      font-size: 18px; font-weight: 700;
      color: var(--color-brand-primary);
      font-feature-settings: 'tnum';
      letter-spacing: -0.01em;
    }
    .dp-route__time .unit {
      font-size: 12px; font-weight: 500;
      color: var(--color-text-secondary);
      margin-left: 1px;
    }
    .dp-route__mode {
      font-size: 13px; color: var(--color-text-primary);
      flex: 1; font-weight: 600;
    }
    .dp-route__chev {
      font-size: 11px; color: var(--color-text-tertiary);
      transition: transform 200ms;
    }
    .dp-route__body { display: none; padding-top: 8px; }
    .dp-route__body.open { display: block; }
    .dp-route.best .dp-route__chev { transform: rotate(180deg); }

    .dp-step {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 0; font-size: 13px;
      color: var(--color-text-primary);
      border-bottom: 1px solid var(--color-border-default);
    }
    .dp-step:last-child { border-bottom: none; }
    .dp-step-type {
      flex-shrink: 0;
      min-width: 44px; padding: 2px 0;
      text-align: center;
      border-radius: 4px;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.02em;
      background: var(--blue-100);
      color: var(--blue-700);
    }
    .dp-step-type.walk { background: var(--color-bg-muted); color: var(--color-text-secondary); }
    .dp-step-type.bus { background: var(--green-100); color: var(--green-700); }
    .dp-step-type.subway { background: var(--blue-100); color: var(--blue-700); }
    .dp-step-info { flex: 1; min-width: 0; line-height: 1.4; }
    .dp-step-line { font-weight: 600; color: var(--color-text-primary); font-size: 13.5px; }
    .dp-step-sta { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; font-weight: 500; }
    .dp-step-time {
      flex-shrink: 0; font-weight: 700;
      color: var(--color-text-primary);
      font-size: 12.5px;
      font-feature-settings: 'tnum';
    }
    .dp-route-more-btn {
      width: 100%;
      padding: 9px;
      background: white;
      border: 1px solid var(--color-border-default);
      border-radius: 8px;
      font-size: 12px; font-weight: 600;
      color: var(--color-text-secondary);
      cursor: pointer;
      font-family: inherit;
      margin-top: 4px;
      transition: all 120ms;
    }
    .dp-route-more-btn:hover {
      background: var(--color-bg-subtle);
      border-color: var(--color-border-strong);
    }
    #dp-routes-extra { display: none; }
    #dp-routes-extra.open { display: block; }

    /* 건물 정보 그리드 */
    .dp-building-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px 14px;
    }

<script>
// ═══════════════════════════════════════════════════════
//  영상 플레이리스트
// ═══════════════════════════════════════════════════════
const VIDEOS = [
  '어이(크레용팝).mp4','lnsomnia(휘성).mp4','Love is(트라이앵글).mp4',
  'No1(보아).mp4','Rollin (브레이브걸스).mp4','Shake It(씨스타).mp4',
  '우리집(2PM).mp4','Hold Up (Neo, Jeiff).mp4',
];
const VIDEO_BASE = '/static/videos/';
const vCurr = document.getElementById('video-current');
const vNext = document.getElementById('video-next');
const vTitle = document.getElementById('video-title');
let currentIdx = 0; let playedRecently = new Set();
function shortName(f){ return f.replace(/\.mp4$/,''); }
function pickRandomNext(){
  if(playedRecently.size>=VIDEOS.length-1) playedRecently.clear();
  let c=VIDEOS.map((_,i)=>i).filter(i=>i!==currentIdx&&!playedRecently.has(i));
  if(!c.length) c=VIDEOS.map((_,i)=>i).filter(i=>i!==currentIdx);
  return c[Math.floor(Math.random()*c.length)];
}
function playVideo(idx){
  currentIdx=idx; playedRecently.add(idx);
  vCurr.src=VIDEO_BASE+encodeURIComponent(VIDEOS[idx]); vCurr.load(); vCurr.play().catch(()=>{});
  vTitle.textContent=shortName(VIDEOS[idx]);
  vNext.src=VIDEO_BASE+encodeURIComponent(VIDEOS[pickRandomNext()]); vNext.load();
  renderPlaylist();
}
vCurr.addEventListener('ended',()=>playVideo(pickRandomNext()));
function toggleMute(){
  const btn=document.getElementById('mute-btn');
  const icon=document.getElementById('mute-icon'); const text=document.getElementById('mute-text');
  if(vCurr.muted){ vCurr.muted=false; vNext.muted=false; icon.textContent='🔊'; text.textContent='소리 켜짐'; btn.classList.add('unmuted'); }
  else{ vCurr.muted=true; vNext.muted=true; icon.textContent='🔇'; text.textContent='소리 켜기'; btn.classList.remove('unmuted'); }
}
function renderPlaylist(){
  const plCount = document.getElementById('pl-count');
  if(plCount) plCount.textContent = VIDEOS.length+'곡';
  document.getElementById('playlist-items').innerHTML=VIDEOS.map((name,i)=>`
    <div class="playlist-item ${i===currentIdx?'active':''}" onclick="playVideo(${i})">
      <span class="pl-num">${String(i+1).padStart(2,'0')}</span>
      <span class="pl-glyph">${i===currentIdx?'▶':''}</span>
      <span>${shortName(name)}</span>
    </div>`).join('');
}
playVideo(0);

// ═══════════════════════════════════════════════════════
//  검색 파라미터 + 전역 상태
// ═══════════════════════════════════════════════════════
const params = new URLSearchParams(location.search);
// 필수 파라미터 누락 시 검색 폼으로 redirect
if(!params.get('workplace_address') || !params.get('pyeong_types')){
  location.replace('/search.html');
  throw new Error('redirect');
}
const reqBody = {
  workplace_address: params.get('workplace_address'),
  max_price: parseInt(params.get('max_price'), 10),
  max_minutes: parseInt(params.get('max_minutes'), 10),
  pyeong_types: params.get('pyeong_types').split(','),
};
if(params.get('min_kaptdaCnt')) reqBody.min_kaptdaCnt=parseInt(params.get('min_kaptdaCnt'), 10);
if(params.get('build_year_min')) reqBody.build_year_min=parseInt(params.get('build_year_min'), 10);
if(params.get('min_price')) reqBody.min_price=parseInt(params.get('min_price'), 10);

let resultData = null;
let kakaoMap = null;
let overlays = [];
let aptOverlayMap = {};   // apt_seq → CustomOverlay (핀 show/hide용)
let panelMode = 'list';   // 'list' | 'detail'
let detailChart = null;
let detailChartData = null;
let currentTabKey = null;
let currentDetailCard = null;

// 핀 pyeong 레이블 (검색 조건 첫 번째)
const pyeongLabel = (reqBody.pyeong_types[0]||'')
  .replace('평대+','평+').replace('평대','평').replace('10평미만','<10평');

// ═══════════════════════════════════════════════════════
//  헬퍼 함수
// ═══════════════════════════════════════════════════════
function fmtPrice(manwon){
  if(!manwon) return '-';
  const e=Math.floor(manwon/10000), m=manwon%10000;
  if(e&&m) return `${e}억 ${m.toLocaleString()}만`;
  if(e)    return `${e}억`;
  return `${m.toLocaleString()}만`;
}
function shortPrice(manwon){
  if(!manwon) return '-';
  const e=Math.floor(manwon/10000);
  const sub=Math.round((manwon%10000)/1000);
  return sub===0 ? `${e}억` : `${e}.${sub}억`;
}
function fmtPct(v){
  if(v==null) return '-';
  return (v>0?'+':'')+v+'%';
}
function escHtml(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ═══════════════════════════════════════════════════════
//  검색 실행
// ═══════════════════════════════════════════════════════
const THIS_YEAR = new Date().getFullYear();
let kakaoReady = new Promise(resolve => { kakao.maps.load(resolve); });

async function runSearch(){
  const ctrl = new AbortController();
  const _tid = setTimeout(() => ctrl.abort(), 70000);
  try{
    const res = await fetch('/api/search',{
      method:'POST',
      headers:{'Content-Type':'application/json','ngrok-skip-browser-warning':'1'},
      body: JSON.stringify(reqBody),
      signal: ctrl.signal,
    });
    clearTimeout(_tid);
    if(!res.ok){ const t=await res.text(); throw new Error(`HTTP ${res.status}: ${t}`); }
    resultData = await res.json();
    onSearchDone();
    // LLM 폴링 즉시 시작 — 사용자가 음악 보는 동안 백그라운드에서 코멘트 미리 받아둠
    // (백엔드 BackgroundTask가 응답 직후부터 LLM 돌리고 있음)
    if(resultData.llm_pending){
      setTimeout(pollComments, 2000);  // 첫 폴링까지 2초 (백그라운드 시작 시간 여유)
    }
  } catch(err){
    clearTimeout(_tid);
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('main').style.display='flex';
    const msg = err.name === 'AbortError' ? '검색 시간이 너무 오래 걸렸어요. 잠시 후 다시 시도해주세요.' : err.message;
    document.getElementById('cards-panel').innerHTML=`
      <div class="error-box"><h2>분석 중 오류</h2><p>${msg}</p>
      <p style="margin-top:16px"><a href="/search.html">← 조건 다시 입력</a></p></div>`;
  }
}

// LLM 댓글 폴링 — 백그라운드 완료 후 전체 카드 업데이트
// 추천(Sonnet)과 일반(Haiku) 둘 다 받음. 완료될 때까지 반복 폴링.
let _pollCount = 0;
const MAX_POLL = 72; // 최대 ~6분 후 자동 종료
async function pollComments(){
  if(!resultData || _pollCount >= MAX_POLL) return;
  // 백그라운드 탭에서는 카운트 증가 없이 간격만 늘림
  if(document.hidden){ setTimeout(pollComments, 15000); return; }
  _pollCount++;
  try{
    const pendingCards = resultData.cards.filter(c=>c.friend_comment == null || c.friend_comment === '');
    if(!pendingCards.length) return;
    // URL 길이 한계 대비: 최대 80개씩 끊어서 보냄
    const CHUNK = 80;
    let allComments = {};
    for(let i=0; i<pendingCards.length; i+=CHUNK){
      const slice = pendingCards.slice(i, i+CHUNK);
      const keys = slice.map(c=>`${c.apt_seq}:${c.pyeong_type||''}`).join(',');
      const res = await fetch(`/api/comments?wp_id=${resultData.wp_id}&keys=${encodeURIComponent(keys)}`,
        {headers:{'ngrok-skip-browser-warning':'1'}});
      if(res.ok) Object.assign(allComments, await res.json());
    }

    let updated = false;
    resultData.cards.forEach(c=>{
      const ck = `${c.apt_seq}:${c.pyeong_type||''}`;
      if(allComments[ck] && (c.friend_comment == null || c.friend_comment === '')){
        c.friend_comment = allComments[ck].comment;
        updated = true;
      }
    });
    if(updated && panelMode==='list') renderCards(resultData);

    // 남은 게 있으면 또 폴링 (5초 간격으로 빠르게)
    const remaining = resultData.cards.filter(c=>!c.friend_comment).length;
    if(remaining) setTimeout(pollComments, 5000);
  } catch(e){
    console.warn('댓글 폴링 실패', e);
    setTimeout(pollComments, 10000);
  }
}

function onSearchDone(){
  // 모든 진행 단계 완료 표시 (AI 코멘트는 백그라운드 계속)
  const steps = document.querySelectorAll('.progress-step');
  steps.forEach(s=>{ s.classList.remove('active'); s.classList.add('done'); });
  // 마지막 단계는 active 유지 (AI가 백그라운드로 계속 돌아감)
  if(steps[2]){ steps[2].classList.remove('done'); steps[2].classList.add('active'); }
  document.querySelectorAll('.progress-connector').forEach((c,i)=>{
    c.classList.remove('in-progress');
    if(i===0) c.classList.add('done');
    else c.classList.add('in-progress');  // 2번째 커넥터는 진행 중 애니메이션 유지
  });

  document.getElementById('loading-title').textContent = '분석 완료';
  document.getElementById('loading-title').classList.add('done');
  const cnt = resultData.cards.length;
  document.getElementById('loading-subtitle').innerHTML =
    `<strong class="num">${cnt.toLocaleString()}개</strong> 매물을 찾았어요.`;
  document.getElementById('done-btn').classList.add('show');
  // 분석 완료 메시지 잠깐 보여준 뒤 자동 전환 (수동 클릭도 그대로 가능)
  setTimeout(showResults, 1200);
}
function showResults(){
  if(document.getElementById('loading').classList.contains('hidden')) return;
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('main').style.display='flex';
  vCurr.pause(); vNext.pause();
  renderSummary(resultData);
  renderCards(resultData);
  initMap(resultData);
}
function renderSummary(data){
  document.getElementById('summary').innerHTML=`
    <strong>${escHtml(data.workplace.address_norm)}</strong>
    <span class="sep">|</span>
    <span>${reqBody.min_price ? fmtPrice(reqBody.min_price)+'~'+fmtPrice(reqBody.max_price) : fmtPrice(reqBody.max_price)+' 이하'}</span>
    <span class="sep">·</span>
    <span>${reqBody.max_minutes}분 이내</span>
    <span class="sep">·</span>
    <span>${reqBody.pyeong_types.join(', ')}</span>
    ${reqBody.min_kaptdaCnt?`<span class="sep">·</span><span>${reqBody.min_kaptdaCnt.toLocaleString()}세대 이상</span>`:''}
    ${reqBody.build_year_min?`<span class="sep">·</span><span>${reqBody.build_year_min}년 이후</span>`:''}
    <span class="stats">총 ${(data.stats.total||0).toLocaleString()}개 (평형 분리)</span>`;
}

// ═══════════════════════════════════════════════════════
//  통계 패널 (인사이트 3줄)
// ═══════════════════════════════════════════════════════
function renderStatsPanel(data){
  const s = data.stats || {};
  if(!s.total) return '';

  // 통근 × 평균가 — 미니 가로 막대 (최저 버킷만 빨강 강조)
  let curveHtml = '';
  if(s.commute_curve && s.commute_curve.length){
    const maxPrice = Math.max(...s.commute_curve.map(b=>b.avg_price||0));
    const minPrice = Math.min(...s.commute_curve.filter(b=>b.avg_price).map(b=>b.avg_price));
    const rows = s.commute_curve.map(b=>{
      const pct = maxPrice ? Math.max(8, Math.round((b.avg_price||0)/maxPrice*100)) : 0;
      const isCheap = b.avg_price === minPrice;
      // 라벨 정리: "30분 이내"→"≤30분", "50분 초과"→">50분"
      const lbl = (b.label||'')
        .replace(/^(\d+)분 이내$/, '≤$1분')
        .replace(/^(\d+)분 초과$/, '>$1분')
        .replace(/^(\d+)~(\d+)분$/, '$1~$2분');
      return `<div class="minibar-row ${isCheap?'cheap':''}">
        <span class="minibar-row__label num">${escHtml(lbl)}</span>
        <div class="minibar-row__track"><div class="minibar-row__fill" style="width:${pct}%"></div></div>
        <span class="minibar-row__value num">${shortPrice(b.avg_price).replace('억','')}</span>
      </div>`;
    }).join('');
    curveHtml = `<div class="stats-block">
      <div class="stats-block__label">통근시간 × 평균가<span class="stats-block__label-helper">단위: 억</span></div>
      ${rows}
    </div>`;
  }

  // 평형 분포 — 컴팩트 그리드
  let ptHtml = '';
  if(s.pyeong_breakdown && s.pyeong_breakdown.length){
    const cells = s.pyeong_breakdown.map(p=>`
      <div class="pyeong-grid__cell">
        <div class="pyeong-grid__pt">${escHtml(p.pyeong_type)}</div>
        <div class="pyeong-grid__val num">${shortPrice(p.avg_price)}</div>
        <div class="pyeong-grid__cnt num">${p.count}건</div>
      </div>`).join('');
    ptHtml = `<div class="stats-block">
      <div class="stats-block__label">평형 분포 · 평균가</div>
      <div class="pyeong-grid">${cells}</div>
    </div>`;
  }

  // 연식 분포 — stacked bar + legend
  let ageHtml = '';
  if(s.age_breakdown){
    const a = s.age_breakdown;
    const total = (a.new_10||0) + (a.mid_20||0) + (a.old||0) + (a.unknown||0);
    if(total){
      const pct = (n)=>(n||0)/total*100;
      const segs = [];
      if(a.new_10)  segs.push(`<div class="stacked-bar__seg s-new" style="width:${pct(a.new_10)}%"></div>`);
      if(a.mid_20)  segs.push(`<div class="stacked-bar__seg s-mid" style="width:${pct(a.mid_20)}%"></div>`);
      if(a.old)     segs.push(`<div class="stacked-bar__seg s-old" style="width:${pct(a.old)}%"></div>`);
      if(a.unknown) segs.push(`<div class="stacked-bar__seg s-unknown" style="width:${pct(a.unknown)}%"></div>`);
      const legend = [];
      if(a.new_10)  legend.push(`<span class="stacked-legend__item"><span class="stacked-legend__dot s-new"></span>신축 10년↓ <strong class="stacked-legend__count num">${a.new_10}</strong></span>`);
      if(a.mid_20)  legend.push(`<span class="stacked-legend__item"><span class="stacked-legend__dot s-mid"></span>준신축 20년↓ <strong class="stacked-legend__count num">${a.mid_20}</strong></span>`);
      if(a.old)     legend.push(`<span class="stacked-legend__item"><span class="stacked-legend__dot s-old"></span>구축 <strong class="stacked-legend__count num">${a.old}</strong></span>`);
      if(a.unknown) legend.push(`<span class="stacked-legend__item"><span class="stacked-legend__dot s-unknown"></span>미상 <strong class="stacked-legend__count num">${a.unknown}</strong></span>`);
      ageHtml = `<div class="stats-block">
        <div class="stats-block__label">연식 분포</div>
        <div class="stacked-bar">${segs.join('')}</div>
        <div class="stacked-legend">${legend.join('')}</div>
      </div>`;
    }
  }

  return `<div class="stats-panel">
    <div class="stats-panel__top">
      <span class="stats-panel__count num">${s.total}<span class="unit">개</span></span>
      <span class="stats-panel__avg">평균 <strong class="num">${shortPrice(s.avg_price)}</strong></span>
    </div>
    ${curveHtml}
    ${ptHtml}
    ${ageHtml}
  </div>`;
}

// ═══════════════════════════════════════════════════════
function fmtTradeAmount(manwon){
  if(!manwon) return '-';
  const e=Math.floor(manwon/10000);
  const rem=manwon%10000;
  const chon=Math.round(rem/1000);
  if(chon===0) return `${e}억`;
  if(chon===10) return `${e+1}억`;
  return `${e}억 ${chon}천`;
}

function renderCardRecentTrades(trades){
  if(!trades||!trades.length) return '<div class="card-no-trade">3개월 내 거래 없음</div>';
  return trades.map(t=>`
    <div class="card-recent-row">
      <span class="rr-amount">${fmtTradeAmount(t.amount)}</span>
      <span>${t.pyeong}평 ${t.floor}층</span>
      <span class="rr-dim">${t.date}</span>
    </div>`).join('');
}

// 카드 키 (apt_seq + pyeong_type)
function cardKey(c){ return `${c.apt_seq}:${c.pyeong_type||''}`; }

// 관심 단지 탭 전환 시 지도 핀 show/hide
// seqs: apt_seq 배열 (null이면 전체 표시)
window.filterMapPins = function(seqs) {
  if(!kakaoMap) return;
  const seqSet = seqs ? new Set(seqs) : null;
  Object.entries(aptOverlayMap).forEach(([seq, overlay]) => {
    overlay.setMap(!seqSet || seqSet.has(seq) ? kakaoMap : null);
  });
};

// 카드 클릭: 지도만 pan (상세 패널은 핀 클릭으로 열림)
function panToCard(aptSeq){
  if(!kakaoMap || !resultData) return;
  const card = resultData.cards.find(c=>c.apt_seq===aptSeq);
  if(card && card.lat && card.lng){
    kakaoMap.panTo(new kakao.maps.LatLng(card.lat, card.lng));
  }
}

// 추천 카드 (긴 코멘트형)
// ── 관심 단지 ♥ localStorage 헬퍼 ────────────────────────────
const FAV_KEY = 'badugi_favorites';
let _currentFavTab = 'all';
window._lastCards = [];

function loadFavs() {
  try { return new Set(JSON.parse(localStorage.getItem(FAV_KEY) || '[]')); }
  catch(e) { return new Set(); }
}
function saveFavs(s) {
  try { localStorage.setItem(FAV_KEY, JSON.stringify([...s])); } catch(e) {}
}
function favId(seq, pt) { return `${seq}:${pt}`; }
function isFav(seq, pt) { return loadFavs().has(favId(seq, pt)); }

function toggleFav(seq, pt, btn, ev) {
  if(ev) ev.stopPropagation();
  const favs = loadFavs();
  const id = favId(seq, pt);
  if(favs.has(id)) { favs.delete(id); btn.classList.remove('active'); }
  else             { favs.add(id);    btn.classList.add('active'); }
  saveFavs(favs);
  _updateFavTab();
}

function _updateFavTab() {
  const favCnt = window._lastCards.filter(c => isFav(c.apt_seq, c.pyeong_type)).length;
  const allCnt = window._lastCards.length;
  const cntEl  = document.getElementById('fav-tab-cnt');
  const allEl  = document.getElementById('fav-tab-all-cnt');
  const favBtn = document.getElementById('fav-tab-fav');
  if(cntEl)  cntEl.textContent  = favCnt;
  if(allEl)  allEl.textContent  = `(${allCnt})`;
  if(favBtn) favBtn.disabled    = favCnt === 0;
  // 관심 탭 활성 중 ♥ 토글 시 → 패널 실시간 재렌더 (해제된 카드 즉시 사라짐)
  if(_currentFavTab === 'fav') switchFavTab('fav');
}

function switchFavTab(tab) {
  _currentFavTab = tab;
  document.getElementById('fav-tab-all').classList.toggle('active', tab === 'all');
  document.getElementById('fav-tab-fav').classList.toggle('active', tab === 'fav');

  const panel = document.getElementById('cards-panel');
  const favs  = loadFavs();

  if(tab === 'all') {
    // 전체 카드 다시 렌더 + 전체 핀 복원
    filterMapPins(null);
    if(window._lastSearchData) renderCards(window._lastSearchData);
  } else {
    // 관심 단지만 필터 렌더
    const cards = window._lastCards.filter(c => favs.has(favId(c.apt_seq, c.pyeong_type)));
    if(!cards.length) {
      panel.innerHTML = `<div class="fav-empty">❤️‍🔥 아직 관심 단지가 없어요<br><span style="font-size:12px;color:#aaa">카드의 ♥ 버튼을 눌러 저장해보세요</span></div>`;
      return;
    }
    let html = '';
    cards.forEach(c => {
      if(c.is_recommended) html += renderRecCard(c, window._lastWpId);
      else                  html += renderListCard(c, window._lastWpId);
    });
    panel.innerHTML = html;
    // 지도 핀 동기화
    if(window.filterMapPins) window.filterMapPins(cards.map(c => c.apt_seq));
  }
}

function renderRecCard(c, wpId){
  const thisYear = THIS_YEAR;
  let metaParts = [escHtml(c.umd_nm), `${c.kaptdaCnt.toLocaleString()}세대`];
  if(c.build_year) metaParts.push(`${c.build_year}년 (${thisYear-c.build_year}년차)`);
  if(c.top_floor) metaParts.push(`최고 ${c.top_floor}층`);
  const meta = metaParts.join('<span class="dot"></span>');

  // 가격 분리: 억 + 만
  const priceHtml = splitPrice(c.price_low);

  const comment = c.friend_comment || '';
  const friendHtml = comment
    ? `<div class="rec-card__friend">
        <div class="rec-card__friend-avatar">친구</div>
        <div class="rec-card__friend-body">
          <div class="rec-card__friend-label">한마디</div>
          <div class="rec-card__friend-text">${escHtml(comment)}</div>
        </div>
      </div>`
    : `<div class="rec-card__friend empty">
        <div class="rec-card__friend-avatar">···</div>
        <div class="rec-card__friend-body">
          <div class="rec-card__friend-label">한마디 (생성 중)</div>
          <div class="rec-card__friend-text"><span class="spinner-mini"></span>친구가 단지 살펴보는 중...</div>
        </div>
      </div>`;

  const transitTxt = c.transit_summary ? escHtml(c.transit_summary) : '경로 정보 없음';
  const favActive  = isFav(c.apt_seq, c.pyeong_type) ? ' active' : '';
  const favTitle   = favActive ? '관심 해제' : '관심 추가';

  return `<div class="rec-card" onclick="panToCard('${c.apt_seq}')">
    <button class="fav-btn${favActive}" onclick="toggleFav('${escHtml(c.apt_seq)}','${escHtml(c.pyeong_type||'')}',this,event)" title="${favTitle}">♥</button>
    <span class="rec-card__slot">${escHtml(c.bucket_label||'')}<span class="rec-card__slot-divider"></span>${escHtml(c.pyeong_type||'')}</span>
    <div class="rec-card__title-row">
      <h3 class="rec-card__title">${escHtml(c.apt_nm)}</h3>
      <div class="rec-card__price">${priceHtml}</div>
    </div>
    <div class="rec-card__meta num">${meta}</div>
    ${_whyTagsHtml(c.why_tags)}
    ${friendHtml}
    <div class="rec-card__footer">
      <span class="rec-card__transit">
        <span class="commute-chip">${transitTxt}</span>
        <strong class="num">${c.total_time_min}분</strong>
      </span>
      ${c.pick_reason?`<span class="rec-card__reason">${escHtml(c.pick_reason)}</span>`:''}
    </div>
  </div>`;
}

// "저가 근거" 태그 HTML (태그 없으면 빈 문자열)
function _whyTagsHtml(tags){
  if(!tags || !tags.length) return '';
  const labels = tags.slice(0,2).map(t=>escHtml(t.label)).join(' · ');
  return `<div class="why-tags">저가 근거: ${labels}</div>`;
}

// 가격을 "5억 8,000만" → 분리된 num/unit 마크업으로
function splitPrice(manwon){
  if(!manwon) return '<span class="unit">-</span>';
  const e = Math.floor(manwon/10000);
  const m = manwon%10000;
  if(e && m) return `<span class="num">${e}</span><span class="unit">억</span> <span class="num">${m.toLocaleString()}</span><span class="unit">만</span>`;
  if(e) return `<span class="num">${e}</span><span class="unit">억</span>`;
  return `<span class="num">${m.toLocaleString()}</span><span class="unit">만</span>`;
}

// 일반 카드 (버킷 안, 짧은 형태) + Haiku 한 줄 코멘트
function renderListCard(c, wpId){
  const thisYear = THIS_YEAR;
  let metaParts = [escHtml(c.umd_nm), `${c.kaptdaCnt.toLocaleString()}세대`];
  if(c.build_year) metaParts.push(`${c.build_year}년 (${thisYear-c.build_year}년차)`);

  const comment = c.friend_comment || '';
  const commentHtml = comment
    ? `<div class="list-card__comment">${escHtml(comment)}</div>`
    : `<div class="list-card__comment empty"><span class="spinner-mini"></span>한 줄 평 생성 중...</div>`;

  const favActiveL = isFav(c.apt_seq, c.pyeong_type) ? ' active' : '';
  const favTitleL  = favActiveL ? '관심 해제' : '관심 추가';

  return `<article class="list-card" onclick="panToCard('${c.apt_seq}')">
    <button class="fav-btn${favActiveL}" onclick="toggleFav('${escHtml(c.apt_seq)}','${escHtml(c.pyeong_type||'')}',this,event)" title="${favTitleL}">♥</button>
    <div class="list-card__top">
      <div class="list-card__name">${escHtml(c.apt_nm)} <span class="pt">${escHtml(c.pyeong_type||'')}</span></div>
      <div class="list-card__price num">${shortPrice(c.price_low)}</div>
    </div>
    <div class="list-card__meta">${metaParts.join(' · ')}</div>
    ${_whyTagsHtml(c.why_tags)}
    <div class="list-card__row">
      <span class="commute-chip">${escHtml(c.transit_summary||'')}<strong class="num" style="margin-left:4px">${c.total_time_min}분</strong></span>
    </div>
    ${commentHtml}
  </article>`;
}

function renderCards(data){
  panelMode='list';
  const panel=document.getElementById('cards-panel');

  // 전역 상태 저장 (탭 전환 / 재렌더 시 참조)
  window._lastSearchData = data;
  window._lastCards      = data.cards || [];
  window._lastWpId       = data.wp_id;

  // 탭 패널 표시 + 카운트 초기화
  const tabsEl = document.getElementById('fav-tabs');
  if(tabsEl && data.cards.length) {
    tabsEl.style.display = 'flex';
    _currentFavTab = 'all';
    document.getElementById('fav-tab-all').classList.add('active');
    document.getElementById('fav-tab-fav').classList.remove('active');
    _updateFavTab();
  }

  if(!data.cards.length){
    panel.innerHTML=`<div class="error-box"><h2>조건에 맞는 매물이 없어요</h2>
      <p style="margin-top:16px"><a href="/search.html">← 조건 다시 입력</a></p></div>`;
    return;
  }

  const recommended = data.cards.filter(c=>c.is_recommended);
  const rest        = data.cards.filter(c=>!c.is_recommended);
  const wpId = data.wp_id;
  const totalRest = rest.length || 1;

  // 부분 결과 안내 배너 (신규 직장 첫 검색 시 일부 경로 미수집)
  const partialBanner = data.meta?.partial
    ? `<div class="partial-banner">⏳ 일부 경로 데이터가 아직 수집 중이에요. 잠시 후 다시 검색하면 더 많은 결과를 볼 수 있어요.</div>`
    : '';

  let html = partialBanner + renderStatsPanel(data);

  // 추천 섹션
  if(recommended.length){
    html += `<div class="rec-section-head">
      <h3>추천 ${recommended.length}곳</h3>
      <p>통근시간대(10분 단위) × 평형 매트릭스에서 각 슬롯별 최저가 단지예요.</p>
    </div>`;
    html += recommended.map(c=>renderRecCard(c, wpId)).join('');
  }

  // 버킷별 접힘 섹션
  if(rest.length){
    const buckets = data.buckets || [];
    html += `<div class="bucket-divider">그 외 매물 ${rest.length}곳 (펼쳐서 보기)</div>`;
    buckets.forEach(b=>{
      const inBucket = rest.filter(c=>c.bucket_idx===b.idx);
      if(!inBucket.length) return;

      // 집계: 가격 최저/최고/평균
      const prices = inBucket.map(c=>c.price_low).filter(p=>p>0);
      const minP = prices.length ? Math.min(...prices) : 0;
      const maxP = prices.length ? Math.max(...prices) : 0;
      const avgP = prices.length ? Math.round(prices.reduce((a,b)=>a+b,0)/prices.length) : 0;

      // 평형별 카운트
      const byPt = {};
      inBucket.forEach(c=>{ byPt[c.pyeong_type]=(byPt[c.pyeong_type]||0)+1; });
      const ptChips = Object.entries(byPt)
        .sort((a,b)=>a[0].localeCompare(b[0],'ko'))
        .map(([pt, cnt])=>`<span class="bucket-pt-chip">${escHtml(pt)} <strong class="num">${cnt}</strong></span>`)
        .join('');

      // 전체 대비 비율
      const ratioPct = Math.round(inBucket.length/totalRest*100);

      // 본문 (펼친 상태)
      const byPtList = {};
      inBucket.forEach(c=>{ (byPtList[c.pyeong_type]=byPtList[c.pyeong_type]||[]).push(c); });
      let body = '';
      Object.entries(byPtList).sort((a,b)=>a[0].localeCompare(b[0],'ko')).forEach(([pt, items])=>{
        items.sort((a,b)=>a.price_low - b.price_low);
        body += `<div class="bucket-pt-label">${escHtml(pt)} · ${items.length}곳 · 가격순</div>`;
        body += items.map(c=>renderListCard(c, wpId)).join('');
      });

      html += `<div class="bucket-section">
        <div class="bucket-head" onclick="toggleBucket(this)">
          <div class="bucket-head__top">
            <div class="bucket-head__title">
              <span class="bucket-head__time">${escHtml(b.label)}</span>
              <span class="bucket-head__cnt num">${inBucket.length}곳</span>
            </div>
            <div class="bucket-head__chev">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
          </div>
          ${prices.length ? `<div class="bucket-head__bottom">
            <span class="bucket-head__price">
              <strong class="num">${shortPrice(minP)}</strong><span class="price-sep">~</span><strong class="num">${shortPrice(maxP)}</strong>
              <span style="color:var(--color-text-tertiary);margin-left:6px;">· 평균 <span class="num">${shortPrice(avgP)}</span></span>
            </span>
          </div>` : ''}
          <div class="bucket-head__bottom">
            <div class="bucket-head__pts">${ptChips}</div>
          </div>
          <div class="bucket-head__ratio"><div class="bucket-head__ratio-fill" style="width:${ratioPct}%"></div></div>
        </div>
        <div class="bucket-body">${body}</div>
      </div>`;
    });
  }

  panel.innerHTML = html;
}

function toggleBucket(headEl){
  headEl.parentElement.classList.toggle('open');
}

// ═══════════════════════════════════════════════════════
//  카카오맵 — 단지 단위 핀 (클러스터러 없음)
//  같은 단지에 여러 평형이 있어도 핀 1개. 호버 시 평형 탭으로 전환.
// ═══════════════════════════════════════════════════════
let aptGroupMap = {};  // apt_seq → {apt_seq, apt_nm, lat, lng, umd_nm, kaptdaCnt, build_year, top_floor, cards:[card,...]}

async function initMap(data){
  await kakaoReady;
  const container = document.getElementById('map');
  const wp = data.workplace;
  kakaoMap = new kakao.maps.Map(container, {
    center: new kakao.maps.LatLng(wp.lat, wp.lng),
    level: zoomLevelFor(reqBody.max_minutes),
  });
  kakaoMap.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);

  // 직장 핀
  new kakao.maps.CustomOverlay({
    position: new kakao.maps.LatLng(wp.lat, wp.lng),
    content: '<div class="pin pin-workplace">직장</div>',
    yAnchor: 1, zIndex: 100,
  }).setMap(kakaoMap);

  // ── 단지별 그룹화 (apt_seq 단위) ──────────────────────
  aptGroupMap = {};
  data.cards.forEach(c=>{
    if(!c.lat||!c.lng) return;
    if(!aptGroupMap[c.apt_seq]){
      aptGroupMap[c.apt_seq] = {
        apt_seq: c.apt_seq, apt_nm: c.apt_nm, lat: c.lat, lng: c.lng,
        umd_nm: c.umd_nm, kaptdaCnt: c.kaptdaCnt,
        build_year: c.build_year, top_floor: c.top_floor,
        any_recommended: false,
        cards: [],
      };
    }
    aptGroupMap[c.apt_seq].cards.push(c);
    if(c.is_recommended) aptGroupMap[c.apt_seq].any_recommended = true;
  });

  // ── 단지별 핀 생성 (클러스터 없음) ───────────────────
  Object.values(aptGroupMap).forEach(group=>{
    const pos = new kakao.maps.LatLng(group.lat, group.lng);
    // 핀 표시: 최저가 카드 기준, 평형 갯수 표시
    group.cards.sort((a,b)=>a.price_low - b.price_low);
    const main = group.cards[0];
    const ptCount = group.cards.length;
    const cls = group.any_recommended ? 'pin-best' : '';
    const z = group.any_recommended ? 50 : 5;
    const multiMark = ptCount > 1 ? `<span class="pin-multi-mark">${ptCount}</span>` : '';
    const pinText = `${escHtml(main.pyeong_type||'')} ${shortPrice(main.price_low)} ${main.total_time_min}분`;
    const overlay = new kakao.maps.CustomOverlay({
      position: pos,
      content: `<div class="pin ${cls}" data-apt-seq="${group.apt_seq}">${pinText}${multiMark}</div>`,
      yAnchor: 1,
      zIndex: z,
    });
    overlay.setMap(kakaoMap);
    overlays.push(overlay);
    aptOverlayMap[group.apt_seq] = overlay;  // 핀 필터링용
  });

  // ── 핀 이벤트 ───────────────────────────────────────
  //  호버 = 툴팁만 (미리보기)
  //  클릭 = 상세 패널 열기 (showDetail)
  container.addEventListener('mouseover', e=>{
    const pin = e.target.closest('.pin[data-apt-seq]');
    if(pin) showTooltip(pin, aptGroupMap[pin.dataset.aptSeq], data.wp_id);
  });
  container.addEventListener('mouseout', e=>{
    const pin = e.target.closest('.pin[data-apt-seq]');
    if(pin && !pin.contains(e.relatedTarget)) scheduleHideTooltip();
  });
  container.addEventListener('click', e=>{
    const pin = e.target.closest('.pin[data-apt-seq]');
    if(pin){
      e.stopPropagation();
      hideTooltip();
      showDetail(pin.dataset.aptSeq, data.wp_id);
    }
  });
}

function zoomLevelFor(min){
  if(min<=20) return 6; if(min<=30) return 7; if(min<=45) return 7; return 8;
}

// ═══════════════════════════════════════════════════════
//  호버 툴팁
// ═══════════════════════════════════════════════════════
const tooltip = document.getElementById('pin-tooltip');
let tooltipTimer = null;
let tooltipCurrentSeq = null;

// 툴팁: 단지(group) 단위로 표시. group.cards 가 평형별 카드 배열.
let _ttGroup = null;
let _ttActivePtIdx = 0;

function showTooltip(pinEl, group, wpId){
  if(!group || !group.cards.length) return;
  clearTimeout(tooltipTimer);
  _ttGroup = group;
  _ttActivePtIdx = 0;
  _tooltipWpId = wpId;
  tooltipCurrentSeq = group.apt_seq;

  // 상단: 단지명 + 배지
  document.getElementById('tt-apt-nm').textContent = group.apt_nm;
  const badge = document.getElementById('tt-badge');
  badge.style.display = group.any_recommended ? '' : 'none';

  // 메타
  const thisYear = THIS_YEAR;
  let metaParts = [group.umd_nm, `${group.kaptdaCnt.toLocaleString()}세대`];
  if(group.build_year) metaParts.push(`${group.build_year}년 (${thisYear-group.build_year}년차)`);
  document.getElementById('tt-meta').textContent = metaParts.join(' · ');

  // 평형 탭 (밑줄형)
  const tabsEl = document.getElementById('tt-pt-tabs');
  if(group.cards.length > 1){
    tabsEl.style.display = 'flex';
    tabsEl.innerHTML = group.cards.map((c, i)=>
      `<div class="pin-tooltip__tab ${i===0?'active':''}" data-pt-idx="${i}"
            onclick="event.stopPropagation();switchTooltipPt(${i})">${escHtml(c.pyeong_type||'')}</div>`
    ).join('');
  } else {
    tabsEl.style.display = 'none';
  }

  // 첫 평형 정보 렌더
  renderTooltipPt(0);

  // 위치
  tooltip.classList.remove('hidden');
  const pinRect = pinEl.getBoundingClientRect();
  const ttW = tooltip.offsetWidth||296;
  const ttH = tooltip.offsetHeight||280;
  let left = pinRect.left + pinRect.width/2 - ttW/2;
  let top  = pinRect.top - ttH - 10;
  left = Math.max(8, Math.min(left, window.innerWidth - ttW - 8));
  if(top < 60) top = pinRect.bottom + 8;
  tooltip.style.left = left+'px';
  tooltip.style.top  = top+'px';
}

function switchTooltipPt(idx){
  if(!_ttGroup || idx === _ttActivePtIdx) return;
  _ttActivePtIdx = idx;
  document.querySelectorAll('.pin-tooltip__tab').forEach((t,i)=>t.classList.toggle('active', i===idx));
  renderTooltipPt(idx);
}

function renderTooltipPt(idx){
  if(!_ttGroup) return;
  const c = _ttGroup.cards[idx];
  if(!c) return;

  // 통근 메트릭
  document.getElementById('tt-transit-val').innerHTML = `<span class="num">${c.total_time_min}</span><span class="unit">분</span>`;
  document.getElementById('tt-transit-sub').textContent = c.transit_summary || '경로 정보 없음';

  // 가격/거래 메트릭
  const lt = (c.recent_trades||[])[0];
  const priceLabel = document.getElementById('tt-price-label');
  const priceVal = document.getElementById('tt-price-val');
  const priceSub = document.getElementById('tt-price-sub');
  if(lt){
    priceLabel.textContent = '최근 거래';
    priceVal.innerHTML = `<span class="num">${shortPrice(lt.amount).replace('억','')}</span><span class="unit">억</span>`;
    priceSub.innerHTML = `<span class="num">${lt.date}</span> · ${lt.floor}층 ${escHtml(lt.gbn||'')}`;
  } else {
    priceLabel.textContent = '가격대';
    priceVal.innerHTML = `<span class="num">${shortPrice(c.price_low).replace('억','')}</span><span class="unit">억</span>`;
    priceSub.innerHTML = c.price_high && c.price_high!==c.price_low
      ? `~<span class="num">${shortPrice(c.price_high)}</span> · <span class="num">${c.deal_count||0}</span>건`
      : `<span class="num">${c.deal_count||0}</span>건 거래`;
  }

  // 코멘트
  const comment = c.friend_comment||'';
  const ttComment = document.getElementById('tt-comment');
  if(comment){
    ttComment.style.display = 'block';
    ttComment.className = 'pin-tooltip__comment';
    ttComment.textContent = comment;
  } else {
    ttComment.style.display = 'block';
    ttComment.className = 'pin-tooltip__comment empty';
    ttComment.innerHTML = '<span class="spinner-mini"></span>친구가 한마디 준비 중...';
  }
}
function scheduleHideTooltip(){ tooltipTimer = setTimeout(hideTooltip, 250); }
function hideTooltip(){ tooltip.classList.add('hidden'); tooltipCurrentSeq=null; }
tooltip.addEventListener('mouseenter', ()=>clearTimeout(tooltipTimer));
tooltip.addEventListener('mouseleave', ()=>scheduleHideTooltip());

async function showDetail(aptSeq, wpId){
  panelMode='detail';
  hideTooltip();
  const panel = document.getElementById('cards-panel');
  panel.innerHTML='<div style="padding:32px 20px;text-align:center;color:var(--color-text-tertiary);font-size:13px;"><span class="spinner-mini"></span>상세 정보 로드 중...</div>';
  panel.scrollTop=0;

  // 지도 해당 아파트 위치로 이동
  if(kakaoMap && resultData){
    const card = resultData.cards.find(c=>c.apt_seq===aptSeq);
    if(card && card.lat && card.lng){
      kakaoMap.panTo(new kakao.maps.LatLng(card.lat, card.lng));
    }
  }

  try{
    const [dRes, rRes] = await Promise.all([
      fetch(`/api/apt/${aptSeq}/detail?wp_id=${wpId}`,{headers:{'ngrok-skip-browser-warning':'1'}}),
      fetch(`/api/apt/${aptSeq}/routes?wp_id=${wpId}`,{headers:{'ngrok-skip-browser-warning':'1'}}),
    ]);
    const detail = await dRes.json();
    const routes = (await rRes.json()).options || [];
    currentDetailCard = resultData?.cards.find(c=>c.apt_seq===aptSeq) || {};
    renderDetailPanel(detail, routes, wpId);
  } catch(e){
    panel.innerHTML=`<div style="padding:20px;color:red;">오류: ${escHtml(e.message)}</div>`;
  }
}

function backToList(){
  panelMode='list';
  if(detailChart){ detailChart.destroy(); detailChart=null; }
  detailChartData=null; currentTabKey=null;
  if(resultData) renderCards(resultData);
}
