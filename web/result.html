// ── spec-18: 경로 상세 팝업 ─────────────────────────────────────
const _routeCache = {};

// ── 경로 폴리라인 렌더링 ──────────────────────────────────────
let _routePolylines = [];
let _routeSegments = [];   // [{pts:[LatLng], core:'#hex'}] 교통 구간(원본 좌표)
let _routeWalks = [];      // [{a:LatLng, b:LatLng}] 도보 직선
let _routePins = [];       // 승차/하차/환승역 핀
let _lineListenerAdded = false;

function clearRoutePolylines() {
  _routePolylines.forEach(p => p.setMap(null));
  _routePolylines = [];
  _routePins.forEach(p => { if (p && p.ov) p.ov.setMap(null); });
  _routePins = [];
  _routeSegments = [];
  _routeWalks = [];
}

// 핀(위 동그라미·아래 뾰족) + 라벨(노선·역명). side로 라벨 높이 어긋나게(W1/W2 겹침 회피).
function _addPin(latlng, color, lineText, stationText, side) {
  const div = document.createElement('div');
  div.style.cssText = 'pointer-events:none;display:flex;flex-direction:column;align-items:center;';
  const tx = (side < 0) ? '54%' : '-54%';   // W1 왼쪽 / W2 오른쪽으로 비켜 겹침 회피(줌 무관)
  let label = '';
  if (lineText || stationText) {
    label = '<div style="background:#fff;border:1px solid rgba(0,0,0,.14);border-radius:7px;padding:2px 7px;margin-bottom:3px;transform:translateX(' + tx + ');box-shadow:0 1px 3px rgba(0,0,0,.22);white-space:nowrap;font-family:sans-serif;line-height:1.3;">';
    if (lineText) label += '<span style="color:' + color + ';font-weight:700;font-size:11px;">' + escHtml(lineText) + '</span>';
    if (stationText) label += '<span style="color:#222;font-weight:500;font-size:12.5px;margin-left:' + (lineText ? '4px' : '0') + ';">' + escHtml(stationText) + '</span>';
    label += '</div>';
  }
  div.innerHTML = label + '<svg width="20" height="27" viewBox="0 0 20 27" style="display:block;filter:drop-shadow(0 1px 1.5px rgba(0,0,0,.3))"><path d="M10 26 C10 26 1 15.5 1 9.5 A9 9 0 1 1 19 9.5 C19 15.5 10 26 10 26 Z" fill="' + color + '" stroke="#FFFFFF" stroke-width="1.6"/><circle cx="10" cy="9.5" r="3.4" fill="#FFFFFF"/></svg>';
  const ov = new kakao.maps.CustomOverlay({ position: latlng, content: div, xAnchor: 0.5, yAnchor: 1.0, zIndex: 7 });
  ov.setMap(kakaoMap);
  const _lw = ((lineText || '').length + (stationText || '').length) * 11 + 24;
  _routePins.push({ ov: ov, latlng: latlng, side: side, w: _lw });
}

function _near2(a, b) {
  const dx = a.getLng() - b.getLng(), dy = a.getLat() - b.getLat();
  return dx * dx + dy * dy;
}

// 클릭한 아파트만 남기고 나머지는 지도에서 제거(setMap null — 줌해도 안 돌아옴). 복원은 unfocus.
let _hiddenByFocus = [];
function focusApt(aptSeq) {
  const target = String(aptSeq);
  _hiddenByFocus = [];
  Object.entries(aptOverlayMap).forEach(([seq, ov]) => {
    if (!ov) return;
    if (seq === target) { if (ov.setZIndex) ov.setZIndex(60); return; }
    let shown = true;
    try { if (ov.getMap && !ov.getMap()) shown = false; } catch (e) {}
    if (shown) { ov.setMap(null); _hiddenByFocus.push(ov); }
  });
  const btn = document.getElementById('route-back-btn'); if (btn) btn.style.display = 'flex';
}
function unfocusApts() {
  _hiddenByFocus.forEach(ov => { try { ov.setMap(kakaoMap); } catch (e) {} });
  _hiddenByFocus = [];
  try { Object.values(aptOverlayMap).forEach(ov => { if (ov && ov.setZIndex) ov.setZIndex(3); }); } catch (e) {}
  const btn = document.getElementById('route-back-btn'); if (btn) btn.style.display = 'none';
}

// 화면(픽셀) 좌표 기준 Douglas-Peucker — 현재 줌에서 안 보이는 굴곡만 제거
function _dpScreen(P, eps) {
  const n = P.length;
  const keep = new Array(n).fill(false);
  keep[0] = keep[n - 1] = true;
  const stack = [[0, n - 1]];
  while (stack.length) {
    const sg = stack.pop(), a = sg[0], b = sg[1];
    const ax = P[a][0], ay = P[a][1], bx = P[b][0], by = P[b][1];
    const dx = bx - ax, dy = by - ay, L2 = dx * dx + dy * dy || 1e-9;
    let md = 0, mi = -1;
    for (let i = a + 1; i < b; i++) {
      const t = ((P[i][0] - ax) * dx + (P[i][1] - ay) * dy) / L2;
      const cx = ax + t * dx, cy = ay + t * dy;
      const d = Math.hypot(P[i][0] - cx, P[i][1] - cy);
      if (d > md) { md = d; mi = i; }
    }
    if (md > eps && mi > -1) { keep[mi] = true; stack.push([a, mi], [mi, b]); }
  }
  return keep;
}

// 화면좌표 점열을 수직으로 offsetPx 만큼 밀어 LatLng로 — 두 루트 겹침 시 좌우 분리.
// 진행방향과 무관하게 '일관된 측'으로 밀어야 반대방향 공유구간도 양쪽으로 갈림.
function _offsetLatLngs(P, side, offsetPx, proj) {
  const n = P.length, out = [];
  for (let i = 0; i < n; i++) {
    const a = P[Math.max(0, i - 1)], b = P[Math.min(n - 1, i + 1)];
    let dx = b[0] - a[0], dy = b[1] - a[1];
    const L = Math.hypot(dx, dy) || 1; dx /= L; dy /= L;
    let px = -dy, py = dx;  // 수직벡터
    if (px < -1e-6 || (Math.abs(px) < 1e-6 && py < 0)) { px = -px; py = -py; }  // 일관 측
    const ox = P[i][0] + side * offsetPx * px, oy = P[i][1] + side * offsetPx * py;
    out.push(proj.coordsFromContainerPoint(new kakao.maps.Point(ox, oy)));
  }
  return out;
}

// 줌별 화면픽셀 단순화 + 좌우 오프셋 렌더 → 정확도 유지 + 매끈 + 겹쳐도 둘 다 보임
function _renderRouteLines() {
  _routePolylines.forEach(p => p.setMap(null));
  _routePolylines = [];
  if (!kakaoMap) return;
  let proj = null;
  try { proj = kakaoMap.getProjection(); } catch (e) { proj = null; }
  const EPS = 2.0, OFF = 4.5;  // 단순화 픽셀 / 두 루트 좌우 분리 픽셀
  _routeSegments.forEach(seg => {
    let drawPts;
    let P = null;
    if (proj) {
      try { P = seg.pts.map(ll => { const q = proj.containerPointFromCoords(ll); return [q.x, q.y]; }); }
      catch (e) { P = null; }
    }
    if (P && P.length >= 2) {
      let Pk = P;
      if (P.length > 2) { const keep = _dpScreen(P, EPS); Pk = P.filter((_, i) => keep[i]); }
      try { drawPts = smoothPath(_offsetLatLngs(Pk, seg.side, OFF, proj), 2); }
      catch (e) { drawPts = smoothPath(seg.pts, 2); }
    } else {
      drawPts = smoothPath(seg.pts, 2);
    }
    _addRouteLine(drawPts, 11, '#1A1A1A');      // 검은 테두리
    _addRouteLine(drawPts, 8, seg.core, 'solid'); // 본선
  });
  _routeWalks.forEach(w => {
    let a = w.a, b = w.b;
    if (proj) {
      try {
        const pa = proj.containerPointFromCoords(w.a), pb = proj.containerPointFromCoords(w.b);
        const off = _offsetLatLngs([[pa.x, pa.y], [pb.x, pb.y]], w.side, OFF, proj);
        a = off[0]; b = off[1];
      } catch (e) {}
    }
    _addRouteLine([a, b], 6, '#27439C', 'shortdot');
  });
  _declutterPins();
}

// 줌별로 라벨 박스가 겹치면 우선순위 낮은 핀 숨김(다른 역끼리 크라우딩 해소).
// W1/W2 같은역은 좌(W1)/우(W2)라 박스가 안 겹쳐 둘 다 유지됨.
function _declutterPins() {
  if (!kakaoMap || !_routePins.length) return;
  let proj; try { proj = kakaoMap.getProjection(); } catch (e) { return; }
  const kept = [], G = 4;
  _routePins.forEach(p => {
    let sp; try { sp = proj.containerPointFromCoords(p.latlng); } catch (e) { if (p.ov) p.ov.setMap(kakaoMap); return; }
    let left, right;
    if (p.side > 0) { right = sp.x - G; left = right - p.w; }
    else { left = sp.x + G; right = left + p.w; }
    const top = sp.y - 51, bot = sp.y - 25;
    const hit = kept.some(r => !(right < r.left || left > r.right || bot < r.top || top > r.bot));
    if (hit) { if (p.ov) p.ov.setMap(null); }
    else { if (p.ov) p.ov.setMap(kakaoMap); kept.push({ left: left, right: right, top: top, bot: bot }); }
  });
}

// Douglas-Peucker 단순화 — OSM 점 잔떨림·역쌍 이음새 꺾임을 제거해 두꺼운 선이 매끈해짐
function simplifyPath(pts, tol) {
  if (pts.length < 3) return pts;
  const P = pts.map(p => [p.getLng(), p.getLat()]);
  const keep = new Array(P.length).fill(false);
  keep[0] = keep[P.length - 1] = true;
  const stack = [[0, P.length - 1]];
  while (stack.length) {
    const seg = stack.pop(), a = seg[0], b = seg[1];
    const ax = P[a][0], ay = P[a][1], bx = P[b][0], by = P[b][1];
    const dx = bx - ax, dy = by - ay, len2 = dx * dx + dy * dy || 1e-12;
    let maxD = 0, idx = -1;
    for (let i = a + 1; i < b; i++) {
      const px = P[i][0], py = P[i][1];
      const t = ((px - ax) * dx + (py - ay) * dy) / len2;
      const cx = ax + t * dx, cy = ay + t * dy;
      const d = Math.hypot(px - cx, py - cy);
      if (d > maxD) { maxD = d; idx = i; }
    }
    if (maxD > tol && idx > -1) { keep[idx] = true; stack.push([a, idx], [idx, b]); }
  }
  return pts.filter((_, i) => keep[i]);
}

// Chaikin 코너 컷팅 — 각진 모서리를 둥근 곡선으로 스무딩
function smoothPath(pts, iterations) {
  let cur = pts;
  for (let it = 0; it < iterations && cur.length >= 3; it++) {
    const out = [cur[0]];
    for (let i = 0; i < cur.length - 1; i++) {
      const aLat = cur[i].getLat(),   aLng = cur[i].getLng();
      const bLat = cur[i + 1].getLat(), bLng = cur[i + 1].getLng();
      out.push(new kakao.maps.LatLng(aLat * 0.75 + bLat * 0.25, aLng * 0.75 + bLng * 0.25));
      out.push(new kakao.maps.LatLng(aLat * 0.25 + bLat * 0.75, aLng * 0.25 + bLng * 0.75));
    }
    out.push(cur[cur.length - 1]);
    cur = out;
  }
  return cur;
}

function _addRouteLine(path, weight, col, style) {
  const line = new kakao.maps.Polyline({
    path: path, strokeWeight: weight, strokeColor: col,
    strokeOpacity: 1, strokeStyle: style || 'solid',
  });
  line.setMap(kakaoMap);
  _routePolylines.push(line);
}

// 4겹 선: 흰 외곽 → 루트색(목적지) → 흰 구분 → 옅은 수단색. 도보는 루트색 점선.
// 개발용 가시화: 목적지색(W1 와인/W2 에메랄드) + 수단별 선스타일
//   지하철 = 실선(+흰 케이싱), 버스 = longdash, 도보 = 직선 점선(shortdash).
// 도보는 ODsay 형상이 없어 앞 교통 끝 ~ 뒤 교통 시작(첫·끝은 apt/직장 좌표)을 직선으로 잇는다.
function drawRoutePolylines(options, color) {
  if (!kakaoMap || !options || !options.length) return;
  const best = options[0]; // rank 1 경로만 표시
  const sd = window._lastSearchData || {};
  const wp = (color === '#0CA678') ? sd.workplace_2 : sd.workplace;
  const wpLL = (wp && wp.lat) ? new kakao.maps.LatLng(wp.lat, wp.lng) : null;
  const apt = window._routeAptLatLng;
  const aptLL = (apt && apt.lat) ? new kakao.maps.LatLng(apt.lat, apt.lng) : null;

  // 1) step 파싱 (도보 또는 linestring 없음 → walk)
  const parsed = best.steps.map(step => {
    const isWalk = step.type === '도보' || step.type === '환승도보';
    if (isWalk || !step.linestring) return { walk: true, type: step.type };
    const pts = step.linestring.trim().split(' ').flatMap(pair => {
      const a = pair.split(',');
      if (a.length < 2) return [];
      const lng = parseFloat(a[0]), lat = parseFloat(a[1]);
      return isNaN(lat) || isNaN(lng) ? [] : [new kakao.maps.LatLng(lat, lng)];
    });
    return { walk: pts.length < 2, type: step.type, pts: pts.length >= 2 ? pts : null, line: step.line, from: step.from, to: step.to };
  });

  // 2) 교통 — 검은 테두리 + 루트색 본선. 수단 구분: 지하철=진한색 / 버스=연한색
  const BUS_SHADE = { '#3B5BDB': '#91A7FF', '#0CA678': '#5BE0BA' };
  const side = (color === '#3B5BDB') ? 1 : -1;   // W1=+ / W2=- 좌우 분리용
  parsed.forEach(s => {
    if (s.walk || !s.pts) return;
    const core = (s.type === '버스') ? (BUS_SHADE[color] || color) : color;
    _routeSegments.push({ pts: s.pts, core: core, side: side });
  });

  // 2.5) 핀+라벨: 각 교통 구간 승차·하차. 환승(가까운 점)은 승차정보로 합쳐 표시.
  const pinColor = (color === '#3B5BDB') ? '#3B5BDB' : '#0CA678';
  const _stn = (sub, nm) => (sub && nm && !/역$/.test(nm)) ? (nm + '역') : (nm || '');
  const entries = [];
  parsed.forEach(s => {
    if (s.walk || !s.pts) return;
    const sub = s.type === '지하철';
    const lineLabel = sub ? (s.line || '').replace(/^수도권\s*/, '') : ((s.line || '') + '번');
    entries.push({ ll: s.pts[0], line: lineLabel, st: _stn(sub, s.from) });
    entries.push({ ll: s.pts[s.pts.length - 1], line: lineLabel, st: _stn(sub, s.to) });
  });
  const kept = [];
  entries.forEach(e => {
    if (kept.length && _near2(kept[kept.length - 1].ll, e.ll) < 0.0008 * 0.0008) {
      kept[kept.length - 1] = e;   // 환승: 나중(승차) 정보로 교체
    } else { kept.push(e); }
  });
  // 역명 라벨은 하단 패널(요약 바·타임라인)이 대체 → 지도엔 승·하차 점만 깔끔하게
  kept.forEach(e => _addPin(e.ll, pinColor, '', '', side));

  // 3) 도보 직선 수집(양 끝점 브리지)
  parsed.forEach((s, i) => {
    if (!s.walk) return;
    let A = null;
    for (let j = i - 1; j >= 0; j--)
      if (!parsed[j].walk && parsed[j].pts) { A = parsed[j].pts[parsed[j].pts.length - 1]; break; }
    if (!A) A = aptLL;
    let B = null;
    for (let j = i + 1; j < parsed.length; j++)
      if (!parsed[j].walk && parsed[j].pts) { B = parsed[j].pts[0]; break; }
    if (!B) B = wpLL;
    if (A && B) _routeWalks.push({ a: A, b: B, side: side });
  });

  // 4) 줌별 단순화로 렌더 + 줌/이동 시 재렌더(모든 줌에서 매끈, 정확도 유지)
  _renderRouteLines();
  if (!_lineListenerAdded) {
    kakao.maps.event.addListener(kakaoMap, 'idle', _renderRouteLines);
    _lineListenerAdded = true;
  }
}

async function openRoute(aptSeq, wpId, aptNm, event) {
  if (event) event.stopPropagation();
  const _ac = (window._lastCards || (typeof resultData !== 'undefined' && resultData?.cards) || []).find(c => c.apt_seq === aptSeq);
  window._routeAptLatLng = (_ac && _ac.lat) ? { lat: _ac.lat, lng: _ac.lng } : null;
  clearRoutePolylines();
  focusApt(aptSeq);
  const overlay = document.getElementById('route-overlay');
  overlay.classList.remove('hidden');
  document.body.style.overflow = 'hidden';
  document.getElementById('route-title').textContent = aptNm || aptSeq;
  document.getElementById('route-body').innerHTML =
    '<div style="padding:20px;color:var(--color-text-secondary);text-align:center;">불러오는 중...</div>';

  const wpId2 = window._lastWpId2 || null;
  const cacheKey  = `${aptSeq}:${wpId}`;
  const cacheKey2 = wpId2 ? `${aptSeq}:${wpId2}` : null;

  let routes1 = _routeCache[cacheKey] !== undefined ? _routeCache[cacheKey] : null;
  let routes2 = (cacheKey2 && _routeCache[cacheKey2] !== undefined) ? _routeCache[cacheKey2] : null;

  try {
    const fetches = [];
    if (routes1 === null) fetches.push(
      fetch(`/api/apt/${aptSeq}/routes?wp_id=${wpId}`, {headers: {'ngrok-skip-browser-warning': '1'}})
        .then(r => r.json())
        .then(d => { routes1 = d.options || []; _routeCache[cacheKey] = routes1; })
    );
    if (cacheKey2 && routes2 === null) fetches.push(
      fetch(`/api/apt/${aptSeq}/routes?wp_id=${wpId2}`, {headers: {'ngrok-skip-browser-warning': '1'}})
        .then(r => r.json())
        .then(d => { routes2 = d.options || []; _routeCache[cacheKey2] = routes2; })
    );
    await Promise.all(fetches);
  } catch(e) {
    document.getElementById('route-body').innerHTML =
      `<div style="padding:20px;color:red;">오류: ${escHtml(e.message)}</div>`;
    return;
  }
  drawRoutePolylines(routes1, '#3B5BDB');
  if (routes2) drawRoutePolylines(routes2, '#0CA678');
  _renderRoutePanel(routes1, routes2);
}

function closeRoute() {
  document.getElementById('route-overlay').classList.add('hidden');
  document.body.style.overflow = '';
  clearRoutePolylines();
  unfocusApts();
}

function closeRouteOnBg(event) {
  if (event.target === document.getElementById('route-overlay')) closeRoute();
}

function _renderRoutePanel(routes1, routes2) {
  const hasDual = dualMode && routes2 !== null;
  let html = '';
  if (hasDual) {
    html += `<div class="route-panel__wp-tabs">
      <button class="route-panel__wp-tab active" id="route-wp1-tab" onclick="switchRouteWp(1)">W1 직장</button>
      <button class="route-panel__wp-tab" id="route-wp2-tab" onclick="switchRouteWp(2)">W2 직장</button>
    </div>`;
  }
  html += `<div id="route-wp1-pane">${_routeOptionsHtml(routes1, '#3B5BDB')}</div>`;
  if (hasDual) {
    html += `<div id="route-wp2-pane" style="display:none">${_routeOptionsHtml(routes2, '#0CA678')}</div>`;
  }
  document.getElementById('route-body').innerHTML = html;
}

function switchRouteWp(wp) {
  document.getElementById('route-wp1-tab')?.classList.toggle('active', wp === 1);
  document.getElementById('route-wp2-tab')?.classList.toggle('active', wp === 2);
  const p1 = document.getElementById('route-wp1-pane');
  const p2 = document.getElementById('route-wp2-pane');
  if (p1) p1.style.display = wp === 1 ? '' : 'none';
  if (p2) p2.style.display = wp === 2 ? '' : 'none';
}

// 지하철 호선명 → 공식 노선색 (수도권). 없으면 null → 호출부에서 테마색 대체.
function _subwayColor(raw) {
  const s = (raw || '').replace(/^수도권\s*/, '').replace(/[\s.]/g, '');
  const M = {
    '1호선':'#0052A4','2호선':'#009D3E','3호선':'#EF7C1C','4호선':'#00A5DE',
    '5호선':'#996CAC','6호선':'#CD7C2F','7호선':'#747F00','8호선':'#E6186C','9호선':'#BFA31D',
    '경의중앙선':'#77C4A3','수인분당선':'#F5A200','신분당선':'#D31145',
    '공항철도':'#0090D2','인천공항철도':'#0090D2','경춘선':'#0C8E72','경강선':'#003DA5',
    '신림선':'#6789CA','우이신설선':'#B0CE18','서해선':'#8FC31F','김포골드라인':'#AD8605',
    '의정부경전철':'#FDA600','에버라인':'#56AB2D','인천1호선':'#7CA8D5','인천2호선':'#ED8B00','GTX-A':'#9A6292',
  };
  if (M[s]) return M[s];
  const m = s.match(/^([1-9])호선/);
  if (m && M[m[1] + '호선']) return M[m[1] + '호선'];
  for (const k of ['수인분당선','신분당선','경의중앙선','인천공항철도','공항철도','경춘선','경강선',
                   '신림선','우이신설선','서해선','김포골드라인','의정부경전철','에버라인','인천1호선','인천2호선'])
    if (s.includes(k)) return M[k];
  if (s.includes('GTX')) return M['GTX-A'];
  return null;
}

// 배경색 명도로 글자색(흑/백) 결정 — 노란 노선(수인분당 등)에 흰 글씨 방지.
function _textOn(hex) {
  if (!hex || hex[0] !== '#') return '#222';
  const c = hex.slice(1);
  const r = parseInt(c.slice(0, 2), 16), g = parseInt(c.slice(2, 4), 16), b = parseInt(c.slice(4, 6), 16);
  return (0.299 * r + 0.587 * g + 0.114 * b) > 165 ? '#1a1a1a' : '#fff';
}

// step → 막대/배지 라벨. 지하철=호선명, 버스=번호, 도보=도보.
function _segLabel(s) {
  if (s.type === '도보' || s.type === '환승도보') return '도보';
  if (s.type === '지하철') return (s.line || '').replace(/^수도권\s*/, '').replace(/\s/g, '') || '지하철';
  return (s.line || '').replace(/\s*\(.*$/, '') || '버스';   // 버스 번호(괄호 설명 제거)
}

// 교통 구간 색 — 지하철=공식색(없으면 테마), 버스=테마색(임시), 도보=null(회색).
function _segColor(s, theme) {
  if (s.type === '도보' || s.type === '환승도보') return null;
  if (s.type === '지하철') return _subwayColor(s.line) || theme;
  return theme;   // 버스 — 종류 데이터 없어 임시 테마색
}

// 펼침 토글(셰브론 회전). best는 CSS로 펼친 상태라 명시 rotate(0deg)로 접음.
function _rtToggle(head) {
  const body = head.nextElementSibling;
  const open = body.classList.toggle('open');
  const chev = head.querySelector('.dp-route__chev');
  if (chev) chev.style.transform = open ? 'rotate(180deg)' : 'rotate(0deg)';
}

// 경로 1개 = 한 줄 요약 바(헤드) + 펼침 타임라인(바디). theme=직장색(W1/W2).
function routeCardHTML(opt, isBest, theme) {
  theme = theme || '#3B5BDB';
  const steps = opt.steps || [];

  // 요약 바: 시간 있는 모든 구간을 시간비율 폭으로
  const bar = steps.filter(s => s.time_min != null && s.time_min > 0).map(s => {
    const t = s.time_min, c = _segColor(s, theme);
    const bg = c || 'var(--color-bg-muted)';
    const fg = c ? _textOn(c) : 'var(--color-text-secondary)';
    const extra = c ? '' : 'min-width:54px;';
    return `<div class="dp-seg" style="flex:${Math.max(t, 2)};background:${bg};color:${fg};${extra}">${escHtml(_segLabel(s))} (${t}분)</div>`;
  }).join('');

  // 펼침 타임라인
  const tl = steps.map(s => {
    if (s.type === '도보' || s.type === '환승도보') {
      const dist = s.dist_m ? ` · 약 ${s.dist_m.toLocaleString()}m` : '';
      return `<div class="dp-tl-row"><span class="dp-tl-dot walk"></span><div class="dp-tl-info"><span class="dp-tl-walk">도보 ${s.time_min || 0}분${dist}</span></div></div>`;
    }
    const c = _segColor(s, theme), fg = _textOn(c);
    const sta = (s.from || s.to)
      ? `<div class="dp-tl-sta">${escHtml(s.from || '')}<span class="arr">→</span>${escHtml(s.to || '')}</div>` : '';
    return `<div class="dp-tl-row">
      <span class="dp-tl-dot" style="background:${c}"></span>
      <div class="dp-tl-info">
        <div class="dp-tl-head"><span class="dp-tl-badge" style="background:${c};color:${fg}">${escHtml(_segLabel(s))}</span><span class="dp-tl-time">${s.time_min != null ? s.time_min + '분' : ''}</span></div>
        ${sta}
      </div>
    </div>`;
  }).join('');

  const transit = (opt.bus_cnt || 0) + (opt.subway_cnt || 0);
  const walkMin = steps.filter(s => s.type === '도보' || s.type === '환승도보').reduce((a, s) => a + (s.time_min || 0), 0);
  const subParts = [];
  if (transit > 1) subParts.push(`환승 ${transit - 1}회`);
  if (walkMin) subParts.push(`도보 ${walkMin}분`);
  const sub = subParts.length ? `<span class="dp-route__sub">${subParts.join(' · ')}</span>` : '';

  return `<div class="dp-route${isBest ? ' best' : ''}">
    <div class="dp-route__head" onclick="_rtToggle(this)">
      <div class="dp-route__topline">
        <span><span class="dp-route__time">${opt.total_time_min}<span class="unit">분</span></span>${sub}</span>
        <span class="dp-route__chev" style="${isBest ? 'transform:rotate(180deg)' : ''}">⌄</span>
      </div>
      <div class="dp-bar">${bar}</div>
    </div>
    <div class="dp-route__body${isBest ? ' open' : ''}">${tl}</div>
  </div>`;
}

function _routeOptionsHtml(options, theme) {
  if (!options || !options.length)
    return '<div style="padding:16px;color:var(--color-text-secondary);text-align:center;">경로 정보가 없어요</div>';
  return options.map((opt, idx) => routeCardHTML(opt, idx === 0, theme || '#3B5BDB')).join('');
}

// 추천 카드 (긴 코멘트형)
// ── 관심 단지 ♥ localStorage 헬퍼 ────────────────────────────
const FAV_KEY = 'badugi_favorites';
let _currentFavTab = 'all';
window._lastCards = [];

function loadFavs() {
  try { return new Set(JSON.parse(localStorage.getItem(FAV_KEY) || '[]')); }
  catch(e) { return new Set(); }
}
function saveFavs(s) {
  try { localStorage.setItem(FAV_KEY, JSON.stringify([...s])); } catch(e) {}
}
function favId(seq, pt) { return `${seq}:${pt}`; }
function isFav(seq, pt) { return loadFavs().has(favId(seq, pt)); }

function toggleFav(seq, pt, btn, ev) {
  if(ev) ev.stopPropagation();
  const favs = loadFavs();
  const id = favId(seq, pt);
  if(favs.has(id)) { favs.delete(id); btn.classList.remove('active'); }
  else             { favs.add(id);    btn.classList.add('active'); }
  saveFavs(favs);
  _updateFavTab();
}

function _toggleDetailFav(btn) {
  const seq = btn.dataset.aptSeq; const pt = btn.dataset.pyeongType || '';
  if(!seq) return;
  const favs = loadFavs();
  const id = favId(seq, pt);
  const nowActive = favs.has(id);
  if(nowActive) { favs.delete(id); } else { favs.add(id); }
  saveFavs(favs);
  btn.textContent = nowActive ? '♡' : '♥';
  btn.classList.toggle('active', !nowActive);
  btn.title = nowActive ? '찜하기' : '찜 해제';
  _updateFavTab();
}

function _updateFavTab() {
  const favCnt = window._lastCards.filter(c => isFav(c.apt_seq, c.pyeong_type)).length;
  const allCnt = window._lastCards.length;
  const cntEl  = document.getElementById('fav-tab-cnt');
  const allEl  = document.getElementById('fav-tab-all-cnt');
  const favBtn = document.getElementById('fav-tab-fav');
  if(cntEl)  cntEl.textContent  = favCnt;
  if(allEl)  allEl.textContent  = `(${allCnt})`;
  if(favBtn) favBtn.disabled    = favCnt === 0;
  // 관심 탭 활성 중 ♥ 토글 시 → 패널 실시간 재렌더 (해제된 카드 즉시 사라짐)
  if(_currentFavTab === 'fav') switchFavTab('fav');
}

function switchFavTab(tab) {
  _currentFavTab = tab;
  document.getElementById('fav-tab-all').classList.toggle('active', tab === 'all');
  document.getElementById('fav-tab-fav').classList.toggle('active', tab === 'fav');

  const panel = document.getElementById('cards-panel');
  const favs  = loadFavs();

  if(tab === 'all') {
    // 전체 카드 다시 렌더 + 전체 핀 복원
    filterMapPins(null);
    clearCompare();  // spec-14: 탭 전환 시 비교 선택 초기화
    if(window._lastSearchData) renderCards(window._lastSearchData);
  } else {
    // 관심 단지만 필터 렌더
    const cards = window._lastCards.filter(c => favs.has(favId(c.apt_seq, c.pyeong_type)));
    if(!cards.length) {
      panel.innerHTML = `<div class="fav-empty">❤️‍🔥 아직 관심 단지가 없어요<br><span style="font-size:12px;color:#aaa">카드의 ♥ 버튼을 눌러 저장해보세요</span></div>`;
      return;
    }
    let html = '';
    cards.forEach(c => {
      if(c.is_recommended) html += renderRecCard(c, window._lastWpId, true);
      else                  html += renderListCard(c, window._lastWpId, true);
    });
    panel.innerHTML = html;
    // 지도 핀 동기화
    if(window.filterMapPins) window.filterMapPins(cards.map(c => c.apt_seq));
    // spec-14: 비교 바 표시 (이미 선택된 항목 있으면 체크 복원)
    _updateCompareBar();
  }
}

// ═══════════════════════════════════════════════════════
//  spec-14: 즐겨찾기 단지 비교
// ═══════════════════════════════════════════════════════
const compareSet = new Map();  // id → card
const COMPARE_MAX = 3;

function toggleCompare(id, cb) {
  const card = (window._lastCards || []).find(c => favId(c.apt_seq, c.pyeong_type) === id);
  if (!card) return;
  if (cb.checked) {
    if (compareSet.size >= COMPARE_MAX) { cb.checked = false; return; }
    compareSet.set(id, card);
  } else {
    compareSet.delete(id);
  }
  _updateCompareBar();
}

function _updateCompareBar() {
  const bar   = document.getElementById('compare-bar');
  const cntEl = document.getElementById('compare-bar-count');
  const btn   = document.getElementById('compare-btn');
  if (!bar) return;
  const n = compareSet.size;
  if (n === 0) { bar.classList.add('hidden'); return; }
  bar.classList.remove('hidden');
  cntEl.textContent = `${n}개 선택됨`;
  btn.disabled = n < 2;
}

function clearCompare() {
  compareSet.clear();
  document.querySelectorAll('.compare-check input[type=checkbox]').forEach(cb => { cb.checked = false; });
  _updateCompareBar();
}

function openCompare() {
  const cards = [...compareSet.values()];
  if (cards.length < 2) return;
  _renderCompareTable(cards);
  document.getElementById('compare-overlay').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeCompare() {
  document.getElementById('compare-overlay').classList.add('hidden');
  document.body.style.overflow = '';
}

function closeCompareOnBg(e) {
  if (e.target === document.getElementById('compare-overlay')) closeCompare();
}

function _renderCompareTable(cards) {
  const THIS_Y = THIS_YEAR;
  // 각 항목별 최솟값 강조용
  const minTime  = Math.min(...cards.map(c => c.total_time_min));
  const minPrice = Math.min(...cards.map(c => c.price_low || Infinity));
  const pppOf = c => (c.price_low && c.pyeong) ? Math.round(c.price_low / c.pyeong) : null;
  const minPpp = Math.min(...cards.map(c => pppOf(c) ?? Infinity));

  const rows = [
    { label: '통근시간',
      fn: c => {
        if (dualMode && c.total_time_min_1 != null && c.total_time_min_2 != null)
          return `W1 ${c.total_time_min_1}분<br>W2 ${c.total_time_min_2}분`;
        const best = c.total_time_min === minTime;
        return `<span class="${best?'compare-best':''}">${c.total_time_min}분</span>`;
      }},
    { label: '최저 실거래가',
      fn: c => {
        const e = Math.floor((c.price_low||0)/10000);
        const m = (c.price_low||0) % 10000;
        const str = e && m ? `${e}억 ${m.toLocaleString()}만` : e ? `${e}억` : `${(c.price_low||0).toLocaleString()}만`;
        return `<span class="${c.price_low===minPrice?'compare-best':''}">${str}</span>`;
      }},
    { label: '평당가',
      fn: c => {
        const v = pppOf(c);
        if (v == null) return '-';
        return `<span class="${v===minPpp?'compare-best':''}">${v.toLocaleString()}만/평</span>`;
      }},
    { label: '세대수',    fn: c => `${(c.kaptdaCnt||0).toLocaleString()}세대` },
    { label: '연식',      fn: c => c.build_year ? `${c.build_year}년<br>(${THIS_Y - c.build_year}년차)` : '-' },
    { label: '최고층',    fn: c => c.top_floor  ? `${c.top_floor}층` : '-' },
    { label: '거래 건수', fn: c => c.deal_count ? `${c.deal_count}건` : '-' },
    { label: '동네',      fn: c => escHtml(c.umd_nm || '-') },
  ];

  const thCols = cards.map(c =>
    `<th>${escHtml(c.apt_nm)}<br><span class="compare-th-sub">${escHtml(c.pyeong_type||'')}</span></th>`
  ).join('');

  let html = `<table class="compare-table"><thead><tr><th>항목</th>${thCols}</tr></thead><tbody>`;
  rows.forEach(row => {
    html += `<tr><td class="compare-label">${row.label}</td>${cards.map(c => `<td>${row.fn(c)}</td>`).join('')}</tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('compare-table-container').innerHTML = html;
}

function renderRecCard(c, wpId, cmpMode=false){
  // spec-11: meta에서 build_year 제거 (칩 3으로 흡수). 동·세대·최고층만.
  let metaParts = [escHtml(c.umd_nm), `${c.kaptdaCnt.toLocaleString()}세대`];
  if(c.top_floor) metaParts.push(`최고 ${c.top_floor}층`);
  const meta = metaParts.join('<span class="dot"></span>');

  // 가격 분리: 억 + 만
  const priceHtml = splitPrice(c.price_low);

  // spec-11: 추천 이유 칩 3개 (Info / Brand / Neutral)
  // spec-13: dual 모드 → "W1 25분 · W2 32분"
  let chip1Text;
  if(dualMode && c.total_time_min_1 != null && c.total_time_min_2 != null){
    chip1Text = `W1 ${c.total_time_min_1}분 · W2 ${c.total_time_min_2}분`;
  } else {
    chip1Text = c.transit_summary
      ? `${escHtml(c.transit_summary)} ${c.total_time_min}분`
      : `${c.total_time_min}분`;
  }
  const chip2Text = reasonChip2Text(c);
  const chip3Text = reasonChip3Text(c);
  const reasonsHtml = `<div class="rec-card__reasons">
    <span class="reason-chip reason-chip--info" style="cursor:pointer" title="경로 상세 보기" onclick="event.stopPropagation();openRoute('${c.apt_seq}',${wpId||0},'${escHtml(c.apt_nm)}')">${chip1Text}</span>
    <span class="reason-chip reason-chip--brand">${escHtml(chip2Text)}</span>
    ${chip3Text ? `<span class="reason-chip reason-chip--neutral">${escHtml(chip3Text)}</span>` : ''}
  </div>`;

  const comment = c.friend_comment || '';
  const friendInner = comment
    ? `<div class="rec-card__friend"
        data-apt-seq="${c.apt_seq}" data-apt-nm="${escHtml(c.apt_nm||'')}" data-pyeong-type="${escHtml(c.pyeong_type||'')}"
        data-lat="${c.lat||''}" data-lng="${c.lng||''}"
        onclick="event.stopPropagation();_openChatFromEl(this)" style="cursor:pointer" title="더 물어보기">
        <div class="rec-card__friend-avatar">친구</div>
        <div>
          <div class="rec-card__friend-label">한마디 <span style="font-size:11px;color:#aaa;">· 더 물어보기 →</span></div>
          <div class="rec-card__friend-text">${escHtml(comment)}</div>
        </div>
      </div>`
    : `<div class="rec-card__friend empty">
        <div class="rec-card__friend-avatar">···</div>
        <div>
          <div class="rec-card__friend-label">한마디 (생성 중)</div>
          <div class="rec-card__friend-text"><span class="spinner-mini"></span>살펴보는 중...</div>
        </div>
      </div>`;
  const friendHtml = `
    <button class="rec-card__friend-toggle" onclick="event.stopPropagation();_toggleFriend(this)" type="button">
      <span>AI 한마디</span><span class="toggle-arrow">▼</span>
    </button>
    <div class="rec-card__friend-body-wrap">${friendInner}</div>`;

  const favActive  = isFav(c.apt_seq, c.pyeong_type) ? ' active' : '';
  const favTitle   = favActive ? '관심 해제' : '관심 추가';
  const _rcId = favId(c.apt_seq, c.pyeong_type);
  const _rcCmpHtml = cmpMode
    ? `<label class="compare-check" onclick="event.stopPropagation()"><input type="checkbox" ${compareSet.has(_rcId)?'checked':''} onchange="toggleCompare('${_rcId}',this)"> 비교</label>`
    : '';

  // spec-11: footer 완전 제거 — commute/pick_reason 정보가 칩 1·2로 흡수됨
  return `<div class="rec-card" onclick="panToCard('${c.apt_seq}')">
    ${_rcCmpHtml}
    <button class="fav-btn${favActive}" onclick="toggleFav('${escHtml(c.apt_seq)}','${escHtml(c.pyeong_type||'')}',this,event)" title="${favTitle}">♥</button>
    <span class="rec-card__slot">${escHtml(c.bucket_label||'')}<span class="rec-card__slot-divider"></span>${escHtml(c.pyeong_type||'')}</span>
    <div class="rec-card__title-row">
      <h3 class="rec-card__title">${escHtml(c.apt_nm)}</h3>
      <div class="rec-card__price">${priceHtml}${_priceChgBadge(c.price_chg_6m_pct)}</div>
    </div>
    <div class="rec-card__meta num">${meta}</div>
    ${_whyTagsHtml(c.why_tags)}
    ${reasonsHtml}
    ${_commuteEconRow(c)}
    ${friendHtml}
  </div>`;
}

// "저가 근거" 태그 HTML (태그 없으면 빈 문자열)
function _whyTagsHtml(tags){
  if(!tags || !tags.length) return '';
  const labels = tags.slice(0,2).map(t=>escHtml(t.label)).join(' · ');
  return `<div class="why-tags">저가 근거: ${labels}</div>`;
}

// spec-28: 통근 경제성 행 (월 교통비 · 연간 시간, AC3: 버킷 내 최단 대비 diff)
function _commuteEconRow(c) {
  const cost  = c.monthly_transit_cost;
  const hours = c.annual_commute_hours;
  if (!cost || !hours) return '';
  const costStr = `약 ${Math.round(cost / 1000)}천원`;
  const diffStr = c.annual_hours_diff ? ` (최단 대비 +${c.annual_hours_diff}시간)` : '';
  return `<div class="commute-econ-row">🚇 월 교통비 ${costStr} · 연 ${hours}시간 통근${diffStr}</div>`;
}

// spec-16: 가격 변동률 배지 (6개월 비교)
function _priceChgBadge(pct){
  if(pct == null) return '';
  const cls  = pct > 0 ? 'up' : 'down';
  const arrow = pct > 0 ? '▲' : '▼';
  const sign  = pct > 0 ? '+' : '';
  return `<span class="price-chg-badge price-chg-badge--${cls}" title="최근 3개월 vs 이전 6개월 평균 실거래가 비교">${arrow}${sign}${pct}%</span>`;
}

// spec-11: 추천 카드 칩 2 (Brand 칩) — 추천 이유 압축
//  우선순위: 1) 최단권 대비 차액  2) 슬롯 내 비교(N곳 중 최소)  3) fallback
function reasonChip2Text(c){
  const diff = c.price_diff_vs_fastest;
  if(diff && diff > 0){
    const eok = Math.floor(diff/10000);
    const chon = Math.round((diff%10000)/1000);
    const diffStr = chon===0 ? `${eok}억` : `${eok}억 ${chon}천`;
    return `최단권보다 ${diffStr} 저렴`;
  }
  if(c.pick_reason && /\d+곳 중/.test(c.pick_reason)){
    return `${c.pyeong_type||''} 중 최소가`;
  }
  return '슬롯 최소가';
}

// spec-11: 추천 카드 칩 3 (Neutral) — 연식 우선, 없으면 평단가
function reasonChip3Text(c){
  if(c.build_year){
    const age = THIS_YEAR - c.build_year;
    return `${c.build_year}년 (${age}년차)`;
  }
  if(c.pyeong_price_avg){
    return `평단 ${c.pyeong_price_avg.toLocaleString()}만`;
  }
  return null;  // 데이터 없으면 칩 미표시 → 2개 칩만
}

// 가격을 "5억 8,000만" → 분리된 num/unit 마크업으로
function splitPrice(manwon){
  if(!manwon) return '<span class="unit">-</span>';
  const e = Math.floor(manwon/10000);
  const m = manwon%10000;
  if(e && m) return `<span class="num">${e}</span><span class="unit">억</span> <span class="num">${m.toLocaleString()}</span><span class="unit">만</span>`;
  if(e) return `<span class="num">${e}</span><span class="unit">억</span>`;
  return `<span class="num">${m.toLocaleString()}</span><span class="unit">만</span>`;
}

// 일반 카드 (버킷 안, 짧은 형태) + Haiku 한 줄 코멘트
function renderListCard(c, wpId, cmpMode=false){
  const thisYear = THIS_YEAR;
  let metaParts = [escHtml(c.umd_nm), `${c.kaptdaCnt.toLocaleString()}세대`];
  if(c.build_year) metaParts.push(`${c.build_year}년 (${thisYear-c.build_year}년차)`);

  const comment = c.friend_comment || '';
  const commentHtml = comment
    ? `<div class="list-card__comment">${escHtml(comment)}</div>`
    : `<div class="list-card__comment empty"><span class="spinner-mini"></span>한 줄 평 생성 중...</div>`;

  const favActiveL = isFav(c.apt_seq, c.pyeong_type) ? ' active' : '';
  const favTitleL  = favActiveL ? '관심 해제' : '관심 추가';
  const _lcId = favId(c.apt_seq, c.pyeong_type);
  const _lcCmpHtml = cmpMode
    ? `<label class="compare-check" onclick="event.stopPropagation()"><input type="checkbox" ${compareSet.has(_lcId)?'checked':''} onchange="toggleCompare('${_lcId}',this)"> 비교</label>`
    : '';

  const commuteChip = dualMode && c.total_time_min_1 != null && c.total_time_min_2 != null
    ? `<span class="commute-chip" style="cursor:pointer;font-size:11px" title="경로 상세 보기" onclick="event.stopPropagation();openRoute('${c.apt_seq}',${wpId||0},'${escHtml(c.apt_nm)}')">W1 <strong class="num">${c.total_time_min_1}분</strong> · W2 <strong class="num">${c.total_time_min_2}분</strong></span>`
    : `<span class="commute-chip" style="cursor:pointer;font-size:11px" title="경로 상세 보기" onclick="event.stopPropagation();openRoute('${c.apt_seq}',${wpId||0},'${escHtml(c.apt_nm)}')">${escHtml(c.transit_summary||'')} <strong class="num">${c.total_time_min}분</strong></span>`;

  return `<article class="list-card" onclick="panToCard('${c.apt_seq}')">
    ${_lcCmpHtml}
    <button class="fav-btn${favActiveL}" onclick="toggleFav('${escHtml(c.apt_seq)}','${escHtml(c.pyeong_type||'')}',this,event)" title="${favTitleL}">♥</button>
    <div class="list-card__top">
      <div class="list-card__name">${escHtml(c.apt_nm)}<span class="pt">${escHtml(c.pyeong_type||'')}</span></div>
      <div class="list-card__meta">${metaParts.join(' · ')}</div>
    </div>
    <div class="list-card__right">
      <div class="list-card__price num">${shortPrice(c.price_low)}${_priceChgBadge(c.price_chg_6m_pct)}</div>
      <div class="list-card__row">${commuteChip}</div>
    </div>
  </article>`;
}

function renderCards(data){
  panelMode='list';
  const panel=document.getElementById('cards-panel');

  // 전역 상태 저장 (탭 전환 / 재렌더 시 참조)
  window._lastSearchData = data;
  window._lastCards      = data.cards || [];
  window._lastCards.forEach(c => { c.transfer_count = (c.bus_cnt || 0) + (c.subway_cnt || 0); });
  window._lastWpId       = data.wp_id;
  window._lastWpId2      = data.workplace_2?.wp_id || null;

  // 탭 패널 표시 + 카운트 초기화
  const tabsEl = document.getElementById('fav-tabs');
  if(tabsEl && data.cards.length) {
    tabsEl.style.display = 'flex';
    _currentFavTab = 'all';
    document.getElementById('fav-tab-all').classList.add('active');
    document.getElementById('fav-tab-fav').classList.remove('active');
    _updateFavTab();
  }

  if(!data.cards.length){
    const emptyMsg = dualMode
      ? `<div class="error-box">
           <h2>두 직장 반경 교집합에 매물이 없어요 😅</h2>
           <p style="margin-top:12px">두 직장 사이 거리가 멀거나 반경이 좁을 때 생겨요.<br>
             반경(최대 통근시간)을 늘리거나, 한 직장만 검색해 보세요.</p>
           <p style="margin-top:16px"><a href="/search.html${location.search}">← 조건 다시 입력</a></p>
         </div>`
      : `<div class="error-box"><h2>조건에 맞는 매물이 없어요</h2>
           <p style="margin-top:16px"><a href="/search.html${location.search}">← 조건 다시 입력</a></p>
         </div>`;
    panel.innerHTML = emptyMsg;
    return;
  }

  const recommended = data.cards.filter(c=>c.is_recommended);
  const rest        = data.cards.filter(c=>!c.is_recommended);
  const wpId = data.wp_id;
  const totalRest = rest.length || 1;

  // 부분 결과 안내 배너 (신규 직장 첫 검색 시 일부 경로 미수집)
  const partialBanner = data.meta?.partial
    ? `<div class="partial-banner">⏳ 일부 경로 데이터가 아직 수집 중이에요. 잠시 후 다시 검색하면 더 많은 결과를 볼 수 있어요.</div>`
    : '';

  let html = partialBanner;

  // spec-26: 아파트 직접 검색 바 (추천 목록 바로 위)
  html += `
    <div class="apt-search-bar">
      <div class="apt-search-input-wrap">
        <input type="text" id="apt-search-input"
          placeholder="아파트 이름으로 직접 검색… (예: 래미안)"
          maxlength="30" autocomplete="off"
          oninput="_onAptSearchInput()"
          onkeydown="if(event.key==='Escape')_hideAptDropdown()">
        <div class="apt-search-dropdown" id="apt-search-dropdown" style="display:none"></div>
      </div>
    </div>
    <div id="apt-search-result"></div>`;

  // 추천 요약 헤더만 표시 (개별 카드 없음)
  if(recommended.length){
    html += `<div class="rec-section-head">
      <h3>추천 ${recommended.length}곳</h3>
      <p>통근시간대 × 평형 매트릭스에서 각 슬롯별 최저가 단지예요.</p>
    </div>`;
  }

  if(false && rest.length){
    const buckets = data.buckets || [];
    html += `<div class="bucket-divider">그 외 매물 ${rest.length}곳 (펼쳐서 보기)</div>`;
    buckets.forEach(b=>{
      const inBucket = rest.filter(c=>c.bucket_idx===b.idx);
      if(!inBucket.length) return;

      // 집계: 가격 최저/최고/평균
      const prices = inBucket.map(c=>c.price_low).filter(p=>p>0);
      const minP = prices.length ? Math.min(...prices) : 0;
      const maxP = prices.length ? Math.max(...prices) : 0;
      const avgP = prices.length ? Math.round(prices.reduce((a,b)=>a+b,0)/prices.length) : 0;

      // 평형별 카운트
      const byPt = {};
      inBucket.forEach(c=>{ byPt[c.pyeong_type]=(byPt[c.pyeong_type]||0)+1; });
      const ptChips = Object.entries(byPt)
        .sort((a,b)=>a[0].localeCompare(b[0],'ko'))
        .map(([pt, cnt])=>`<span class="bucket-pt-chip">${escHtml(pt)} <strong class="num">${cnt}</strong></span>`)
        .join('');

      // 전체 대비 비율
      const ratioPct = Math.round(inBucket.length/totalRest*100);

      // 본문 (펼친 상태)
      const byPtList = {};
      inBucket.forEach(c=>{ (byPtList[c.pyeong_type]=byPtList[c.pyeong_type]||[]).push(c); });
      let body = '';
      Object.entries(byPtList).sort((a,b)=>a[0].localeCompare(b[0],'ko')).forEach(([pt, items])=>{
        items.sort((a,b)=>a.price_low - b.price_low);
        body += `<div class="bucket-pt-label">${escHtml(pt)} · ${items.length}곳 · 가격순</div>`;
        body += items.map(c=>renderListCard(c, wpId)).join('');
      });

      html += `<div class="bucket-section">
        <div class="bucket-head" onclick="toggleBucket(this)">
          <div class="bucket-head__top">
            <div class="bucket-head__title">
              <span class="bucket-head__time">${escHtml(b.label)}</span>
              <span class="bucket-head__cnt num">${inBucket.length}곳</span>
            </div>
            <div class="bucket-head__chev">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
          </div>
          ${prices.length ? `<div class="bucket-head__bottom">
            <span class="bucket-head__price">
              <strong class="num">${shortPrice(minP)}</strong><span class="price-sep">~</span><strong class="num">${shortPrice(maxP)}</strong>
              <span style="color:var(--color-text-tertiary);margin-left:6px;">· 평균 <span class="num">${shortPrice(avgP)}</span></span>
            </span>
          </div>` : ''}
          <div class="bucket-head__bottom">
            <div class="bucket-head__pts">${ptChips}</div>
          </div>
          <div class="bucket-head__ratio"><div class="bucket-head__ratio-fill" style="width:${ratioPct}%"></div></div>
        </div>
        <div class="bucket-body">${body}</div>
      </div>`;
    });
  }

  panel.innerHTML = html;
  initSortBar(data.cards);
}

function toggleBucket(headEl){
  headEl.parentElement.classList.toggle('open');
}

//  카카오맵 — 단지 단위 핀 (클러스터러 없음)

let aptGroupMap = {};  // apt_seq → {apt_seq, apt_nm, lat, lng, umd_nm, kaptdaCnt, build_year, top_floor, cards:[card,...]}

  new kakao.maps.CustomOverlay({
    position: new kakao.maps.LatLng(wp.lat, wp.lng),
    content: `<div class="pin-workplace-wrap"><svg width="56" height="70" viewBox="0 0 56 70" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="28" cy="28" r="26" fill="#0f172a" stroke="white" stroke-width="2"/><path d="M22 52 L28 68 L34 52 Z" fill="#0f172a"/><path d="M22 53 L28 68 L34 53" stroke="white" stroke-width="2" stroke-linejoin="round"/><rect x="17" y="21" width="22" height="18" rx="1" fill="white"/><rect x="21" y="15" width="14" height="8" rx="1" fill="white"/><rect x="25" y="11" width="6" height="6" rx="1" fill="white"/><rect x="19" y="23" width="4" height="4" rx="0.5" fill="#0f172a"/><rect x="26" y="23" width="4" height="4" rx="0.5" fill="#0f172a"/><rect x="33" y="23" width="4" height="4" rx="0.5" fill="#0f172a"/><rect x="19" y="30" width="4" height="4" rx="0.5" fill="#0f172a"/><rect x="26" y="30" width="4" height="4" rx="0.5" fill="#0f172a"/><rect x="33" y="30" width="4" height="4" rx="0.5" fill="#0f172a"/><rect x="23" y="34" width="10" height="5" rx="0.5" fill="#0f172a"/>${dualMode ? '<circle cx="46" cy="10" r="10" fill="#f43f5e" stroke="white" stroke-width="1.5"/><text x="46" y="15" text-anchor="middle" font-size="13" font-weight="900" font-family="Arial,sans-serif" fill="white">1</text>' : ''}</svg></div>`,

      yAnchor: 1, zIndex: 100,
    }).setMap(kakaoMap);
  }

  // ── 단지별 그룹화 (apt_seq 단위) ──────────────────────
  aptGroupMap = {};
  data.cards.forEach(c=>{
    if(!c.lat||!c.lng) return;
    if(!aptGroupMap[c.apt_seq]){
      aptGroupMap[c.apt_seq] = {
        apt_seq: c.apt_seq, apt_nm: c.apt_nm, lat: c.lat, lng: c.lng,
        umd_nm: c.umd_nm, kaptdaCnt: c.kaptdaCnt,
        build_year: c.build_year, top_floor: c.top_floor,
        any_recommended: false,
        cards: [],

  Object.values(aptGroupMap).forEach(group=>{

    group.cards.sort((a,b)=>a.price_low - b.price_low);
    const main = group.cards[0];
    const ptCount = group.cards.length;
    const t = main.total_time_min || 999;
    const tCls = t <= 30 ? 'pin-t1' : t <= 45 ? 'pin-t2' : t <= 60 ? 'pin-t3' : 'pin-t4';
    const cls = group.any_recommended ? 'pin-best' : tCls;
    const z = group.any_recommended ? 50 : 5;
    const crownHtml = group.any_recommended ? '<div class="pin-crown">👑</div>' : '';
    const multiHtml = ptCount > 1 ? `<span class="pin-multi">${ptCount}</span>` : '';
    const timeText = t < 999 ? `${t}분` : '?';
    const subText = main.pyeong_type ? `<div class="pin-sub">${escHtml(main.pyeong_type)}</div>` : '';
    const pinHtml = `<div class="pin ${cls}" data-apt-seq="${group.apt_seq}">${crownHtml}<div class="pin-roof"></div><div class="pin-body" style="position:relative">${multiHtml}<div class="pin-time">${timeText}</div>${subText}</div></div>`;
    const overlay = new kakao.maps.CustomOverlay({
      position: pos,
      content: pinHtml,
      yAnchor: 1,
      zIndex: z,
    });
    overlay.setMap(kakaoMap);
    overlays.push(overlay);
    aptOverlayMap[group.apt_seq] = overlay;  // 핀 필터링용
  });

  // ── 핀 이벤트 ───────────────────────────────────────
  //  호버 = 툴팁만 (미리보기)
  //  클릭 = 상세 패널 열기 (showDetail)
  container.addEventListener('mouseover', e=>{
    const pin = e.target.closest('.pin[data-apt-seq]');
    if(pin) showTooltip(pin, aptGroupMap[pin.dataset.aptSeq], data.wp_id);
  });
  container.addEventListener('mouseout', e=>{
    const pin = e.target.closest('.pin[data-apt-seq]');
    if(pin && !pin.contains(e.relatedTarget)) scheduleHideTooltip();
  });
  container.addEventListener('click', e=>{
    const pin = e.target.closest('.pin[data-apt-seq]');
    if(pin){
      e.stopPropagation();
      hideTooltip();
      showDetail(pin.dataset.aptSeq, data.wp_id);
    }
  });
}

function zoomLevelFor(min){
  if(min<=20) return 6; if(min<=30) return 7; if(min<=45) return 7; return 8;
}

// ═══════════════════════════════════════════════════════
//  호버 툴팁
// ═══════════════════════════════════════════════════════
const tooltip = document.getElementById('pin-tooltip');
let tooltipTimer = null;

// 툴팁: 단지(group) 단위로 표시. group.cards 가 평형별 카드 배열.
let _ttGroup = null;
let _ttActivePtIdx = 0;

function showTooltip(pinEl, group, wpId){
  if(!group || !group.cards.length) return;
  clearTimeout(tooltipTimer);
  _ttGroup = group;
  _ttActivePtIdx = 0;

  // 상단: 단지명 + 배지
  document.getElementById('tt-apt-nm').textContent = group.apt_nm;
  const badge = document.getElementById('tt-badge');
  badge.style.display = group.any_recommended ? '' : 'none';

  // 메타
  const thisYear = THIS_YEAR;
  let metaParts = [group.umd_nm, `${group.kaptdaCnt.toLocaleString()}세대`];
  if(group.build_year) metaParts.push(`${group.build_year}년 (${thisYear-group.build_year}년차)`);
  document.getElementById('tt-meta').textContent = metaParts.join(' · ');

  // 평형 탭 (밑줄형)
  const tabsEl = document.getElementById('tt-pt-tabs');
  if(group.cards.length > 1){
    tabsEl.style.display = 'flex';
    tabsEl.innerHTML = group.cards.map((c, i)=>
      `<div class="pin-tooltip__tab ${i===0?'active':''}" data-pt-idx="${i}"
            onclick="event.stopPropagation();switchTooltipPt(${i})">${escHtml(c.pyeong_type||'')}</div>`
    ).join('');
  } else {
    tabsEl.style.display = 'none';
  }

  // 첫 평형 정보 렌더
  renderTooltipPt(0);

  // 위치
  tooltip.classList.remove('hidden');
  const pinRect = pinEl.getBoundingClientRect();
  const ttW = tooltip.offsetWidth||296;
  const ttH = tooltip.offsetHeight||280;
  let left = pinRect.left + pinRect.width/2 - ttW/2;
  let top  = pinRect.top - ttH - 10;
  left = Math.max(8, Math.min(left, window.innerWidth - ttW - 8));
  if(top < 60) top = pinRect.bottom + 8;
  tooltip.style.left = left+'px';
  tooltip.style.top  = top+'px';
}

function switchTooltipPt(idx){
  if(!_ttGroup || idx === _ttActivePtIdx) return;
  _ttActivePtIdx = idx;
  document.querySelectorAll('.pin-tooltip__tab').forEach((t,i)=>t.classList.toggle('active', i===idx));
  renderTooltipPt(idx);
}

function renderTooltipPt(idx){
  if(!_ttGroup) return;
  const c = _ttGroup.cards[idx];
  if(!c) return;

  // 통근 메트릭
  document.getElementById('tt-transit-val').innerHTML = `<span class="num">${c.total_time_min}</span><span class="unit">분</span>`;
  document.getElementById('tt-transit-sub').textContent = c.transit_summary || '경로 정보 없음';

  // 가격/거래 메트릭
  const lt = (c.recent_trades||[])[0];
  const priceLabel = document.getElementById('tt-price-label');
  const priceVal = document.getElementById('tt-price-val');
  const priceSub = document.getElementById('tt-price-sub');
  if(lt){
    priceLabel.textContent = '최근 거래';
    priceVal.innerHTML = `<span class="num">${shortPrice(lt.amount).replace('억','')}</span><span class="unit">억</span>`;
    priceSub.innerHTML = `<span class="num">${lt.date}</span> · ${lt.floor}층 ${escHtml(lt.gbn||'')}`;
  } else {
    priceLabel.textContent = '가격대';
    priceVal.innerHTML = `<span class="num">${shortPrice(c.price_low).replace('억','')}</span><span class="unit">억</span>`;
    priceSub.innerHTML = c.price_high && c.price_high!==c.price_low
      ? `~<span class="num">${shortPrice(c.price_high)}</span> · <span class="num">${c.deal_count||0}</span>건`
      : `<span class="num">${c.deal_count||0}</span>건 거래`;
  }

  // 코멘트
  const comment = c.friend_comment||'';
  const ttComment = document.getElementById('tt-comment');
  if(comment){
    ttComment.style.display = 'block';
    ttComment.className = 'pin-tooltip__comment';
    ttComment.textContent = comment;
  } else {
    ttComment.style.display = 'block';
    ttComment.className = 'pin-tooltip__comment empty';
    ttComment.innerHTML = '<span class="spinner-mini"></span>친구가 한마디 준비 중...';
  }
}
function scheduleHideTooltip(){ tooltipTimer = setTimeout(hideTooltip, 250); }
function hideTooltip(){ tooltip.classList.add('hidden'); }
tooltip.addEventListener('mouseenter', ()=>clearTimeout(tooltipTimer));
tooltip.addEventListener('mouseleave', ()=>scheduleHideTooltip());

async function showDetail(aptSeq, wpId){
  panelMode='detail';
  hideTooltip();
  _currentAptSeq = aptSeq;
  clearPoiMarker();
  setActiveAptPin(aptSeq);  // spec-38: 선택 단지 핀 강조

  // 사이드 패널 열기
  const sidePanel = document.getElementById('detail-panel');
  sidePanel.classList.add('open');
  document.getElementById('detail-resize-handle').style.display = '';
  document.getElementById('detail-title').textContent = '불러오는 중...';
  document.querySelector('.detail-panel__tabs').style.display = 'none';

  const panel = document.getElementById('detail-body');
  panel.innerHTML='<div style="padding:32px 20px;text-align:center;color:var(--color-text-tertiary);font-size:13px;"><span class="spinner-mini"></span>상세 정보 로드 중...</div>';
  panel.scrollTop=0;

  // 지도 해당 아파트 위치로 이동
  if(kakaoMap && resultData){
    const card = resultData.cards.find(c=>c.apt_seq===aptSeq);
    if(card && card.lat && card.lng){
      kakaoMap.panTo(new kakao.maps.LatLng(card.lat, card.lng));
    }
  }

  try{
    const [dRes, rRes] = await Promise.all([
      fetch(`/api/apt/${aptSeq}/detail?wp_id=${wpId}`,{headers:{'ngrok-skip-browser-warning':'1'}}),
      fetch(`/api/apt/${aptSeq}/routes?wp_id=${wpId}`,{headers:{'ngrok-skip-browser-warning':'1'}}),
    ]);
    const detail = await dRes.json();
    const routes = (await rRes.json()).options || [];
    currentDetailCard = resultData?.cards.find(c=>c.apt_seq===aptSeq) || {};
    renderDetailPanel(detail, routes, wpId);
  } catch(e){
    document.getElementById('detail-body').innerHTML=`<div style="padding:20px;color:red;">오류: ${escHtml(e.message)}</div>`;
  }
}

function backToList(){
  panelMode='list';
  if(detailChart){ detailChart.destroy(); detailChart=null; }
  detailChartData=null; currentTabKey=null;
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('detail-resize-handle').style.display = 'none';
  document.querySelector('.detail-panel__tabs').style.display = '';
  clearActiveAptPin();  // spec-38: 핀 강조 해제
  clearRoutePolylines();   // 경로선 제거
  unfocusApts();           // 아파트 핀 모두 다시 표시 + 버튼 숨김
  if(resultData) renderCards(resultData);
}

// ── 섹션 접기/펼치기 ──────────────────────────────────────────
function toggleSection(headEl){
  const section = headEl.parentElement;
  const opened = section.classList.toggle('open');
  // 차트 섹션 펼칠 때 차트 업데이트 (크기 계산)
  if(opened && section.querySelector('#dp-chart') && detailChart){
    setTimeout(()=>detailChart.resize(), 50);
  }
}

// ── 건물 정보 그리드 ──────────────────────────────────────────
function renderBuildingGrid(b){
  if(!b) return '<p style="font-size:13px;color:var(--color-text-tertiary);">건물 정보 없음</p>';
  const items = [];
  if(b.dong_cnt)     items.push(['동수', `${b.dong_cnt}동`]);
  if(b.base_floor)   items.push(['지하층', `B${b.base_floor}`]);
  if(b.parking)      items.push(['주차', `${b.parking.toLocaleString()}대`]);
  if(b.elevator_cnt) items.push(['엘리베이터', `${b.elevator_cnt}대`]);
  if(b.heat_type)    items.push(['난방', b.heat_type]);
  if(b.hall_type)    items.push(['배치', b.hall_type]);
  if(b.builder)      items.push(['시공사', b.builder]);
  if(b.ev_chargers)  items.push(['전기차충전', `${b.ev_chargers}기`]);
  if(b.subway_line && b.subway_sta)
    items.push(['인근 지하철', `${b.subway_line} ${b.subway_sta}${b.subway_walk?' ('+b.subway_walk+')':''}`]);
  if(!items.length) return '<p style="font-size:13px;color:var(--color-text-tertiary);">건물 정보 없음</p>';
  return items.map(([label,val])=>`
    <div class="dp-bld-item">
      <span class="dp-bld-label">${label}</span>
      <span class="dp-bld-value">${escHtml(String(val))}</span>
    </div>`).join('');
}

// ── 경로 아코디언 ─────────────────────────────────────────────
function renderRoutesHTML(routes, theme){
  theme = theme || '#3B5BDB';
  if(!routes.length) return '<p style="font-size:13px;color:#aaa;">경로 정보 없음</p>';
  if(routes.length===1) return routeCardHTML(routes[0], true, theme);

  const first = routeCardHTML(routes[0], true, theme);
  const rest = routes.slice(1).map(o=>routeCardHTML(o,false,theme)).join('');
  return `${first}
    <button class="dp-route-more-btn" onclick="toggleMoreRoutes(this)">
      다른 경로 보기 (${routes.length-1}개) ▼
    </button>
    <div id="dp-routes-extra">${rest}</div>`;
}
function toggleMoreRoutes(btn){
  const extra = document.getElementById('dp-routes-extra');
  const open = extra.classList.toggle('open');
  const n = btn.textContent.match(/\d+/)?.[0]||'';
  btn.textContent = open ? `다른 경로 접기 ▲` : `다른 경로 보기 (${n}개) ▼`;
}

// ── KPI ───────────────────────────────────────────────────────
// spec-42: KPI 3중복 → 한 줄 결론(verdict). 데이터 없으면 솔직히 '없음'.
function renderKPIHTML(ps, umdNm){
  if(!ps) return '<p style="font-size:12px;color:var(--color-text-tertiary);">시세 데이터 없음</p>';
  const where = `${escHtml(umdNm||'')} ${ps.pyeong?ps.pyeong+'평 ':''}평균`;
  let main;
  if(ps.vs_dong_diff!=null && ps.vs_dong_pct!=null){
    const cls = ps.vs_dong_diff<0?'clr-dn':ps.vs_dong_diff>0?'clr-up':'';
    const updown = ps.vs_dong_diff<0?'저렴':ps.vs_dong_diff>0?'비쌈':'동일';
    main = `${where}보다 <b class="${cls}">${fmtPrice(Math.abs(ps.vs_dong_diff))} ${updown}</b> <span class="num ${cls}">(${fmtPct(ps.vs_dong_pct)})</span>`;
  } else if(ps.vs_dong_pct!=null){
    const cls = ps.vs_dong_pct<0?'clr-dn':ps.vs_dong_pct>0?'clr-up':'';
    main = `${where} 대비 <b class="num ${cls}">${fmtPct(ps.vs_dong_pct)}</b>`;
  } else {
    main = '동평균 비교 데이터 없음';
  }
  const sub = ps.change_6m_pct!=null
    ? `<span class="dp-verdict-sub">최근 6개월 ${fmtPct(ps.change_6m_pct)}</span>` : '';
  return `<div class="dp-verdict">${main}${sub}</div>`;
}

// ── 평수 탭 ───────────────────────────────────────────────────
function renderTabsHTML(tabs){
  if(!tabs||!tabs.length) return '';
  return tabs.map(t=>`
    <button class="dp-tab" data-tab="${t.pyeong_type}_${t.pyeong}"
      onclick="switchTab('${t.pyeong_type}_${t.pyeong}','${t.pyeong_type}')">
      ${t.pyeong}평 <small style="opacity:.7">(${t.deal_count}건)</small>
    </button>`).join('');
}
function switchTab(key, pyeongType){
  if(key===currentTabKey) return;
  document.querySelectorAll('.dp-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===key));
  currentTabKey=key;
  updateDetailChart(key, pyeongType);
}

// ── Chart.js ──────────────────────────────────────────────────
function getChartSeries(key){
  const [pt] = key.split('_');  // pyeong_type
  const complexSeries = detailChartData?.complex?.[key] || {};
  const dongSeries    = detailChartData?.dong?.[pt] || {};
  const allMonths = [...new Set([...Object.keys(complexSeries),...Object.keys(dongSeries)])].sort();
  return {
    labels: allMonths,
    complexData: allMonths.map(m=>complexSeries[m]??null),
    dongData:    allMonths.map(m=>dongSeries[m]??null),
  };
}
function initDetailChart(key, aptNm, umdNm){
  const canvas = document.getElementById('dp-chart');
  if(!canvas) return;
  // Chart.js가 아직 로드 안 됐으면 대기 후 재시도
  if(typeof Chart === 'undefined'){
    setTimeout(() => initDetailChart(key, aptNm, umdNm), 100);
    return;
  }
  if(detailChart){ detailChart.destroy(); detailChart=null; }
  const {labels,complexData,dongData} = getChartSeries(key);
  // 데이터 포인트가 적으면 점만, 충분하면 선+점
  const nonNull = complexData.filter(v=>v!==null).length;
  const sparse = nonNull < 6;
  const CHART_PINK   = '#FF6FB5';
  const CHART_BLUE   = '#93C5FD';
  const CHART_GRID   = 'rgba(255,255,255,0.08)';
  const CHART_TICK   = 'rgba(255,255,255,0.55)';
  detailChart = new Chart(canvas.getContext('2d'),{
    type:'line',
    data:{
      labels,
      datasets:[
        { label:aptNm, data:complexData,
          borderColor: CHART_PINK, backgroundColor: 'rgba(255,111,181,0.15)',
          borderWidth: sparse?0:2.5, pointRadius: sparse?6:4,
          pointBackgroundColor: CHART_PINK, pointBorderColor: '#1D1922', pointBorderWidth: 1.5,
          tension:0.35, fill:false, showLine:!sparse },
        { label:`${umdNm} 동평균`, data:dongData,
          borderColor: CHART_BLUE, backgroundColor: 'rgba(147,197,253,0.08)',
          borderWidth: 1.5, pointRadius:2, borderDash:[4,3],
          pointBackgroundColor: CHART_BLUE,
          tension:0.35, fill:false },
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'rgba(28,25,34,0.92)',
          borderColor:'rgba(255,255,255,0.15)', borderWidth:1,
          titleColor:'rgba(255,255,255,0.85)', bodyColor:'rgba(255,255,255,0.7)',
          padding:10,
          callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fmtPrice(ctx.parsed.y)}`}
        }
      },
      scales:{
        x:{
          ticks:{font:{family:'SUIT',size:10}, color:CHART_TICK, maxTicksLimit:12},
          grid:{color:CHART_GRID}
        },
        y:{
          ticks:{font:{family:'SUIT',size:10}, color:CHART_TICK, callback:v=>shortPrice(v)},
          grid:{color:CHART_GRID}
        },
      }
    }
  });
}
function updateDetailChart(key){
  if(!detailChart) return;
  const {labels,complexData,dongData} = getChartSeries(key);
  const nonNull = complexData.filter(v=>v!==null).length;
  const sparse = nonNull < 6;
  detailChart.data.labels = labels;
  detailChart.data.datasets[0].data = complexData;
  detailChart.data.datasets[0].borderWidth = sparse?0:2;
  detailChart.data.datasets[0].pointRadius = sparse?5:3;
  detailChart.data.datasets[0].showLine = !sparse;
  detailChart.data.datasets[1].data = dongData;
  detailChart.update();
}

// ── 실거래 테이블 (평형별 그룹) ──────────────────────────────
function renderTradesHTML(trades){
  if(!trades||!trades.length) return '<p style="font-size:13px;color:var(--color-text-tertiary);">거래 내역 없음</p>';
  const groups = {};
  trades.forEach(t=>{
    const key = `${t.pyeong}평`;
    if(!groups[key]) groups[key]=[];
    groups[key].push(t);
  });
  return Object.entries(groups).map(([py, rows])=>`
    <div class="dp-trade-group">
      <div class="dp-trade-group-title">${py}</div>
      <table class="dp-trade-table">
        <thead><tr><th>거래일</th><th>금액</th><th>층</th></tr></thead>
        <tbody>${rows.map(t=>`
          <tr>
            <td>${t.date}</td>
            <td class="dp-trade-amount">${fmtPrice(t.amount)}</td>
            <td style="color:var(--color-text-tertiary)">${t.floor}층</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`).join('');
}

// ── POI (카테고리별 그룹, 중요도순) ──────────────────────────
// poi_lclas_cd 실제 코드 (Supabase apt_walking_poi 확인 2026-05-25):
// A=학교(초중고), B=어린이집/유치원, C=학원, D=교통(D01=지하철출구·D02=버스),
// E=쇼핑/편의(백화점·마트·편의점), F=의료(병원·약국),
// G=음식점, H=공공기관(구청·경찰·소방), I=공원/녹지,
// J=문화/여가(영화관·박물관·도서관·J01~J04), K=스포츠(헬스장·수영장), L=금융(은행·ATM)
// L 서브카테고리: L01=은행, L02=ATM, L03=주유소, L04/L05=아파트단지(오분류), L06=기타서비스
const POI_ORDER = ['D','A','B','C','F','E','I','K','J','H','L','G'];
const POI_CAT_NAME = {
  A:'학교', B:'어린이집/유치원', C:'학원', D:'교통',
  E:'쇼핑/편의', F:'의료', G:'음식', H:'공공기관',
  I:'공원/녹지', J:'문화/여가', K:'스포츠', L:'금융',
};
// 카테고리별 허용 서브카테고리 — 없으면 전체 허용
// L: 은행(L01)·ATM(L02)만 표시. L03(주유소)·L04·L05(아파트단지)·L06(기타) 제외
// J: 영화관(J01)·박물관(J02)·공연장(J03)·도서관(J04)만 표시
const POI_ALLOWED_SUBS = {
  L: new Set(['L01','L02']),
  J: new Set(['J01','J02','J03','J04']),
};
// 교통(D) 항목 표시용 접미사 — 학교명 등 정류장/출구가 시설명으로 보여 헷갈리는 것 방지.
// (검색용 data-poi-name은 원본 유지하고, 보이는 이름에만 붙임)
const POI_SUB_LABEL = { D01: '지하철역', D02: '버스정류장' };
function renderPOIHTML(poi){
  if(!poi||!poi.length) return '<p style="font-size:13px;color:var(--color-text-tertiary);">시설 데이터 없음</p>';
  const groups = {};
  poi.slice(0,30).forEach(p=>{
    // 카테고리별 서브카테고리 필터 (데이터 품질 이슈 제거)
    const allowedSubs = POI_ALLOWED_SUBS[p.category];
    if(allowedSubs && !allowedSubs.has(p.sub_category)) return;
    const key = POI_ORDER.includes(p.category) ? p.category : '기타';
    if(!groups[key]) groups[key]=[];
    groups[key].push(p);
  });
  const orderedKeys = [...POI_ORDER.filter(k=>groups[k]), ...(groups['기타']?['기타']:[])];
  return orderedKeys.map(key=>{
    const catName = POI_CAT_NAME[key]||'기타';
    return `<div class="dp-poi-category">${catName}</div>${groups[key].map(p=>`
      <div class="dp-poi-row detail-poi-row"
        data-poi-name="${escHtml(p.name||'')}"
        data-walk-min="${p.walking_min||0}"
        data-dist-m="${Math.round(p.distance_m||0)}"
        onclick="togglePoiMarker(this)">
        <div class="dp-poi-name">${escHtml(p.name)}${POI_SUB_LABEL[p.sub_category] ? ` <span class="dp-poi-tag">(${POI_SUB_LABEL[p.sub_category]})</span>` : ''}</div>
        <div class="dp-poi-dist"><span class="num">도보 ${p.walking_min}분</span> · <span class="num">${Math.round(p.distance_m||0)}m</span></div>
      </div>`).join('')}`;
  }).join('');
}

// ── 체크박스 정렬 패널 ────────────────────────────────────────
const SORT_OPTIONS = [
  { value: 'total_time_min:asc',           label: '통근시간 짧은순',  icon: 'ti-clock',          group: '기본' },
  { value: 'price_low:asc',                label: '최저가 낮은순',    icon: 'ti-tag',            group: '기본' },
  { value: 'pyeong_price_avg:asc',         label: '평당가 낮은순',    icon: 'ti-coins',          group: '기본' },
  { value: 'build_year:desc',              label: '신축순',           icon: 'ti-building',       group: '기본' },
  { value: 'deal_count:desc',              label: '거래건수 많은순',  icon: 'ti-chart-bar',      group: '기본' },
  { value: 'kaptdaCnt:desc',               label: '세대수 많은순',    icon: 'ti-users',          group: '기본' },
  { value: 'transfer_count:asc',           label: '환승 적은순',      icon: 'ti-transfer',       group: '기본' },
  { value: 'pyeong:desc',                  label: '평수 넓은순',      icon: 'ti-maximize',       group: '기본' },
  { value: 'walk_to_transit_min:asc',      label: '대중교통 도보',    icon: 'ti-walk',           group: '도보' },
  { value: 'nearest_park_min:asc',         label: '공원 도보',        icon: 'ti-trees',          group: '도보' },
  { value: 'nearest_subway_min:asc',       label: '지하철 도보',      icon: 'ti-train',          group: '도보' },
  { value: 'nearest_elementary_min:asc',   label: '초등학교 도보',    icon: 'ti-school',         group: '도보' },
  { value: 'nearest_mid_high_min:asc',     label: '중고등학교 도보',  icon: 'ti-school',         group: '도보' },
  { value: 'nearest_mart_min:asc',         label: '마트 도보',        icon: 'ti-shopping-cart',  group: '도보' },
];

// 체크된 항목을 순서대로 저장 (클릭 순 = 우선순위)
let _sortChecked = []; // e.g. ['total_time_min:asc', 'price_low:asc']

function initSortBar(cards) {
  if (!cards || !cards.length) return;

  const wrap = document.getElementById('sort-chips-wrap');
  if (!wrap) return;
  wrap.innerHTML = '';
  SORT_OPTIONS.forEach(o => {
    const el = document.createElement('div');
    el.className = 'sort-check-item';
    el.dataset.value = o.value;
    el.innerHTML = `<span class="rank-badge"></span><div class="icon-bubble"><i class="ti ${o.icon}"></i></div><span class="sort-chip-label">${o.label}</span>`;
    el.addEventListener('click', () => onSortCheckClick(o.value));
    wrap.appendChild(el);
  });

  document.getElementById('sort-bar').classList.add('visible');

  // 정렬 패널 접힘 상태 초기화 (localStorage 기억, 기본 펼침)
  const _sp = document.getElementById('sort-panel');
  const _stb = document.getElementById('sort-toggle-btn');
  let _open = true;
  try { _open = (localStorage.getItem('sortPanelOpen') ?? '1') === '1'; } catch (e) {}
  // spec-12 #1: 모바일 첫 진입은 정렬패널 접힘(카드 공간 확보). 저장된 선호 있으면 존중.
  // 가드로 데스크톱 경로는 무변경.
  try {
    if (window.matchMedia('(max-width: 767px)').matches &&
        localStorage.getItem('sortPanelOpen') === null) {
      _open = false;
    }
  } catch (e) {}
  _sp.classList.toggle('open', _open);
  _stb.classList.toggle('open', _open);
  _stb.setAttribute('aria-expanded', String(_open));
}

function onSortCheckClick(value) {
  const idx = _sortChecked.indexOf(value);
  if (idx === -1) {
    _sortChecked.push(value);
  } else {
    _sortChecked.splice(idx, 1);
  }
  _refreshSortUI();
  applySortOrder();
}

function _refreshSortUI() {
  document.querySelectorAll('.sort-check-item').forEach(el => {
    const rank = _sortChecked.indexOf(el.dataset.value);
    el.classList.toggle('checked', rank !== -1);
    const badge = el.querySelector('.rank-badge');
    if (badge) badge.textContent = rank !== -1 ? rank + 1 : '';
  });

  // 토글 버튼 배지
  const badge = document.getElementById('sort-badge');
  if (badge) {
    badge.textContent = _sortChecked.length || '';
    badge.style.display = _sortChecked.length ? 'inline-flex' : 'none';
  }

  // 힌트 텍스트: "1순위 통근 짧은순 → 2순위 가격 낮은순"
  const hint = document.getElementById('sort-hint');
  if (!hint) return;
  if (!_sortChecked.length) {
    hint.innerHTML = '클릭 순서대로 <span class="hint-order">1순위 → 2순위 → 3순위</span> 자동 지정';
    return;
  }
  const labelMap = Object.fromEntries(SORT_OPTIONS.map(o => [o.value, o.label]));
  const parts = _sortChecked.map((v, i) =>
    `<span class="hint-order">${i+1}순위</span> ${labelMap[v] || v}`
  );
  hint.innerHTML = parts.join(' &nbsp;→&nbsp; ');
}

function toggleSortPanel() {
  const panel = document.getElementById('sort-panel');
  const btn = document.getElementById('sort-toggle-btn');
  const open = panel.classList.toggle('open');
  btn.classList.toggle('open', open);
  btn.setAttribute('aria-expanded', String(open));
  try { localStorage.setItem('sortPanelOpen', open ? '1' : '0'); } catch (e) {}
}

// 드롭다운 호환 스텁 (기존 코드에서 호출되는 함수명 유지)
function updateSortDropdowns() {}
function onSortChange() { applySortOrder(); }

function applySortOrder() {
  const keys = _sortChecked;

  if (!keys.length) {
    if (window._lastSearchData) renderCards(window._lastSearchData);
    return;
  }

  const cards = [...(window._lastCards || [])];
  cards.sort((a, b) => {
    for (const key of keys) {
      const [field, dir] = key.split(':');
      const av = a[field] ?? null;
      const bv = b[field] ?? null;
      if (av === null && bv === null) continue;
      if (av === null) return 1;
      if (bv === null) return -1;
      const diff = dir === 'desc' ? bv - av : av - bv;
      if (diff !== 0) return diff;
    }
    return 0;
  });

  _renderSortedFlat(cards);
}

function _renderSortedFlat(cards) {
  const data = window._lastSearchData;
  if (!data) return;
  const panel = document.getElementById('cards-panel');
  const wpId = data.wp_id;
  let html = `<div class="rec-section-head" style="margin-top:8px"><h3>전체 ${cards.length}곳</h3></div>`;
  html += cards.map(c => c.is_recommended ? renderRecCard(c, wpId) : renderListCard(c, wpId)).join('');
  panel.innerHTML = html;
  _updateFavTab();
}

function resetSort() {
  _sortChecked = [];
  _refreshSortUI();
  if (window._lastSearchData) renderCards(window._lastSearchData);
}

// ── 실행 ─────────────────────────────────────────────────────
runSearch();
