<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BADUGI — 당신의 집을 잘 찾는 개코</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="landing-page">

<div class="canvas">

  <!-- ① 좌상단 바둑인 + 말풍선 -->
  <img class="person person-1" src="/static/images/go-master-1.jpg" alt="바둑 마스터 1">
  <div class="bubble bubble-1">
    그래봤자 바둑<br>그래도 바둑!
  </div>

  <!-- ② 우상단 바둑인 + 말풍선 -->
  <img class="person person-2" src="/static/images/go-master-2.jpg" alt="바둑 마스터 2">
  <div class="bubble bubble-2">
    음..바둑
  </div>

  <!-- ③ 가운데: 로고 + 멍멍 + 브랜드 텍스트 -->
  <img class="logo" src="/static/images/badugi-logo.png" alt="BADUGI">
  <div class="meong">멍멍</div>
  <div class="brand-box">
    당신의 집을 잘 찾는 개코<br>
    <span class="brand">BADUGI</span> <span class="brand-sub">(서비스 이름이다)</span>
  </div>

  <!-- ④ 설명 -->
  <div class="description">
    내 직장을 기준으로 한 맞춤형 아파트 구입 추천 서비스.<br>
    출퇴근 시간과 가격, 평수의 트레이드오프를 한눈에 비교하고,<br>
    나에게 가장 잘 맞는 최적의 조합을 찾아 보세요!
  </div>

  <!-- ⑤ 좌하단 시작하기 폭발 (8점) -->
  <a class="start-btn" href="/search.html" aria-label="시작하기">
    <svg viewBox="0 0 100 100" width="259" height="259" aria-hidden="true">
      <polygon
        points="50,2 57.65,31.52 83.94,16.06 68.48,42.35 98,50 68.48,57.65 83.94,83.94 57.65,68.48 50,98 42.35,68.48 16.06,83.94 31.52,57.65 2,50 31.52,42.35 16.06,16.06 42.35,31.52"
        fill="#C00000"/>
    </svg>
    <span class="start-text">
      시작하기<br>
      <small>(클릭)</small>
    </span>
  </a>

  <!-- ⑥ 우하단 환호 -->
  <img class="celebrate" src="/static/images/celebrate.png" alt="마침내!">

</div>

</body>
</html>
